name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Stamp build info
        run: |
          STAMP="Git push: $(TZ='America/Los_Angeles' date +'%b %d %Y %I:%M %p %Z') | Deploy: $(TZ='America/Los_Angeles' date +'%b %d %Y %I:%M %p %Z')"
          sed -i "s#__BUILD_TIMESTAMP__#$STAMP#g" index.html

      - name: Push to Apps Script
        run: clasp push --force

      - name: Deploy new version
        run: clasp deploy --deploymentId ${{ secrets.CLASP_DEPLOYMENT_ID }} --description "Auto-deploy from GitHub"
