<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Budget Together</title>
  <script>
    (function(){
      if (window.self !== window.top) {
        var vp = document.querySelector('meta[name="viewport"]');
        if (vp) vp.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover';
        try { parent.document.querySelector('.apps-script-banner')?.remove(); } catch(e){}
      }
      var z = 1;
      if (navigator.maxTouchPoints > 0 && window.screen.width > 0) {
        var _sw = window.screen.width;
        var _iw = window.innerWidth;
        if (_iw > _sw * 1.5) z = _iw / _sw;
      }
      document.documentElement.style.setProperty('--z', z);
    })();
  </script>
  <style>
    :root {
      --z: 1;
      --bg: #000000;
      --card: #1C1C1E;
      --card-raised: #2C2C2E;
      --text: #FFFFFF;
      --text2: rgba(235,235,245,.6);
      --text3: rgba(235,235,245,.3);
      --green: #30D158;
      --green-dim: rgba(48,209,88,.5);
      --red: #FF453A;
      --red-dim: rgba(255,69,58,.5);
      --orange: #FF9F0A;
      --blue: #0A84FF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
    }

    /* ── Loading ── */
    #status {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: calc(16px * var(--z));
      color: var(--text3);
      font-size: calc(14px * var(--z));
      font-weight: 500;
      letter-spacing: calc(0.2px * var(--z));
    }
    .ld-ring {
      width: calc(40px * var(--z));
      height: calc(40px * var(--z));
      border: calc(3px * var(--z)) solid rgba(255,255,255,.08);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s cubic-bezier(.45,.05,.55,.95) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App shell ── */
    #app { display: none; flex-direction: column; height: 100%; }
    #app.show { display: flex; flex: 1; }

    /* ── Month bar ── */
    .month-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(10px * var(--z)) calc(20px * var(--z)) calc(6px * var(--z));
      padding-top: calc((8px + env(safe-area-inset-top)) * var(--z));
      flex-shrink: 0;
    }
    .month-label {
      font-size: calc(22px * var(--z));
      font-weight: 700;
      letter-spacing: calc(-0.4px * var(--z));
    }
    .month-arrows { display: flex; gap: calc(6px * var(--z)); }
    .mo-btn {
      width: calc(34px * var(--z));
      height: calc(34px * var(--z));
      border-radius: 50%;
      border: calc(1px * var(--z)) solid rgba(255,255,255,.08);
      background: transparent;
      color: var(--text2);
      font-size: calc(16px * var(--z));
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all .15s;
    }
    .mo-btn:active { background: var(--card); transform: scale(.92); }

    /* ── Carousel ── */
    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: calc(4px * var(--z)) calc(16px * var(--z)) 0;
      gap: calc(12px * var(--z));
      flex: 1;
      align-items: stretch;
    }
    .carousel::-webkit-scrollbar { display: none; }

    /* ── Card ── */
    .card {
      flex: 0 0 calc(100% - calc(32px * var(--z)));
      scroll-snap-align: center;
      background: var(--card);
      border-radius: calc(22px * var(--z));
      padding: calc(16px * var(--z));
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    /* Subtle top-edge highlight like a real iOS card */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: calc(20px * var(--z)); right: calc(20px * var(--z));
      height: calc(1px * var(--z));
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
    }
    .card-head {
      margin-bottom: calc(10px * var(--z));
      flex-shrink: 0;
    }
    .card-name {
      font-size: calc(13px * var(--z));
      font-weight: 600;
      color: var(--text3);
      letter-spacing: calc(1.2px * var(--z));
      text-transform: uppercase;
    }

    /* ── 2x2 Grid ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: calc(8px * var(--z));
      flex: 1;
    }

    /* ── Tile base ── */
    .tile {
      border-radius: calc(16px * var(--z));
      background: var(--card-raised);
      padding: calc(14px * var(--z));
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .tile-label {
      font-size: calc(10.5px * var(--z));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: calc(0.8px * var(--z));
      color: var(--text3);
      margin-bottom: calc(4px * var(--z));
    }
    .tile-big {
      font-size: calc(26px * var(--z));
      font-weight: 800;
      letter-spacing: calc(-0.8px * var(--z));
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    .tile-sub {
      margin-top: auto;
      padding-top: calc(6px * var(--z));
    }
    .tile-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: calc(11.5px * var(--z));
      color: var(--text2);
      padding: calc(1.5px * var(--z)) 0;
    }
    .tile-row span:last-child {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    /* Thin separator between breakdown rows */
    .tile-sep {
      height: calc(1px * var(--z));
      background: rgba(255,255,255,.04);
      margin: calc(3px * var(--z)) 0;
    }

    /* ── P/L tile ── */
    .tile-pl {
      justify-content: center;
      align-items: flex-start;
    }
    .tile-pl .tile-big { font-size: calc(32px * var(--z)); }
    .tile-pl.surplus {
      background: linear-gradient(145deg, rgba(48,209,88,.18) 0%, rgba(48,209,88,.04) 100%);
    }
    .tile-pl.surplus .tile-label { color: var(--green-dim); }
    .tile-pl.deficit {
      background: linear-gradient(145deg, rgba(255,69,58,.18) 0%, rgba(255,69,58,.04) 100%);
    }
    .tile-pl.deficit .tile-label { color: var(--red-dim); }

    /* ── Ring tile ── */
    .tile-ring {
      align-items: center;
      justify-content: center;
      padding: calc(8px * var(--z));
      background: transparent;
    }
    .ring-outer { position: relative; width: 85%; max-width: calc(150px * var(--z)); }
    .ring-outer svg { width: 100%; display: block; filter: drop-shadow(0 0 calc(6px * var(--z)) var(--ring-glow)); }
    .ring-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .ring-pct {
      font-size: calc(26px * var(--z));
      font-weight: 800;
      letter-spacing: calc(-0.8px * var(--z));
      line-height: 1;
    }
    .ring-word {
      font-size: calc(8.5px * var(--z));
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: calc(1px * var(--z));
      color: var(--text3);
      margin-top: calc(1px * var(--z));
    }

    /* ── Income tile ── */
    .tile-inc .tile-big { color: var(--green); }
    .tile-inc .tile-label { color: var(--green-dim); }

    /* ── Spending tile ── */
    .tile-spend .tile-big { color: var(--red); }
    .tile-spend .tile-label { color: var(--red-dim); }

    /* ── Dots ── */
    .dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: calc(6px * var(--z));
      padding: calc(10px * var(--z)) 0 calc(12px * var(--z));
      padding-bottom: calc((12px + env(safe-area-inset-bottom)) * var(--z));
      flex-shrink: 0;
    }
    .dot {
      width: calc(6px * var(--z));
      height: calc(6px * var(--z));
      border-radius: calc(3px * var(--z));
      background: rgba(255,255,255,.15);
      transition: all .3s cubic-bezier(.4,0,.2,1);
    }
    .dot.on {
      background: #FFF;
      width: calc(22px * var(--z));
      border-radius: calc(3px * var(--z));
    }

    /* ── Fade-in animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(calc(8px * var(--z))); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card { animation: fadeUp .4s ease-out both; }
  </style>
</head>
<body>

<div id="status"><div class="ld-ring"></div><div>Loading</div></div>
<div id="app"></div>

<script>
var D, currentMonth = new Date().toISOString().slice(0,7);

var FIXED = {housing:1, utilities:1, subs:1, insurance:1};
var RET_RE = /\b(401k?|roth|retirement|pension|sep[\s-]?ira|hsa contrib)\b/i;

function fc(n){ return '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

function incType(id, desc){
  if ((D.incomeData||{})[id]) return D.incomeData[id];
  var k = (desc||'').trim().toLowerCase().replace(/\s+/g,' ');
  if (k && (D.incomeTypeRules||{})[k]) return D.incomeTypeRules[k];
  return RET_RE.test(desc) ? 'retirement' : 'normal';
}

function isIgnored(cat){
  var list = [].concat([{id:'insurance',ignored:true},{id:'transfer',ignored:true}], D.customCategories||[]);
  var f = list.find(function(c){return c.id===cat;});
  return f ? !!f.ignored : false;
}

function compute(who){
  var txns = (D.transactions||[]).filter(function(t){ return t.date && t.date.slice(0,7)===currentMonth; });
  if (who !== 'all') txns = txns.filter(function(t){ return t.person===who; });
  var spend=0, fixed=0, inc=0, ret=0, fam=0, nrm=0;
  for (var i=0; i<txns.length; i++){
    var t = txns[i];
    if (t.excluded) continue;
    if (t.amount > 0 && !isIgnored(t.category)){ spend += t.amount; if (FIXED[t.category]) fixed += t.amount; }
    if (t.amount < 0 && t.category === 'income'){
      var a = Math.abs(t.amount); inc += a;
      var tp = incType(t.id, t.description);
      if (tp==='retirement') ret += a; else if (tp==='family') fam += a; else nrm += a;
    }
  }
  var pl = inc - spend, takeHome = inc - ret - fam;
  var rate = takeHome > 0 ? Math.round(pl / takeHome * 100) : 0;
  return {inc:inc, nrm:nrm, ret:ret, fam:fam, spend:spend, fixed:fixed, variable:spend-fixed, pl:pl, rate:rate, deficit:pl<0};
}

function ringSvg(pct, color){
  var r=42, c=2*Math.PI*r, fill=Math.max(0,Math.min(Math.abs(pct),100)), off=c-(fill/100)*c;
  return '<svg viewBox="0 0 100 100">'
    +'<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="7"/>'
    +'<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="7" stroke-linecap="round"'
    +' stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 50 50)"'
    +' style="transition:stroke-dashoffset .8s cubic-bezier(.25,.46,.45,.94)"/>'
    +'</svg>';
}

function card(label, d){
  var rc = d.rate<10 ? '#FF453A' : d.rate<20 ? '#FF9F0A' : '#30D158';
  var glow = d.rate<10 ? 'rgba(255,69,58,.25)' : d.rate<20 ? 'rgba(255,159,10,.2)' : 'rgba(48,209,88,.25)';
  var plClass = d.deficit ? 'deficit' : 'surplus';
  var plColor = d.deficit ? 'var(--red)' : 'var(--green)';
  var plSign = d.deficit ? '-' : '+';

  var incRows = '';
  if (d.ret>0) incRows += '<div class="tile-row"><span>Retirement</span><span>'+fc(d.ret)+'</span></div><div class="tile-sep"></div>';
  if (d.fam>0) incRows += '<div class="tile-row"><span>Family</span><span>'+fc(d.fam)+'</span></div><div class="tile-sep"></div>';
  incRows += '<div class="tile-row"><span>Take-home</span><span>'+fc(d.nrm)+'</span></div>';

  return '<div class="card">'
    +'<div class="card-head"><span class="card-name">'+label+'</span></div>'
    +'<div class="grid">'
    // P/L
    +'<div class="tile tile-pl '+plClass+'">'
    +'<div class="tile-label">'+(d.deficit?'Deficit':'Saved')+'</div>'
    +'<div class="tile-big" style="color:'+plColor+'">'+plSign+fc(Math.abs(d.pl))+'</div>'
    +'</div>'
    // Ring
    +'<div class="tile tile-ring" style="--ring-glow:'+glow+'">'
    +'<div class="ring-outer">'+ringSvg(d.rate, rc)
    +'<div class="ring-center"><div class="ring-pct" style="color:'+rc+'">'+d.rate+'%</div><div class="ring-word">Savings</div></div>'
    +'</div></div>'
    // Income
    +'<div class="tile tile-inc">'
    +'<div class="tile-label">Income</div>'
    +'<div class="tile-big">'+fc(d.inc)+'</div>'
    +'<div class="tile-sub">'+incRows+'</div>'
    +'</div>'
    // Spending
    +'<div class="tile tile-spend">'
    +'<div class="tile-label">Spending</div>'
    +'<div class="tile-big">'+fc(d.spend)+'</div>'
    +'<div class="tile-sub">'
    +'<div class="tile-row"><span>Fixed</span><span>'+fc(d.fixed)+'</span></div>'
    +'<div class="tile-sep"></div>'
    +'<div class="tile-row"><span>Variable</span><span>'+fc(d.variable)+'</span></div>'
    +'</div></div>'
    +'</div></div>';
}

function moLabel(ym){
  var p=ym.split('-'); return new Date(+p[0],+p[1]-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function moShift(delta){
  var p=currentMonth.split('-'), d=new Date(+p[0],+p[1]-1+delta,1);
  currentMonth = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  render();
}

function render(){
  var p1 = compute('p1'), p2 = compute('p2'), all = compute('all');
  var n1 = (D.settings||{}).person1||'Person 1';
  var n2 = (D.settings||{}).person2||'Person 2';

  var set = card(n1,p1) + card(n2,p2) + card('Combined',all);
  var z = getComputedStyle(document.documentElement).getPropertyValue('--z').trim() || '1';
  var gap = 12 * parseFloat(z);

  document.getElementById('app').innerHTML =
    '<div class="month-bar">'
    +'<span class="month-label">'+moLabel(currentMonth)+'</span>'
    +'<div class="month-arrows">'
    +'<button class="mo-btn" onclick="moShift(-1)">&#8249;</button>'
    +'<button class="mo-btn" onclick="moShift(1)">&#8250;</button>'
    +'</div></div>'
    +'<div class="carousel" id="car">'+set+set+set+'</div>'
    +'<div class="dots"><div class="dot on"></div><div class="dot"></div><div class="dot"></div></div>';

  var car = document.getElementById('car');
  if (car && car.children.length > 0){
    var w = car.children[0].offsetWidth + gap;
    car.scrollLeft = w * 3;
    var timer;
    car.onscroll = function(){
      var idx = Math.round(car.scrollLeft / w) % 3;
      var dots = document.querySelectorAll('.dot');
      for(var i=0;i<dots.length;i++) dots[i].className = i===idx ? 'dot on' : 'dot';
      clearTimeout(timer);
      timer = setTimeout(function(){
        var ci = Math.round(car.scrollLeft / w);
        if (ci < 3){ car.style.scrollBehavior='auto'; car.scrollLeft += w*3; car.style.scrollBehavior=''; }
        else if (ci >= 6){ car.style.scrollBehavior='auto'; car.scrollLeft -= w*3; car.style.scrollBehavior=''; }
      }, 150);
    };
  }
}

google.script.run
  .withSuccessHandler(function(data){
    D = data;
    document.getElementById('status').style.display = 'none';
    document.getElementById('app').className = 'show';
    try { render(); } catch(e){
      document.getElementById('app').innerHTML = '<div style="padding:2rem;color:#FF453A;font-size:calc(14px * var(--z));word-break:break-all"><b>Error:</b><br>'+e.message+'</div>';
    }
  })
  .withFailureHandler(function(e){
    document.getElementById('status').innerHTML = '<div style="color:#FF453A">Load failed: '+(e.message||e)+'</div>';
  })
  .loadAll();
</script>
</body>
</html>
