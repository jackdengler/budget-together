<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Budget Together</title>
  <script>
    (function(){
      if (window.self !== window.top) {
        var vp = document.querySelector('meta[name="viewport"]');
        if (vp) vp.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover';
        try { parent.document.querySelector('.apps-script-banner')?.remove(); } catch(e){}
      }
      if (navigator.maxTouchPoints > 0 && window.screen.width > 0) {
        var _sw = window.screen.width;
        var _iw = window.innerWidth;
        if (_iw > _sw * 1.5) {
          document.documentElement.style.zoom = _iw / _sw;
        }
      }
    })();
  </script>
  <style>
    :root{--bg:#F2F2F7;--card:#FFF;--text:#000;--text2:#6C6C70;--text3:#8E8E93;--green:#34C759;--yellow:#FF9500;--red:#FF3B30;--blue:#007AFF}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:17px}
    body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
    #status{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;gap:12px;font-size:16px;color:var(--text3);padding:2rem}
    .spinner{width:36px;height:36px;border:3px solid rgba(0,0,0,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #app{display:none;flex-direction:column;height:100%}
    #app.show{display:flex;flex:1}
    .month-header{text-align:center;padding:10px 0 8px;padding-top:calc(10px + env(safe-area-inset-top));font-size:22px;font-weight:700;letter-spacing:-.02em;flex-shrink:0}
    .month-nav{display:inline-flex;align-items:center;gap:16px}
    .month-nav button{background:none;border:none;font-size:28px;color:var(--blue);padding:8px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;font-weight:300}
    .month-nav button:active{opacity:.5}
    .carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 4%;gap:10px;flex:1;align-items:stretch}
    .carousel::-webkit-scrollbar{display:none}
    .card{flex:0 0 92%;scroll-snap-align:center;background:var(--card);border-radius:18px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:14px 16px;display:flex;flex-direction:column}
    .card-label{font-size:15px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;text-align:center;flex-shrink:0}
    .grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:10px;flex:1}
    .quadrant{display:flex;flex-direction:column;justify-content:center;padding:14px;border-radius:14px;background:rgba(120,120,128,.06);overflow:hidden}
    .q-label{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);margin-bottom:4px}
    .q-big{font-size:1.7rem;font-weight:800;line-height:1.15}
    .q-sub{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6}
    .q-row{display:flex;justify-content:space-between}
    .ring-wrap{display:flex;align-items:center;justify-content:center;height:100%}
    .ring-wrap svg{width:100%;max-width:150px}
    .dots{display:flex;justify-content:center;gap:8px;padding:10px 0 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));flex-shrink:0}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);opacity:.25;transition:opacity .2s}
    .dot.on{opacity:1}
  </style>
</head>
<body>

<div id="status"><div class="spinner"></div><div>Loading...</div></div>
<div id="app"></div>

<script>
/* ── globals ── */
var D, currentMonth = new Date().toISOString().slice(0,7);

/* ── helpers ── */
var FIXED = {housing:1, utilities:1, subs:1, insurance:1};
var RET_RE = /\b(401k?|roth|retirement|pension|sep[\s-]?ira|hsa contrib)\b/i;

function fc(n){ return '$' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

function incType(id, desc){
  if ((D.incomeData||{})[id]) return D.incomeData[id];
  var k = (desc||'').trim().toLowerCase().replace(/\s+/g,' ');
  if (k && (D.incomeTypeRules||{})[k]) return D.incomeTypeRules[k];
  return RET_RE.test(desc) ? 'retirement' : 'normal';
}

function isIgnored(cat){
  var cats = [].concat(
    [{id:'insurance',ignored:true},{id:'transfer',ignored:true}],
    D.customCategories||[]
  );
  var found = cats.find(function(c){return c.id===cat;});
  return found ? !!found.ignored : false;
}

function compute(who){
  var txns = (D.transactions||[]).filter(function(t){ return t.date && t.date.slice(0,7)===currentMonth; });
  if (who !== 'all') txns = txns.filter(function(t){ return t.person===who; });

  var spend=0, fixed=0, inc=0, ret=0, fam=0, nrm=0;
  for (var i=0; i<txns.length; i++){
    var t = txns[i];
    if (t.excluded) continue;
    if (t.amount > 0 && !isIgnored(t.category)){
      spend += t.amount;
      if (FIXED[t.category]) fixed += t.amount;
    }
    if (t.amount < 0 && t.category === 'income'){
      var a = Math.abs(t.amount);
      inc += a;
      var tp = incType(t.id, t.description);
      if (tp==='retirement') ret += a;
      else if (tp==='family') fam += a;
      else nrm += a;
    }
  }
  var pl = inc - spend;
  var takeHome = inc - ret - fam;
  var rate = takeHome > 0 ? Math.round(pl / takeHome * 100) : 0;
  return {inc:inc, nrm:nrm, ret:ret, fam:fam, spend:spend, fixed:fixed, variable:spend-fixed, pl:pl, rate:rate, deficit:pl<0};
}

/* ── ring svg ── */
function ring(pct, color){
  var r=42, c=2*Math.PI*r, fill=Math.max(0,Math.min(Math.abs(pct),100)), off=c-(fill/100)*c;
  return '<svg viewBox="0 0 100 100">'
    +'<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="rgba(120,120,128,.12)" stroke-width="9"/>'
    +'<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 50 50)"/>'
    +'<text x="50" y="46" text-anchor="middle" font-size="16" font-weight="800" fill="'+color+'">'+pct+'%</text>'
    +'<text x="50" y="60" text-anchor="middle" font-size="7" font-weight="600" fill="#8E8E93">savings</text>'
    +'</svg>';
}

/* ── card html ── */
function card(label, d){
  var plC = d.deficit ? 'var(--red)' : 'var(--green)';
  var plS = d.deficit ? '-' : '+';
  var rc = d.rate<10 ? '#FF3B30' : d.rate<20 ? '#FF9500' : '#34C759';

  var incLines = '';
  if (d.ret>0) incLines += '<div class="q-row"><span>Retirement</span><span>'+fc(d.ret)+'</span></div>';
  if (d.fam>0) incLines += '<div class="q-row"><span>Family</span><span>'+fc(d.fam)+'</span></div>';
  incLines += '<div class="q-row"><span>Normal</span><span>'+fc(d.nrm)+'</span></div>';

  return '<div class="card">'
    +'<div class="card-label">'+label+'</div>'
    +'<div class="grid">'
    +'<div class="quadrant"><div class="q-label">'+(d.deficit?'Deficit':'Saved')+'</div><div class="q-big" style="color:'+plC+'">'+plS+fc(Math.abs(d.pl))+'</div></div>'
    +'<div class="quadrant"><div class="ring-wrap">'+ring(d.rate,rc)+'</div></div>'
    +'<div class="quadrant"><div class="q-label">Income</div><div class="q-big" style="color:var(--green)">'+fc(d.inc)+'</div><div class="q-sub">'+incLines+'</div></div>'
    +'<div class="quadrant"><div class="q-label">Spending</div><div class="q-big" style="color:var(--red)">'+fc(d.spend)+'</div><div class="q-sub"><div class="q-row"><span>Fixed</span><span>'+fc(d.fixed)+'</span></div><div class="q-row"><span>Variable</span><span>'+fc(d.variable)+'</span></div></div></div>'
    +'</div></div>';
}

/* ── month ── */
function moLabel(ym){
  var p=ym.split('-'); return new Date(+p[0],+p[1]-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function moShift(delta){
  var p=currentMonth.split('-'), d=new Date(+p[0],+p[1]-1+delta,1);
  currentMonth = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  render();
}

/* ── render ── */
function render(){
  var p1 = compute('p1'), p2 = compute('p2'), all = compute('all');
  var n1 = (D.settings||{}).person1||'Person 1';
  var n2 = (D.settings||{}).person2||'Person 2';

  var set = card(n1,p1) + card(n2,p2) + card('Combined',all);
  var html = '<div class="month-header"><div class="month-nav">'
    +'<button onclick="moShift(-1)">&lsaquo;</button>'
    +'<span>'+moLabel(currentMonth)+'</span>'
    +'<button onclick="moShift(1)">&rsaquo;</button>'
    +'</div></div>'
    +'<div class="carousel" id="car">'+set+set+set+'</div>'
    +'<div class="dots"><div class="dot on"></div><div class="dot"></div><div class="dot"></div></div>';

  document.getElementById('app').innerHTML = html;

  // scroll to middle set
  var car = document.getElementById('car');
  if (car && car.children.length > 0){
    var w = car.children[0].offsetWidth + 12;
    car.scrollLeft = w * 3;
    var timer;
    car.onscroll = function(){
      // update dots
      var idx = Math.round(car.scrollLeft / w) % 3;
      var dots = document.querySelectorAll('.dot');
      for(var i=0;i<dots.length;i++) dots[i].className = i===idx ? 'dot on' : 'dot';
      // infinite reposition
      clearTimeout(timer);
      timer = setTimeout(function(){
        var ci = Math.round(car.scrollLeft / w);
        if (ci < 3){ car.style.scrollBehavior='auto'; car.scrollLeft += w*3; car.style.scrollBehavior=''; }
        else if (ci >= 6){ car.style.scrollBehavior='auto'; car.scrollLeft -= w*3; car.style.scrollBehavior=''; }
      }, 150);
    };
  }
}

/* ── boot ── */
google.script.run
  .withSuccessHandler(function(data){
    D = data;
    document.getElementById('status').style.display = 'none';
    document.getElementById('app').className = 'show';
    try { render(); } catch(e){
      document.getElementById('app').innerHTML = '<div style="padding:2rem;color:red;font-size:14px;word-break:break-all"><b>Error:</b><br>'+e.message+'<br><br>'+e.stack+'</div>';
    }
  })
  .withFailureHandler(function(e){
    document.getElementById('status').innerHTML = '<div style="color:red">Load failed: '+(e.message||e)+'</div>';
  })
  .loadAll();
</script>
</body>
</html>
