<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Budget Together</title>
  <script>
    (function(){
      if (window.self !== window.top) {
        var vp = document.querySelector('meta[name="viewport"]');
        if (vp) vp.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover';
        try { parent.document.querySelector('.apps-script-banner')?.remove(); } catch(e){}
      }
      var z = 1;
      if (navigator.maxTouchPoints > 0 && window.screen.width > 0) {
        var _sw = window.screen.width;
        var _iw = window.innerWidth;
        if (_iw > _sw * 1.5) z = _iw / _sw;
      }
      document.documentElement.style.setProperty('--z', z);
    })();
  </script>
  <style>
    :root {
      --z: 1;
      --bg: #000;
      --surface: #161618;
      --elevated: #1E1E20;
      --border: rgba(255,255,255,.06);
      --text: #F5F5F7;
      --text2: rgba(245,245,247,.55);
      --text3: rgba(245,245,247,.28);
      --accent-green: #32D74B;
      --accent-green-soft: rgba(50,215,75,.12);
      --accent-red: #FF453A;
      --accent-red-soft: rgba(255,69,58,.12);
      --accent-orange: #FFD60A;
      --accent-blue: #0A84FF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Rounded", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
    }

    /* ── Loading ── */
    #status {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: calc(14px * var(--z));
      color: var(--text3);
      font-size: calc(13px * var(--z));
      font-weight: 500;
      letter-spacing: calc(0.5px * var(--z));
      text-transform: uppercase;
    }
    .ld-ring {
      width: calc(28px * var(--z));
      height: calc(28px * var(--z));
      border: calc(2.5px * var(--z)) solid var(--border);
      border-top-color: var(--text2);
      border-radius: 50%;
      animation: spin .9s cubic-bezier(.45,.05,.55,.95) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App ── */
    #app { display: none; flex-direction: column; height: 100%; }
    #app.show { display: flex; flex: 1; }

    /* ── Month bar ── */
    .mo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: calc(20px * var(--z));
      padding: calc(14px * var(--z)) calc(20px * var(--z)) calc(10px * var(--z));
      padding-top: calc((12px + env(safe-area-inset-top)) * var(--z));
      flex-shrink: 0;
    }
    .mo-bar button {
      background: none;
      border: none;
      color: var(--text3);
      font-size: calc(22px * var(--z));
      padding: calc(4px * var(--z)) calc(10px * var(--z));
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s;
    }
    .mo-bar button:active { color: var(--text); }
    .mo-label {
      font-size: calc(17px * var(--z));
      font-weight: 600;
      letter-spacing: calc(-0.2px * var(--z));
      color: var(--text);
      min-width: calc(160px * var(--z));
      text-align: center;
    }

    /* ── Carousel ── */
    .carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 calc(14px * var(--z));
      gap: calc(10px * var(--z));
      flex: 1;
      align-items: stretch;
    }
    .carousel::-webkit-scrollbar { display: none; }

    /* ── Card ── */
    .card {
      flex: 0 0 calc(100% - calc(28px * var(--z)));
      scroll-snap-align: center;
      background: var(--surface);
      border: calc(1px * var(--z)) solid var(--border);
      border-radius: calc(24px * var(--z));
      padding: calc(18px * var(--z)) calc(16px * var(--z)) calc(14px * var(--z));
      display: flex;
      flex-direction: column;
      animation: fadeIn .35s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(.97); }
      to { opacity: 1; transform: scale(1); }
    }
    .card-who {
      font-size: calc(12px * var(--z));
      font-weight: 600;
      color: var(--text3);
      letter-spacing: calc(1.5px * var(--z));
      text-transform: uppercase;
      text-align: center;
      margin-bottom: calc(14px * var(--z));
      flex-shrink: 0;
    }

    /* ── Layout: top hero row + bottom detail row ── */
    .hero-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: calc(8px * var(--z));
      flex: 1;
      margin-bottom: calc(8px * var(--z));
    }
    .detail-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: calc(8px * var(--z));
      flex: 1;
    }

    /* ── Tile ── */
    .tile {
      border-radius: calc(18px * var(--z));
      background: var(--elevated);
      padding: calc(16px * var(--z)) calc(14px * var(--z));
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .tile-lbl {
      font-size: calc(10px * var(--z));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: calc(1px * var(--z));
      margin-bottom: calc(6px * var(--z));
    }
    .tile-val {
      font-size: calc(28px * var(--z));
      font-weight: 800;
      letter-spacing: calc(-1px * var(--z));
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .tile-detail {
      margin-top: auto;
      padding-top: calc(8px * var(--z));
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: calc(11px * var(--z));
      padding: calc(3px * var(--z)) 0;
    }
    .row-label { color: var(--text3); font-weight: 500; }
    .row-val { color: var(--text2); font-weight: 600; font-variant-numeric: tabular-nums; }
    .divider {
      height: calc(1px * var(--z));
      background: var(--border);
      margin: calc(2px * var(--z)) 0;
    }

    /* ── P/L tile ── */
    .tile-pl {
      justify-content: center;
    }
    .tile-pl .tile-val { font-size: calc(34px * var(--z)); }
    .tile-pl.up {
      background: linear-gradient(160deg, rgba(50,215,75,.14), rgba(50,215,75,.03));
      border: calc(1px * var(--z)) solid rgba(50,215,75,.1);
    }
    .tile-pl.up .tile-lbl { color: var(--accent-green); }
    .tile-pl.up .tile-val { color: var(--accent-green); }
    .tile-pl.down {
      background: linear-gradient(160deg, rgba(255,69,58,.14), rgba(255,69,58,.03));
      border: calc(1px * var(--z)) solid rgba(255,69,58,.1);
    }
    .tile-pl.down .tile-lbl { color: var(--accent-red); }
    .tile-pl.down .tile-val { color: var(--accent-red); }

    /* ── Ring tile ── */
    .tile-ring {
      background: transparent;
      border: none;
      align-items: center;
      justify-content: center;
      padding: calc(6px * var(--z));
    }
    .ring-box { position: relative; width: 88%; max-width: calc(160px * var(--z)); }
    .ring-box svg {
      width: 100%;
      display: block;
      filter: drop-shadow(0 0 calc(8px * var(--z)) var(--ring-glow));
    }
    .ring-mid {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .ring-num {
      font-size: calc(28px * var(--z));
      font-weight: 800;
      letter-spacing: calc(-1px * var(--z));
      line-height: 1;
    }
    .ring-sub {
      font-size: calc(8px * var(--z));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: calc(1.2px * var(--z));
      color: var(--text3);
      margin-top: calc(2px * var(--z));
    }

    /* ── Income tile ── */
    .tile-inc .tile-lbl { color: rgba(50,215,75,.55); }
    .tile-inc .tile-val { color: var(--accent-green); }

    /* ── Spend tile ── */
    .tile-exp .tile-lbl { color: rgba(255,69,58,.55); }
    .tile-exp .tile-val { color: var(--accent-red); }

    /* ── Dots ── */
    .dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: calc(6px * var(--z));
      padding: calc(10px * var(--z)) 0;
      padding-bottom: calc((10px + env(safe-area-inset-bottom)) * var(--z));
      flex-shrink: 0;
    }
    .dt {
      height: calc(5px * var(--z));
      border-radius: calc(3px * var(--z));
      background: rgba(255,255,255,.12);
      transition: all .3s cubic-bezier(.4,0,.2,1);
      width: calc(5px * var(--z));
    }
    .dt.on {
      background: var(--text);
      width: calc(24px * var(--z));
    }
  </style>
</head>
<body>

<div id="status"><div class="ld-ring"></div><div>Loading</div></div>
<div id="app"></div>

<script>
var D, currentMonth = new Date().toISOString().slice(0,7);

var FIXED = {housing:1, utilities:1, subs:1, insurance:1};
var RET_RE = /\b(401k?|roth|retirement|pension|sep[\s-]?ira|hsa contrib)\b/i;

function fc(n){ return '$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }

function incType(id, desc){
  if ((D.incomeData||{})[id]) return D.incomeData[id];
  var k = (desc||'').trim().toLowerCase().replace(/\s+/g,' ');
  if (k && (D.incomeTypeRules||{})[k]) return D.incomeTypeRules[k];
  return RET_RE.test(desc) ? 'retirement' : 'normal';
}

function isIgnored(cat){
  var list = [].concat([{id:'insurance',ignored:true},{id:'transfer',ignored:true}], D.customCategories||[]);
  var f = list.find(function(c){return c.id===cat;});
  return f ? !!f.ignored : false;
}

function compute(who){
  var txns = (D.transactions||[]).filter(function(t){ return t.date && t.date.slice(0,7)===currentMonth; });
  if (who !== 'all') txns = txns.filter(function(t){ return t.person===who; });
  var spend=0, fixed=0, inc=0, ret=0, fam=0, nrm=0;
  for (var i=0; i<txns.length; i++){
    var t = txns[i];
    if (t.excluded) continue;
    if (t.amount > 0 && !isIgnored(t.category)){ spend += t.amount; if (FIXED[t.category]) fixed += t.amount; }
    if (t.amount < 0 && t.category === 'income'){
      var a = Math.abs(t.amount); inc += a;
      var tp = incType(t.id, t.description);
      if (tp==='retirement') ret += a; else if (tp==='family') fam += a; else nrm += a;
    }
  }
  var pl = inc - spend, takeHome = inc - ret - fam;
  var rate = takeHome > 0 ? Math.round(pl / takeHome * 100) : 0;
  return {inc:inc, nrm:nrm, ret:ret, fam:fam, spend:spend, fixed:fixed, variable:spend-fixed, pl:pl, rate:rate, deficit:pl<0};
}

function ringSvg(pct, color){
  var r=42, c=2*Math.PI*r, fill=Math.max(0,Math.min(Math.abs(pct),100)), off=c-(fill/100)*c;
  return '<svg viewBox="0 0 100 100">'
    +'<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="7"/>'
    +'<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="7" stroke-linecap="round"'
    +' stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 50 50)"'
    +' style="transition:stroke-dashoffset .8s cubic-bezier(.25,.46,.45,.94)"/>'
    +'</svg>';
}

function card(label, d){
  var rc = d.rate<10 ? '#FF453A' : d.rate<20 ? '#FF9F0A' : '#32D74B';
  var glow = d.rate<10 ? 'rgba(255,69,58,.3)' : d.rate<20 ? 'rgba(255,159,10,.25)' : 'rgba(50,215,75,.3)';
  var plDir = d.deficit ? 'down' : 'up';
  var plColor = d.deficit ? 'var(--accent-red)' : 'var(--accent-green)';
  var plSign = d.deficit ? '-' : '+';

  var incRows = '';
  if (d.ret>0) incRows += '<div class="row"><span class="row-label">Retirement</span><span class="row-val">'+fc(d.ret)+'</span></div><div class="divider"></div>';
  if (d.fam>0) incRows += '<div class="row"><span class="row-label">Family</span><span class="row-val">'+fc(d.fam)+'</span></div><div class="divider"></div>';
  incRows += '<div class="row"><span class="row-label">Take-home</span><span class="row-val">'+fc(d.nrm)+'</span></div>';

  return '<div class="card">'
    +'<div class="card-who">'+label+'</div>'
    // Top: P/L + Ring
    +'<div class="hero-row">'
    +'<div class="tile tile-pl '+plDir+'"><div class="tile-lbl">'+(d.deficit?'Deficit':'Saved')+'</div><div class="tile-val">'+plSign+fc(Math.abs(d.pl))+'</div></div>'
    +'<div class="tile tile-ring" style="--ring-glow:'+glow+'"><div class="ring-box">'+ringSvg(d.rate, rc)+'<div class="ring-mid"><div class="ring-num" style="color:'+rc+'">'+d.rate+'%</div><div class="ring-sub">Savings</div></div></div></div>'
    +'</div>'
    // Bottom: Income + Spending
    +'<div class="detail-row">'
    +'<div class="tile tile-inc"><div class="tile-lbl">Income</div><div class="tile-val">'+fc(d.inc)+'</div><div class="tile-detail">'+incRows+'</div></div>'
    +'<div class="tile tile-exp"><div class="tile-lbl">Spending</div><div class="tile-val">'+fc(d.spend)+'</div><div class="tile-detail"><div class="row"><span class="row-label">Fixed</span><span class="row-val">'+fc(d.fixed)+'</span></div><div class="divider"></div><div class="row"><span class="row-label">Variable</span><span class="row-val">'+fc(d.variable)+'</span></div></div></div>'
    +'</div>'
    +'</div>';
}

function moLabel(ym){
  var p=ym.split('-'); return new Date(+p[0],+p[1]-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function moShift(delta){
  var p=currentMonth.split('-'), d=new Date(+p[0],+p[1]-1+delta,1);
  currentMonth = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  render();
}

function render(){
  var p1 = compute('p1'), p2 = compute('p2'), all = compute('all');
  var n1 = (D.settings||{}).person1||'Person 1';
  var n2 = (D.settings||{}).person2||'Person 2';

  var set = card(n1,p1) + card(n2,p2) + card('Combined',all);
  var z = getComputedStyle(document.documentElement).getPropertyValue('--z').trim() || '1';
  var gap = 10 * parseFloat(z);

  document.getElementById('app').innerHTML =
    '<div class="mo-bar">'
    +'<button onclick="moShift(-1)">&#8249;</button>'
    +'<span class="mo-label">'+moLabel(currentMonth)+'</span>'
    +'<button onclick="moShift(1)">&#8250;</button>'
    +'</div>'
    +'<div class="carousel" id="car">'+set+set+set+'</div>'
    +'<div class="dots"><div class="dt on"></div><div class="dt"></div><div class="dt"></div></div>';

  var car = document.getElementById('car');
  if (car && car.children.length > 0){
    var w = car.children[0].offsetWidth + gap;
    car.scrollLeft = w * 3;
    var timer;
    car.onscroll = function(){
      var idx = Math.round(car.scrollLeft / w) % 3;
      var dots = document.querySelectorAll('.dt');
      for(var i=0;i<dots.length;i++) dots[i].className = i===idx ? 'dt on' : 'dt';
      clearTimeout(timer);
      timer = setTimeout(function(){
        var ci = Math.round(car.scrollLeft / w);
        if (ci < 3){ car.style.scrollBehavior='auto'; car.scrollLeft += w*3; car.style.scrollBehavior=''; }
        else if (ci >= 6){ car.style.scrollBehavior='auto'; car.scrollLeft -= w*3; car.style.scrollBehavior=''; }
      }, 150);
    };
  }
}

google.script.run
  .withSuccessHandler(function(data){
    D = data;
    document.getElementById('status').style.display = 'none';
    document.getElementById('app').className = 'show';
    try { render(); } catch(e){
      document.getElementById('app').innerHTML = '<div style="padding:2rem;color:#FF453A;font-size:calc(14px * var(--z));word-break:break-all"><b>Error:</b><br>'+e.message+'</div>';
    }
  })
  .withFailureHandler(function(e){
    document.getElementById('status').innerHTML = '<div style="color:#FF453A">Load failed: '+(e.message||e)+'</div>';
  })
  .loadAll();
</script>
</body>
</html>
