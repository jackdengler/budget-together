// ── Split ──────────────────────────────────────────────────
// Returns {p1Share, p2Share, p1Pct} for a category total using stored split settings
function getCatSplitAmts(catId, total) {
  const s = S.catSplits[catId] || {};
  const mode = s.mode || 'pct';
  if (mode === 'dollar') {
    const p1 = Math.min(Math.max(s.p1Amt || 0, 0), total);
    const p1Pct = total > 0 ? Math.round(p1 / total * 100) : 50;
    return { p1Share: p1, p2Share: total - p1, p1Pct };
  }
  const pct = (mode === 'pct' || mode === 'even') ? (s.p1Pct ?? 50) : 50;
  return { p1Share: total * pct / 100, p2Share: total * (1 - pct / 100), p1Pct: pct };
}
function calcSplit() {
  const active = S.transactions.filter(t => t.shared && !t.settled && t.amount>0 && !getCat(t.category).ignored && !t.excluded);
  // Group by category then compute net using catSplits
  const byCat = {};
  for (const t of active) {
    if (!byCat[t.category]) byCat[t.category] = { p1paid:0, p2paid:0 };
    byCat[t.category][t.person==='p1'?'p1paid':'p2paid'] += t.amount;
  }
  let net = 0; // positive = p2 owes p1
  for (const [catId, {p1paid, p2paid}] of Object.entries(byCat)) {
    const { p1Share } = getCatSplitAmts(catId, p1paid + p2paid);
    net += p1paid - p1Share; // p1 overpaid → p2 owes; p1 underpaid → p1 owes
  }
  return { net, active };
}
function renderSplit() {
  const {net, active} = calcSplit();
  const pn1 = S.settings.person1, pn2 = S.settings.person2;

  // Group by category
  const byCat = {};
  for (const t of active) {
    if (!byCat[t.category]) byCat[t.category] = { p1paid:0, p2paid:0 };
    byCat[t.category][t.person==='p1'?'p1paid':'p2paid'] += t.amount;
  }

  const catCards = Object.entries(byCat).map(([catId, {p1paid, p2paid}]) => {
    const cat   = getCat(catId);
    const total = p1paid + p2paid;
    const sp    = S.catSplits[catId] || {};
    const mode  = sp.mode || 'even';
    const { p1Share, p2Share, p1Pct } = getCatSplitAmts(catId, total);
    const catNet = p1paid - p1Share; // positive = p2 owes p1
    const netLabel = Math.abs(catNet)<0.005
      ? `<span style="color:var(--green)">Even ✓</span>`
      : catNet>0 ? `<span style="color:var(--p2)">${esc(pn2)} owes ${fc(catNet)}</span>`
                 : `<span style="color:var(--p1)">${esc(pn1)} owes ${fc(-catNet)}</span>`;

    // Mode toggle buttons
    const effectiveMode = (mode === 'even' || mode === 'pct') ? 'pct' : 'dollar';
    const modeBtn = (m, label) => `<button class="scc-mode${effectiveMode===m?' active':''}" onclick="setCatSplitMode('${catId}','${m}')">${label}</button>`;

    // Custom input row
    let customInput = '';
    if (mode === 'pct') {
      customInput = `<div class="scc-custom">
        <span style="color:var(--p1);font-weight:600">${esc(pn1)}</span>
        <input type="number" class="scc-input" min="0" max="100" step="1" value="${p1Pct}"
          oninput="setCatSplitPct('${catId}',+this.value)"> %
        <span style="color:var(--text-3)">·</span>
        <span style="color:var(--p2);font-weight:600">${esc(pn2)}</span> ${100-p1Pct}%
      </div>`;
    } else if (mode === 'dollar') {
      customInput = `<div class="scc-custom">
        <span style="color:var(--p1);font-weight:600">${esc(pn1)}</span> $<input type="number" class="scc-input" min="0" step="1" value="${Math.round(sp.p1Amt??p1Share)}"
          oninput="setCatSplitAmt('${catId}',+this.value)">
        <span style="color:var(--text-3)">·</span>
        <span style="color:var(--p2);font-weight:600">${esc(pn2)}</span> ${fc(p2Share)}
      </div>`;
    }

    // Visual bar — always [p1 | p2] oriented
    const p2Pct = 100 - p1Pct;
    const bar = `<div class="split-track" style="margin:10px 0">
      <div class="split-track-seg" style="background:var(--p1);width:${p1Pct}%">${p1Pct>=16?`${p1Pct}%`:''}</div>
      <div class="split-track-seg" style="background:var(--p2);width:${p2Pct}%">${p2Pct>=16?`${p2Pct}%`:''}</div>
    </div>`;

    return `<div class="scc">
      <div class="scc-top">
        <span class="badge" style="background:${cat.color}20;color:${cat.color}">${cat.emoji} ${cat.label}</span>
        <span class="scc-total">${fc(total)}</span>
      </div>
      <div class="scc-modes">${modeBtn('pct','%')}${modeBtn('dollar','$')}</div>
      ${customInput}
      ${bar}
      <div class="scc-amts">
        <div><div style="color:var(--p1);font-weight:700">${fc(p1Share)}</div><div class="scc-sub">${esc(pn1)}'s share</div></div>
        <div style="text-align:right">${netLabel}</div>
        <div style="text-align:right"><div style="color:var(--p2);font-weight:700">${fc(p2Share)}</div><div class="scc-sub">${esc(pn2)}'s share</div></div>
      </div>
    </div>`;
  }).join('');

  let hero;
  if (Math.abs(net)<0.005) hero=`<div class="split-hero"><div style="font-size:2rem">🎉</div><div class="split-lbl">You're all settled up!</div><div class="split-big split-ok">$0.00</div></div>`;
  else if (net>0) hero=`<div class="split-hero"><div class="split-lbl">${esc(pn2)} owes ${esc(pn1)}</div><div class="split-big split-p2">${fc(net)}</div><div class="text-muted">Across all unsettled shared expenses</div><button class="settle-btn" onclick="settleUp()">Mark as Settled ✓</button></div>`;
  else            hero=`<div class="split-hero"><div class="split-lbl">${esc(pn1)} owes ${esc(pn2)}</div><div class="split-big split-p1">${fc(-net)}</div><div class="text-muted">Across all unsettled shared expenses</div><button class="settle-btn" onclick="settleUp()">Mark as Settled ✓</button></div>`;

  const catSection = active.length
    ? `<div class="scc-grid">${catCards}</div>`
    : `<div class="card"><div class="empty-state"><div class="empty-icon">🤝</div><p>No shared expenses yet</p><p style="margin-top:5px">Mark transactions as Shared in the Transactions tab</p></div></div>`;

  // Settled history
  const settled = S.transactions.filter(t=>t.shared&&t.settled&&t.amount>0&&!getCat(t.category).ignored).sort((a,b)=>b.date.localeCompare(a.date));
  const srow = t=>{ const c=getCat(t.category); const pc=t.person==='p1'?'var(--p1)':'var(--p2)'; const payer=t.person==='p1'?pn1:pn2; return `<tr><td style="color:var(--text-3);font-size:.82rem">${fmtDate(t.date)}</td><td title="${esc(t.description)}">${esc(t.description.slice(0,42))}${t.description.length>42?'…':''}</td><td><span class="badge" style="background:${c.color}20;color:${c.color}">${c.emoji} ${c.label}</span></td><td><span style="color:${pc};font-weight:600">${esc(payer)} paid</span></td><td style="text-align:right;font-weight:600">${fc(t.amount)}</td><td style="text-align:right"><button class="btn-sm" onclick="unsettle('${t.id}')">↩ Unsettle</button></td></tr>`; };
  // ── Mobile: card-based settled history ───────────────────
  let settledSection = '';
  if (settled.length && isMobile()) {
    const settledCards = settled.map(t => {
      const c = getCat(t.category);
      const pc = t.person==='p1' ? 'var(--p1)' : 'var(--p2)';
      const payer = t.person==='p1' ? pn1 : pn2;
      return `<div class="settled-card">
        <div style="font-size:1.2rem;flex-shrink:0">${c.emoji}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.description)}</div>
          <div style="font-size:.75rem;color:var(--text-3);margin-top:2px">${fmtDate(t.date)} · <span style="color:${pc};font-weight:600">${esc(payer)}</span></div>
        </div>
        <div style="font-weight:700;font-size:.9rem;flex-shrink:0">${fc0(t.amount)}</div>
        <button class="btn-sm" onclick="unsettle('${t.id}')" style="flex-shrink:0">↩</button>
      </div>`;
    }).join('');
    settledSection = `
      <div class="ios-section-header" style="display:flex;justify-content:space-between;align-items:center;padding-right:16px">
        Previously Settled <button class="btn-sm" onclick="unsettleAll()">↩ Unsettle All</button>
      </div>
      <div class="settled-card-list">${settledCards}</div>`;
  } else if (settled.length) {
    settledSection = `<div class="card" style="margin-top:16px"><div class="section-title" style="display:flex;justify-content:space-between;align-items:center">Previously Settled <button class="btn-sm" onclick="unsettleAll()">↩ Unsettle All</button></div><table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Paid by</th><th style="text-align:right">Total</th><th></th></tr></thead><tbody>${settled.map(srow).join('')}</tbody></table></div>`;
  }

  return `${hero}${catSection}${settledSection}`;
}

// ── History ────────────────────────────────────────────────
function renderHistory() {
  const allMonths = [...new Set(S.transactions.map(t => t.date.slice(0,7)))]
    .filter(Boolean).sort().reverse();

  if (!allMonths.length) {
    return `<div class="card"><div class="empty-state"><div class="empty-icon">📅</div><p>No transaction history yet</p><p style="margin-top:5px">Upload CSVs in the Transactions tab to get started!</p></div></div>`;
  }

  // Per-month stats
  const monthStats = allMonths.map(mo => {
    const txns = S.transactions.filter(t => t.date.startsWith(mo) && isVisible(t));
    const exp = txns.filter(t => t.amount > 0 && !getCat(t.category).ignored && !t.excluded);
    const total = exp.reduce((s,t) => s+t.amount, 0);
    const p1solo = exp.filter(t => t.person==='p1' && !t.shared).reduce((s,t) => s+t.amount, 0);
    const p2solo = exp.filter(t => t.person==='p2' && !t.shared).reduce((s,t) => s+t.amount, 0);
    const sharedExp = exp.filter(t => t.shared);
    const shared = sharedExp.reduce((s,t) => s+t.amount, 0);
    // per-person share of shared, respecting catSplits
    const sharedByCat = {};
    for (const t of sharedExp) sharedByCat[t.category] = (sharedByCat[t.category]||0) + t.amount;
    let p1sharedAmt = 0, p2sharedAmt = 0;
    for (const [cid, amt] of Object.entries(sharedByCat)) { const {p1Share, p2Share} = getCatSplitAmts(cid, amt); p1sharedAmt += p1Share; p2sharedAmt += p2Share; }
    const p1total = p1solo + p1sharedAmt;
    const p2total = p2solo + p2sharedAmt;
    const p1inc = txns.filter(t => t.amount < 0 && !getCat(t.category).ignored && !t.excluded && t.person==='p1').reduce((s,t) => s+Math.abs(t.amount), 0);
    const p2inc = txns.filter(t => t.amount < 0 && !getCat(t.category).ignored && !t.excluded && t.person==='p2').reduce((s,t) => s+Math.abs(t.amount), 0);
    const income = p1inc + p2inc;
    const net = income - total;
    return { mo, total, p1: p1solo, p2: p2solo, p1total, p2total, p1sharedAmt, p2sharedAmt, p1inc, p2inc, shared, income, net, count: exp.length };
  });

  const inclStats = monthStats.filter(m => !S.excludedFromAvg.includes(m.mo));
  const hv = S.historyView;
  const hvAmt    = m => hv==='p1' ? m.p1total      : hv==='p2' ? m.p2total      : m.total;
  const hvInc    = m => hv==='p1' ? m.p1inc        : hv==='p2' ? m.p2inc        : m.income;
  const hvShared = m => hv==='p1' ? m.p1sharedAmt  : hv==='p2' ? m.p2sharedAmt : m.shared;
  const hvNet    = m => hvInc(m) - hvAmt(m);
  // per-transaction view amount (for heatmap)
  const hvTxnAmt = t => {
    if (!t.shared) return (hv==='combined' || t.person===hv) ? t.amount : 0;
    const {p1Share, p2Share} = getCatSplitAmts(t.category, t.amount);
    return hv==='p1' ? p1Share : hv==='p2' ? p2Share : t.amount;
  };
  const avgTotal = inclStats.length ? inclStats.reduce((s,m) => s+hvAmt(m), 0) / inclStats.length : 0;
  const maxTotal = Math.max(...monthStats.map(s => hvAmt(s)), 1); // all months for bar scale
  const totalAllTime = inclStats.reduce((s,m) => s+hvAmt(m), 0);
  const biggestMo = [...inclStats].sort((a,b) => hvAmt(b)-hvAmt(a))[0];
  const bestSavingsMo = inclStats.filter(m => hvInc(m) > 0).sort((a,b) => hvNet(b)-hvNet(a))[0];

  // ── View toggle ───────────────────────────────────────────
  const toggleHtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div class="section-title" style="margin:0">History</div>
    <div class="hv-toggle">
      <button class="hv-btn${hv==='combined'?' hv-active':''}" onclick="S.historyView='combined';render()">Combined</button>
      <button class="hv-btn${hv==='p1'?' hv-active hv-p1':''}" onclick="S.historyView='p1';render()">${esc(S.settings.person1)}</button>
      <button class="hv-btn${hv==='p2'?' hv-active hv-p2':''}" onclick="S.historyView='p2';render()">${esc(S.settings.person2)}</button>
    </div>
  </div>`;

  // ── Hero cards ────────────────────────────────────────────
  const heroHtml = `<div class="hist-hero">
    <div class="hist-hero-card hh-spent">
      <div class="hist-hero-lbl">All-time Spending</div>
      <div class="hist-hero-val">${fc0(totalAllTime)}</div>
      <div class="hist-hero-sub">${inclStats.length} month${inclStats.length!==1?'s':''} included${S.excludedFromAvg.length?` · ${S.excludedFromAvg.length} excl.`:''}</div>
    </div>
    <div class="hist-hero-card hh-avg">
      <div class="hist-hero-lbl">Avg / Month</div>
      <div class="hist-hero-val">${fc0(avgTotal)}</div>
      <div class="hist-hero-sub">across all months</div>
    </div>
    <div class="hist-hero-card hh-best">
      <div class="hist-hero-lbl">Biggest Month</div>
      <div class="hist-hero-val">${biggestMo ? fc0(hvAmt(biggestMo)) : '—'}</div>
      <div class="hist-hero-sub">${biggestMo ? moLabel(biggestMo.mo) : 'no months included'}</div>
    </div>
    ${bestSavingsMo
      ? `<div class="hist-hero-card hh-income">
          <div class="hist-hero-lbl">Best Savings</div>
          <div class="hist-hero-val" style="color:var(--green)">${fc0(hvNet(bestSavingsMo))}</div>
          <div class="hist-hero-sub">${moLabel(bestSavingsMo.mo)}</div>
        </div>`
      : `<div class="hist-hero-card hh-income">
          <div class="hist-hero-lbl">Total Income</div>
          <div class="hist-hero-val" style="color:var(--green)">${fc0(inclStats.reduce((s,m)=>s+hvInc(m),0))}</div>
          <div class="hist-hero-sub">across all months</div>
        </div>`}
  </div>`;

  // ── Bar chart ─────────────────────────────────────────────
  const chartMonths = [...monthStats].reverse(); // oldest → newest, ALL months shown (excluded = gray)
  const barColor = hv==='p1' ? ['#93c5fd','var(--p1)'] : hv==='p2' ? ['#fda4af','var(--p2)'] : ['#c4b5fd','#8b5cf6'];
  const barMaxH = 160, labelAreaH = 34; // px: bar scale height, label area below bars
  const avgLineH = Math.round(avgTotal / maxTotal * barMaxH);
  // Y-axis grid lines at 25%, 50%, 75% of maxTotal
  const gridHtml = [0.25, 0.5, 0.75].map(pct => {
    const gH = Math.round(pct * barMaxH) + labelAreaH;
    const gVal = maxTotal * pct;
    const gLbl = gVal >= 1000 ? (gVal/1000).toFixed(1).replace(/\.0$/,'')+'k' : Math.round(gVal);
    return `<div style="position:absolute;left:0;right:0;bottom:${gH}px;pointer-events:none;z-index:0;display:flex;align-items:center">
      <span style="width:30px;text-align:right;font-size:.58rem;color:#b0b7c3;flex-shrink:0;padding-right:4px">${gLbl}</span>
      <div style="flex:1;height:1px;background:#eff0f1"></div>
    </div>`;
  }).join('');
  const bars = chartMonths.map((s, i) => {
    const amt = hvAmt(s);
    const inc = hvInc(s);
    const isExcl = S.excludedFromAvg.includes(s.mo);
    const barH = Math.max(Math.round(amt / maxTotal * barMaxH), amt > 0 ? 4 : 0);
    const incH  = inc > 0 && !isExcl ? Math.round(inc / maxTotal * barMaxH) : null;
    const [y, m] = s.mo.split('-');
    const shortLbl = new Date(+y, +m-1, 1).toLocaleDateString('en-US', {month:'short'});
    const isCur = s.mo === S.currentMonth;
    // For trend tip, only compare against included months
    const prevIncl = chartMonths.slice(0, i).reverse().find(p => !S.excludedFromAvg.includes(p.mo));
    let trendTip = '';
    if (!isExcl && prevIncl && hvAmt(prevIncl) > 0) {
      const pct = (amt - hvAmt(prevIncl)) / hvAmt(prevIncl) * 100;
      trendTip = pct > 3 ? ` · ↑${Math.round(pct)}% vs prev` : pct < -3 ? ` · ↓${Math.round(Math.abs(pct))}% vs prev` : '';
    }
    const gradient = isExcl ? 'linear-gradient(180deg,#d1d5db,#9ca3af)' : `linear-gradient(180deg,${barColor[0]},${barColor[1]})`;
    const barOpacity = isExcl ? 0.5 : (isCur ? 1 : 0.6);
    const lblColor = isExcl ? 'var(--text-3)' : (isCur ? 'var(--primary)' : 'var(--text-2)');
    return `<div class="hist-bar-col" onclick="toggleAvgExclude('${s.mo}')" title="${moLabel(s.mo)}: ${fc(amt)}${isExcl?' · excluded from avg':''}${trendTip}${inc > 0 ? ' · Income: '+fc(inc) : ''}" style="cursor:pointer">
      <div class="hist-bar-outer">
        ${incH !== null ? `<div class="hist-inc-dot" style="bottom:${incH}px"></div>` : ''}
        <div class="hist-bar-inner${isCur?' hb-cur':''}" style="height:${barH}px;background:${gradient};opacity:${barOpacity}"></div>
        ${amt > 0 ? `<div style="position:absolute;bottom:${barH+3}px;left:50%;transform:translateX(-50%);font-size:.58rem;font-weight:700;color:${lblColor};white-space:nowrap;pointer-events:none">${fc0(amt)}</div>` : ''}
      </div>
      <div class="hist-bar-lbl" style="${isExcl?'color:var(--text-3);opacity:.6':''}"> ${shortLbl}<br><span style="font-size:.6rem;opacity:.65">'${y.slice(2)}</span></div>
    </div>`;
  }).join('');

  const chartHtml = `<div class="card" style="margin-bottom:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="section-title" style="margin:0">Monthly Spending</div>
      <div style="display:flex;gap:16px;font-size:.75rem;color:var(--text-2);align-items:center">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:11px;border-radius:3px;background:linear-gradient(180deg,${barColor[0]},${barColor[1]});display:inline-block"></span>Spending</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid white;box-shadow:0 0 0 1px rgba(5,150,105,.4);display:inline-block"></span>Income</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:14px;height:0;border-top:2px dashed #c4cadb;display:inline-block"></span>Avg ${fc0(avgTotal)}</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:11px;height:11px;border-radius:3px;background:linear-gradient(180deg,#d1d5db,#9ca3af);display:inline-block;opacity:.5"></span>Excluded</span>
      </div>
    </div>
    <div class="hist-chart-scroll">
      <div class="hist-chart" style="position:relative">
        ${gridHtml}
        <div style="position:absolute;left:0;right:0;bottom:${avgLineH + labelAreaH}px;pointer-events:none;z-index:1;display:flex;align-items:center">
          <span style="width:30px;text-align:right;font-size:.58rem;font-weight:700;color:#8892a4;flex-shrink:0;padding-right:4px">avg</span>
          <div style="flex:1;border-top:2px dashed #c4cadb"></div>
        </div>
        ${bars}
      </div>
    </div>
    <div style="margin-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
      <div style="font-size:.71rem;color:var(--text-3)">Click bar to include/exclude · gray = excluded · hover for details</div>
      <div style="display:flex;gap:6px">
        <button onclick="includeAllMonths()" style="padding:3px 10px;font-size:.72rem;font-weight:600;border:1px solid var(--border);background:white;border-radius:6px;cursor:pointer;color:var(--green)" title="Include all months in averages">All in</button>
        <button onclick="excludeAllMonths()" style="padding:3px 10px;font-size:.72rem;font-weight:600;border:1px solid var(--border);background:white;border-radius:6px;cursor:pointer;color:var(--text-3)" title="Exclude all months from averages">All out</button>
      </div>
    </div>
  </div>`;

  // ── Category heatmap ──────────────────────────────────────
  const recentMonths = allMonths.filter(m => !S.excludedFromAvg.includes(m)).slice(0, 6).reverse();
  const hmTxns = S.transactions.filter(t => t.amount>0 && isVisible(t));
  const allCatIds = [...new Set(hmTxns.map(t => t.category))];
  const catTotals = {};
  for (const cid of allCatIds) {
    catTotals[cid] = hmTxns.filter(t => t.category===cid).reduce((s,t) => s+hvTxnAmt(t), 0);
  }
  const sortedCatIds = [...allCatIds].filter(cid => catTotals[cid] > 0).sort((a,b) => catTotals[b]-catTotals[a]);
  // All categories (for pills) — includes ignored (Insurance etc) and new ones with no data yet
  const allPillCats = getCats();
  // If user hasn't customised, default to top 8 by spend
  if (!S.hmCatFilter) S.hmCatFilter = new Set(sortedCatIds.slice(0, 8));
  const topCats = allPillCats.map(c => c.id).filter(cid => S.hmCatFilter.has(cid));
  const catMax = {};
  for (const cid of topCats) {
    catMax[cid] = Math.max(...recentMonths.map(mo =>
      hmTxns.filter(t=>t.date.startsWith(mo)&&t.category===cid).reduce((s,t)=>s+hvTxnAmt(t),0)
    ), 1);
  }
  const hmHdrs = recentMonths.map(mo => {
    const [y, m] = mo.split('-');
    const isCur = mo === S.currentMonth;
    return `<th style="${isCur?'color:var(--primary)':''}">${new Date(+y,+m-1,1).toLocaleDateString('en-US',{month:'short'})} <span style="font-weight:400;opacity:.55">'${new Date(+y,+m-1,1).toLocaleDateString('en-US',{year:'2-digit'})}</span></th>`;
  }).join('');
  const hmRows = topCats.map(cid => {
    const cat = getCat(cid);
    const monthAmts = recentMonths.map(mo =>
      hmTxns.filter(t=>t.date.startsWith(mo)&&t.category===cid).reduce((s,t)=>s+hvTxnAmt(t),0)
    );
    const avg = monthAmts.reduce((s,a)=>s+a,0) / monthAmts.length;
    const lastAmt = monthAmts[monthAmts.length - 1];
    const trendIcon = avg > 0
      ? (lastAmt > avg * 1.08 ? ` <span style="color:var(--red);font-size:.7rem">↑</span>`
       : lastAmt < avg * 0.92 ? ` <span style="color:var(--green);font-size:.7rem">↓</span>` : '') : '';
    const rowTotal = monthAmts.reduce((s,a)=>s+a,0);
    const cells = monthAmts.map((amt, i) => {
      if (!amt) return `<td><span style="display:block;text-align:right;padding:5px 9px;color:var(--text-3);font-size:.8rem">—</span></td>`;
      const intensity = Math.round(amt / catMax[cid] * 80) + 20;
      const isCur = recentMonths[i] === S.currentMonth;
      const hexAlpha = Math.round(intensity * 2.55).toString(16).padStart(2,'0');
      const textColor = intensity > 55 ? 'white' : cat.color;
      const outline = isCur ? `outline:2px solid ${cat.color};outline-offset:-2px;` : '';
      return `<td><div class="hm-cell" style="background:${cat.color}${hexAlpha};color:${textColor};${outline}" title="${moLabel(recentMonths[i])}: ${fc(amt)}">${fc(amt)}</div></td>`;
    }).join('');
    return `<tr>
      <td style="white-space:nowrap"><span style="display:inline-flex;align-items:center;gap:5px;font-size:.87rem;font-weight:600">${cat.emoji} ${cat.label}${trendIcon}</span></td>
      ${cells}
    </tr>`;
  }).join('');
  const hmColTotals = recentMonths.map(mo => hmTxns.filter(t=>t.date.startsWith(mo)&&topCats.includes(t.category)).reduce((s,t)=>s+hvTxnAmt(t),0));
  const hmTotalRow = `<tr style="border-top:2px solid var(--border);background:#f9fafb">
    <td style="font-size:.75rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em">Total</td>
    ${hmColTotals.map(a=>`<td style="text-align:right;font-weight:700;font-size:.82rem;padding:5px 9px">${fc(a)}</td>`).join('')}
  </tr>`;
  const catPills = allPillCats.map(cat => {
    const on = S.hmCatFilter.has(cat.id);
    return `<button onclick="toggleHmCat('${cat.id}')" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:2px solid ${cat.color};background:${on?cat.color:'transparent'};color:${on?'#fff':cat.color};font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s">${cat.emoji} ${cat.label}</button>`;
  }).join('');
  const hmHtml = `<div class="card" style="margin-bottom:20px;overflow-x:auto">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <div class="section-title" style="margin-bottom:0">Category Heatmap${recentMonths.length < allMonths.length ? ` <span class="text-muted" style="font-weight:400;font-size:.78rem">last ${recentMonths.length} months</span>` : ''}</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${catPills}</div>
    ${topCats.length ? `<table class="hm-tbl">
      <thead><tr><th>Category</th>${hmHdrs}</tr></thead>
      <tbody>${hmRows}${hmTotalRow}</tbody>
    </table>` : `<p class="text-muted" style="text-align:center;padding:20px">Select at least one category above</p>`}
  </div>`;

  // ── Detail table ──────────────────────────────────────────
  const detailRows = monthStats.map((s, i) => {
    const amt = hvAmt(s); const inc = hvInc(s); const net = inc - amt;
    const prev = monthStats[i + 1];
    let chipHtml = '';
    if (prev && hvAmt(prev) > 0) {
      const pct = (amt - hvAmt(prev)) / hvAmt(prev) * 100;
      if (pct > 3)       chipHtml = `<span class="chip-up">↑ ${Math.round(pct)}%</span>`;
      else if (pct < -3) chipHtml = `<span class="chip-down">↓ ${Math.round(Math.abs(pct))}%</span>`;
      else               chipHtml = `<span class="chip-flat">→ flat</span>`;
    }
    const vsAvg = amt - avgTotal;
    const vsAvgHtml = `<span style="font-size:.78rem;font-weight:600;color:${vsAvg>0?'var(--red)':'var(--green)'}">${vsAvg>0?'+':''}${fc(Math.abs(vsAvg))}</span>`;
    const isCur = s.mo === S.currentMonth;
    const isExcl = S.excludedFromAvg.includes(s.mo);
    const td = (content, extra='') => `<td style="text-align:right;${extra}" onclick="S.currentMonth='${s.mo}';S.activeTab='overview';render()">${content}</td>`;
    return `<tr style="cursor:pointer;${isCur?'background:#faf5ff':''}${isExcl?'opacity:.5':''}">
      <td style="white-space:nowrap;font-weight:${isCur?'700':'500'}" onclick="S.currentMonth='${s.mo}';S.activeTab='overview';render()">
        ${moLabel(s.mo)}${isCur?' <span style="font-size:.7rem;background:var(--primary-light);color:var(--primary);padding:1px 6px;border-radius:10px;font-weight:600">current</span>':''}
        ${isExcl?' <span style="font-size:.7rem;background:#fee2e2;color:#dc2626;padding:1px 6px;border-radius:10px;font-weight:600">excl.</span>':''}
      </td>
      ${td(fc(amt), 'font-weight:800;font-size:.95rem')}
      <td style="text-align:center" onclick="S.currentMonth='${s.mo}';S.activeTab='overview';render()">${chipHtml}</td>
      ${td(isExcl?'—':vsAvgHtml+' <span style="font-size:.72rem;color:var(--text-3)">vs avg</span>')}
      ${td(fc(s.p1total), `color:var(--p1);font-size:.85rem;font-weight:${hv==='p1'?'700':'400'}`)}
      ${td(fc(s.p2total), `color:var(--p2);font-size:.85rem;font-weight:${hv==='p2'?'700':'400'}`)}
      ${td(fc(hvShared(s)), 'color:var(--green);font-size:.85rem')}
      ${td(inc>0?(net>=0?'+':'')+fc(Math.abs(net)):'—', `font-weight:600;font-size:.85rem;color:${inc>0?(net>=0?'var(--green)':'var(--red)'):'var(--text-3)'}`)}
      ${td(s.count, 'color:var(--text-3);font-size:.82rem')}
      <td style="text-align:right"><button class="btn-sm" onclick="event.stopPropagation();toggleAvgExclude('${s.mo}')" title="${isExcl?'Include in averages':'Exclude from averages'}">${isExcl?'+ incl':'⊘ excl'}</button></td>
    </tr>`;
  }).join('');
  const avgRow = `<tr style="background:#f9fafb;border-top:2px solid var(--border)">
    <td style="font-size:.75rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em">Avg / month${S.excludedFromAvg.length?` <span style="font-weight:400;font-size:.7rem">(${inclStats.length} mo)</span>`:''}</td>
    <td style="text-align:right;font-weight:800;font-size:.95rem;color:var(--text-2)">${fc(avgTotal)}</td>
    <td></td><td></td>
    <td style="text-align:right;color:var(--p1);font-size:.85rem;font-weight:${hv==='p1'?'700':'400'}">${inclStats.length?fc(inclStats.reduce((s,m)=>s+m.p1total,0)/inclStats.length):'—'}</td>
    <td style="text-align:right;color:var(--p2);font-size:.85rem;font-weight:${hv==='p2'?'700':'400'}">${inclStats.length?fc(inclStats.reduce((s,m)=>s+m.p2total,0)/inclStats.length):'—'}</td>
    <td style="text-align:right;color:var(--text-3);font-size:.85rem">${inclStats.length?fc(inclStats.reduce((s,m)=>s+hvShared(m),0)/inclStats.length):'—'}</td>
    <td></td>
    <td style="text-align:right;color:var(--text-3);font-size:.82rem">${inclStats.length?Math.round(inclStats.reduce((s,m)=>s+m.count,0)/inclStats.length):'—'}</td>
    <td></td>
  </tr>`;
  const detailHtml = `<div class="table-wrap" style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Month</th>
        <th style="text-align:right">${hv==='p1'?esc(S.settings.person1):hv==='p2'?esc(S.settings.person2):'Total'}</th>
        <th style="text-align:center">vs Prior</th>
        <th style="text-align:right">vs Avg</th>
        <th style="text-align:right;color:var(--p1);font-weight:${hv==='p1'?'700':'600'}">${esc(S.settings.person1)}</th>
        <th style="text-align:right;color:var(--p2);font-weight:${hv==='p2'?'700':'600'}">${esc(S.settings.person2)}</th>
        <th style="text-align:right">${hv==='combined'?'Shared':'My Share'}</th>
        <th style="text-align:right">Net Saved</th>
        <th style="text-align:right">Txns</th>
        <th></th>
      </tr></thead>
      <tbody>${detailRows}${avgRow}</tbody>
    </table>
  </div>`;

  // ── Mobile: simplified history view ─────────────────────
  if (isMobile()) {
    // Mobile heatmap: vertical category list with current month + trend
    const hmMobileRows = topCats.map(cid => {
      const cat = getCat(cid);
      const monthAmts = recentMonths.map(mo =>
        hmTxns.filter(t=>t.date.startsWith(mo)&&t.category===cid).reduce((s,t)=>s+hvTxnAmt(t),0)
      );
      const avg = monthAmts.reduce((s,a)=>s+a,0) / Math.max(monthAmts.length,1);
      const lastAmt = monthAmts[monthAmts.length - 1] || 0;
      let trend = '';
      if (avg > 0) {
        if (lastAmt > avg * 1.08) trend = `<span class="hm-mobile-trend" style="color:var(--red)">↑</span>`;
        else if (lastAmt < avg * 0.92) trend = `<span class="hm-mobile-trend" style="color:var(--green)">↓</span>`;
        else trend = `<span class="hm-mobile-trend" style="color:var(--text-3)">→</span>`;
      }
      return `<div class="hm-mobile-row">
        <div class="hm-mobile-cat">${cat.emoji} ${esc(cat.label)}</div>
        <div class="hm-mobile-vals">
          <div class="hm-mobile-amt">${fc0(lastAmt)}</div>
          ${trend}
        </div>
      </div>`;
    }).join('');

    const hmMobileHtml = topCats.length ? `
      <div class="ios-section-header">Category Breakdown${recentMonths.length?` · ${moLabel(recentMonths[recentMonths.length-1])}`:''}
      </div>
      <div class="hm-mobile-list">${hmMobileRows}</div>` : '';

    // Mobile month cards with expandable details
    const monthCards = monthStats.map((s, i) => {
      const amt = hvAmt(s); const inc = hvInc(s); const net = inc - amt;
      const isCur = s.mo === S.currentMonth;
      const isExcl = S.excludedFromAvg.includes(s.mo);
      const prev = monthStats[i + 1];
      let chipHtml = '';
      if (prev && hvAmt(prev) > 0) {
        const pct = (amt - hvAmt(prev)) / hvAmt(prev) * 100;
        if (pct > 3)       chipHtml = `<span class="chip-up">↑ ${Math.round(pct)}%</span>`;
        else if (pct < -3) chipHtml = `<span class="chip-down">↓ ${Math.round(Math.abs(pct))}%</span>`;
        else               chipHtml = `<span class="chip-flat">→ flat</span>`;
      }
      return `<div class="month-card${isExcl?' excluded':''}" onclick="this.querySelector('.month-card-detail').style.display=this.querySelector('.month-card-detail').style.display==='none'?'block':'none'">
        <div class="month-card-top">
          <div class="month-card-title">${moLabel(s.mo)}${isCur?'<span class="cur-badge">current</span>':''}</div>
          <div class="month-card-amt" style="${isExcl?'opacity:.5':''}">${fc0(amt)}</div>
        </div>
        <div class="month-card-row2">
          ${chipHtml}
          <span>${s.count} txn${s.count!==1?'s':''}</span>
          ${inc>0?`<span>· Net: <span style="color:${net>=0?'var(--green)':'var(--red)'};font-weight:600">${net>=0?'+':'−'}${fc0(Math.abs(net))}</span></span>`:''}
        </div>
        <div class="month-card-detail" style="display:none">
          <div class="month-card-detail-row"><span style="color:var(--p1)">${esc(S.settings.person1)}</span><span style="font-weight:700;color:var(--p1)">${fc0(s.p1total)}</span></div>
          <div class="month-card-detail-row"><span style="color:var(--p2)">${esc(S.settings.person2)}</span><span style="font-weight:700;color:var(--p2)">${fc0(s.p2total)}</span></div>
          <div class="month-card-detail-row"><span style="color:var(--green)">Shared</span><span style="font-weight:700;color:var(--green)">${fc0(hvShared(s))}</span></div>
          ${inc>0?`<div class="month-card-detail-row"><span>Income</span><span style="font-weight:700;color:var(--green)">+${fc0(inc)}</span></div>`:''}
          <div style="display:flex;gap:6px;margin-top:8px">
            <button class="btn-sm" onclick="event.stopPropagation();S.currentMonth='${s.mo}';S.activeTab='overview';render()">View month</button>
            <button class="btn-sm" onclick="event.stopPropagation();toggleAvgExclude('${s.mo}')">${isExcl?'+ Include':'⊘ Exclude'}</button>
          </div>
        </div>
      </div>`;
    }).join('');

    const monthCardHtml = `
      <div class="ios-section-header">Monthly Detail <span style="font-weight:400;color:var(--text-3)">· tap to expand</span></div>
      <div class="month-card-list">${monthCards}</div>`;

    return `${toggleHtml}${heroHtml}${chartHtml}${hmMobileHtml}${monthCardHtml}`;
  }

  // ── Desktop: full table layout ─────────────────────────
  return `${toggleHtml}${heroHtml}${chartHtml}${hmHtml}${detailHtml}`;
}

// ── Gambling Tracker ────────────────────────────────────────
const GAMBLING_PLATFORMS = [
  { id:'fanduel',     label:'FanDuel',    kw:['fanduel'] },
  { id:'draftkings',  label:'DraftKings', kw:['draftkings'] },
  { id:'coincasino',  label:'CoinCasino', kw:['coincasino','coin casino'] },
  { id:'kalshi',      label:'Kalshi',     kw:['kalshi'] },
  { id:'inperson',    label:'In Person',  kw:[] },
  { id:'other',       label:'Other',      kw:[] },
];

function detectPlatform(desc) {
  const d = (desc||'').toLowerCase();
  for (const p of GAMBLING_PLATFORMS) {
    if (p.id === 'other') continue;
    if (p.kw.some(k => d.includes(k))) return p.id;
  }
  return 'other';
}

function setOverviewRange(r)  { S.overviewRange = r; render(); }
function setOverviewView(v)   { S.overviewView  = v; render(); }
function shiftCustomRange(d) {
  const months = getOverviewMonths();
  const n = months.length || 1;
  const shiftMo = mo => {
    const [y, m] = mo.split('-').map(Number);
    const date = new Date(y, m - 1 + d * n, 1);
    return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
  };
  S.overviewCustomMonths = (S.overviewCustomMonths.length ? S.overviewCustomMonths : months).map(shiftMo);
  S.overviewRange = 'custom';
  render();
}
function shiftOverviewYear(d) {
  const years = [...new Set(S.transactions.map(t => t.date.slice(0,4)))].filter(Boolean).sort();
  const cur   = S.overviewYear || new Date().getFullYear().toString();
  const idx   = years.indexOf(cur);
  const next  = years[idx + d];
  if (next) { S.overviewYear = next; render(); }
}
function toggleCustomMonth(mo) {
  const sel = new Set(S.overviewCustomMonths);
  sel.has(mo) ? sel.delete(mo) : sel.add(mo);
  S.overviewCustomMonths = [...sel].sort();
  // Update bubble style immediately without closing modal
  const btn = document.getElementById('cpm-' + mo);
  if (btn) {
    const active = sel.has(mo);
    btn.style.background  = active ? 'var(--primary)' : 'white';
    btn.style.color       = active ? 'white' : 'var(--text-2)';
    btn.style.borderColor = active ? 'var(--primary)' : 'var(--border)';
  }
}
function applyOverviewCustomRange() {
  if (S.overviewCustomMonths.length) S.overviewRange = 'custom';
  closeModal(); render();
}
function showOverviewCustomPicker() {
  const allMonths = [...new Set(S.transactions.map(t => t.date.slice(0,7)))].filter(Boolean).sort();
  if (!allMonths.length) return;
  // Pre-select: existing custom selection, or current range months
  const presel = new Set(S.overviewCustomMonths.length ? S.overviewCustomMonths : getOverviewMonths());
  // Group by year
  const byYear = {};
  for (const mo of allMonths) {
    const yr = mo.slice(0,4);
    (byYear[yr] = byYear[yr] || []).push(mo);
  }
  const yearBlocks = Object.entries(byYear).sort(([a],[b]) => b.localeCompare(a)).map(([yr, months]) => {
    const bubbles = months.map(mo => {
      const active = presel.has(mo);
      const shortName = new Date(mo + '-02').toLocaleDateString('en-US', {month:'short'});
      return `<button id="cpm-${mo}" onclick="toggleCustomMonth('${mo}')" style="padding:5px 10px;border-radius:20px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid ${active?'var(--primary)':'var(--border)'};background:${active?'var(--primary)':'white'};color:${active?'white':'var(--text-2)'}">${shortName}</button>`;
    }).join('');
    return `<div style="margin-bottom:12px">
      <div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:6px">${yr}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${bubbles}</div>
    </div>`;
  }).join('');
  showModal(`<div class="modal" style="max-width:380px;width:94vw">
    <h2 style="margin-bottom:14px">Select Months</h2>
    <div style="max-height:55vh;overflow-y:auto;margin-bottom:16px">${yearBlocks}</div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn-sec" style="background:var(--primary);color:white;border-color:var(--primary)" onclick="applyOverviewCustomRange()">Apply</button>
    </div>
  </div>`);
}

function showGamblingModal() {
  showModal(`<div class="modal" style="max-width:620px;width:96vw">
    ${renderGambling()}
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn-sec" onclick="closeModal()">Close</button>
    </div>
  </div>`);
}

function renderGambling() {
  // All gambling transactions (all time)
  const allTxns = S.transactions.filter(t => t.category === 'gambling' && !t.excluded).sort((a,b) => b.date.localeCompare(a.date));

  // P&L — use classified direction if set, else fall back to amount sign
  let totalDeposited = 0, totalWithdrawn = 0;
  for (const t of allTxns) {
    const d = S.gamblingData[t.id];
    const isIn = d ? d.dir === 'in' : t.amount > 0;
    if (isIn) totalDeposited += Math.abs(t.amount);
    else totalWithdrawn += Math.abs(t.amount);
  }
  const netPL = totalWithdrawn - totalDeposited;
  const plColor = netPL >= 0 ? 'var(--green)' : 'var(--red)';
  const plSign  = netPL >= 0 ? '+' : '-';

  // By Book — uses classified book, falls back to auto-detect from description
  const byBook = {};
  for (const t of allTxns) {
    const d = S.gamblingData[t.id];
    const bid = d?.book || detectPlatform(t.description);
    const isIn = d ? d.dir === 'in' : t.amount > 0;
    if (!byBook[bid]) byBook[bid] = { deposited:0, withdrawn:0, count:0 };
    if (isIn) byBook[bid].deposited += Math.abs(t.amount);
    else byBook[bid].withdrawn += Math.abs(t.amount);
    byBook[bid].count++;
  }
  const bookRows = Object.entries(byBook)
    .sort((a,b) => (b[1].deposited + b[1].withdrawn) - (a[1].deposited + a[1].withdrawn))
    .map(([bid, data]) => {

// ── Recurring Income ────────────────────────────────────────
function materializeRecurring() {
  if (!S.recurringIncome || !S.recurringIncome.length) return;
  let added = false;
  for (const rule of S.recurringIncome) {
    const existingDates = new Set(S.transactions.filter(t => t.recurringId === rule.id).map(t => t.date));
    const [ey, em] = S.currentMonth.split('-').map(Number);
    const endDate = new Date(ey, em, 0); // last day of viewing month
    const dates = [];
    if (rule.frequency === 'monthly') {
      const startDay = parseInt(rule.startDate.split('-')[2]);
      let [sy, sm] = rule.startDate.split('-').map(Number);
      while (sy < ey || (sy === ey && sm <= em)) {
        const maxDay = new Date(sy, sm, 0).getDate();
        const day = Math.min(startDay, maxDay);
        dates.push(`${sy}-${String(sm).padStart(2,'0')}-${String(day).padStart(2,'0')}`);
        sm++; if (sm > 12) { sm = 1; sy++; }
      }
    } else if (rule.frequency === 'biweekly') {
      let d = new Date(rule.startDate + 'T12:00:00');
      while (d <= endDate) {
        dates.push(d.toISOString().slice(0,10));
        d = new Date(d.getTime() + 14 * 24 * 60 * 60 * 1000);
      }
    }
    for (const dateStr of dates) {
      if (!existingDates.has(dateStr)) {
        S.transactions.push({ id:uid(), date:dateStr, amount:-rule.amount, description:rule.description,
          category:rule.category, person:rule.person, note:'recurring', shared:false, settled:false,
          splitRatio:0.5, excluded:false, recurringId:rule.id });
        added = true;
      }
    }
  }
  if (added) schedSave();
}

// ── PDF Import (Paystubs + CNB Bank Statements) ─────────────
async function loadPdfJs() {
  if (window.pdfjsLib) return;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
async function extractPdfText(file) {
  await loadPdfJs();
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: ab}).promise;
  // Process each page separately to avoid interleaving multi-page content.
  // Use x-position gaps to determine spacing instead of always inserting spaces.
  const pageTexts = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const vp = page.getViewport({scale: 1});
    const content = await page.getTextContent();
    const items = [];
    for (const item of content.items) {
      if (!item.str.trim()) continue;
      items.push({
        x: item.transform[4],
        y: Math.round(vp.height - item.transform[5]),
        w: item.width * Math.abs(item.transform[0]),
        str: item.str
      });
    }
    items.sort((a, b) => a.y !== b.y ? a.y - b.y : a.x - b.x);
    const lineMap = {};
    for (const item of items) {
      const bucket = Math.round(item.y / 4) * 4;
      if (!lineMap[bucket]) lineMap[bucket] = [];
      lineMap[bucket].push(item);
    }
    const lines = Object.keys(lineMap).sort((a,b)=>a-b).map(k => {
      const row = lineMap[k];
      let line = row[0].str;
      for (let j = 1; j < row.length; j++) {
        const gap = row[j].x - (row[j-1].x + row[j-1].w);
        line += (gap > 3 ? ' ' : '') + row[j].str;

    } else { const wasEmpty=!pendingUpload.length; pendingUpload.push({headers,rows,person,det}); if(wasEmpty) showMapModal(headers,rows,det,person); }
  };
  r.readAsText(file);
}
function doImport(rows, mapping, person) {
  doImportTxns(rowsToTxns(rows, mapping, person));
}
function doImportTxns(txns) {
  const existing = new Set(S.transactions.map(t=>`${t.date}|${t.description}|${t.amount}|${t.person}`));
  const fresh = txns.filter(t=>!existing.has(`${t.date}|${t.description}|${t.amount}|${t.person}`));
  if (!fresh.length) { toast('No new transactions found'); return; }

  // Apply rules to pre-fill category/owner, but always require review
  for (const t of fresh) {
    const rule = applyRules(t.description);
    if (rule) { t.category = rule.category; if (rule.shared !== undefined) t.shared = rule.shared; if (rule.person) t.person = rule.person; }
  }

  pendingReview.push(...fresh);
  updateReviewBadge();
  toast(`📋 ${fresh.length} transaction${fresh.length!==1?'s':''} added to review queue`);
}

let reviewGroups = [];
let groupIdx = 0;
let rowCatExpandIdx = -1;
let reviewSearch = '';

function updateReviewBadge() {
  const badge = $('review-badge');
  const count = $('review-badge-count');
  if (pendingReview.length) { badge.style.display='flex'; count.textContent=pendingReview.length; }
  else badge.style.display='none';
}
function buildReviewGroups() {
  const map = new Map();
  for (const t of pendingReview) {
    const key = normalizeDesc(t.description) || t.description.slice(0,20);
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(t);
  }
  return [...map.values()].sort((a,b) => b.length - a.length);
}
function getFilteredGroups() {
  if (!reviewSearch.trim()) return reviewGroups;
  const q = reviewSearch.trim().toLowerCase();
  return reviewGroups.filter(g => g[0].description.toLowerCase().includes(q) || normalizeDesc(g[0].description).includes(q));
}
function currentGroup() { return getFilteredGroups()[groupIdx]; }
function showCardReview() {
  if (!pendingReview.length) return;
  reviewGroups = buildReviewGroups();
  groupIdx = 0; rowCatExpandIdx = -1;
  renderGroupReview();
}
function setReviewSearch(q) { reviewSearch = q; groupIdx = 0; rowCatExpandIdx = -1; renderGroupReview(); }
function renderGroupReview() {
  if (!pendingReview.length) { closeModal(); updateReviewBadge(); return; }
  reviewGroups = buildReviewGroups();
  const filtered = getFilteredGroups();
  if (groupIdx >= filtered.length) groupIdx = Math.max(0, filtered.length - 1);

  if (!filtered.length) {
    showModal(`<div class="modal grp-modal">
      <div class="grp-search-wrap"><input class="grp-search" type="text" placeholder="🔍 Search merchants…" value="${esc(reviewSearch)}" oninput="setReviewSearch(this.value)" autofocus></div>
      <div style="text-align:center;padding:28px 0;color:var(--text-3)">No matches for "${esc(reviewSearch)}"</div>
      <div class="modal-actions">
        <button class="btn-sec" onclick="setReviewSearch('')">Clear</button>
        <button class="btn-sec" onclick="closeModal()" style="color:var(--text-3)">Close</button>
      </div>
    </div>`);
    return;
  }

  const group = filtered[groupIdx];
  const totalGroups = filtered.length;
  const totalTxns = pendingReview.length;
  const pn1 = S.settings.person1, pn2 = S.settings.person2;
  const firstT = group[0];
  const groupCatId = firstT.category;
  const groupOwnerVal = firstT.shared ? 'shared' : firstT.person;

  const catBtns = getCats().map(c => {
    const sel = groupCatId === c.id;
    return `<button class="card-cat-btn${sel?' sel':''}" onclick="setGroupCat('${c.id}')" style="${sel?`border-color:${c.color};background:${c.color}20`:''}">${c.emoji}<span style="${sel?`color:${c.color}`:''}"> ${c.label}</span></button>`;
  }).join('');

  const ownerSty = (v) => {
    if (v !== groupOwnerVal) return '';
    if (v==='p1') return `style="background:var(--p1-light);border-color:var(--p1);color:var(--p1)"`;
    if (v==='p2') return `style="background:var(--p2-light);border-color:var(--p2);color:var(--p2)"`;
    return `style="background:#d1fae5;border-color:var(--green);color:var(--green)"`;
  };

  const rows = group.map((t, ri) => {
    const oColor = t.shared ? 'var(--green)' : (t.person==='p1' ? 'var(--p1)' : 'var(--p2)');
    const oBg    = t.shared ? '#d1fae5'      : (t.person==='p1' ? 'var(--p1-light)' : 'var(--p2-light)');
    const oLabel = t.shared ? '⇄' : (t.person==='p1' ? esc(pn1) : esc(pn2));
    const cat = getCats().find(c=>c.id===t.category);
    const catDiffers = t.category !== groupCatId;
    const catBtnStyle = catDiffers && cat
      ? `color:${cat.color};border-color:${cat.color};background:${cat.color}15`
      : `color:var(--text-3);border-color:transparent;background:transparent`;
    const catBtnContent = cat ? cat.emoji : '?';
    const expandedCats = rowCatExpandIdx === ri
      ? `<div class="grp-row-cats">${getCats().map(c=>`<button class="card-cat-btn${t.category===c.id?' sel':''}" onclick="setRowCat(${ri},'${c.id}')" style="${t.category===c.id?`border-color:${c.color};background:${c.color}20`:''}">${c.emoji}<span style="${t.category===c.id?`color:${c.color}`:''}"> ${c.label}</span></button>`).join('')}</div>`
      : '';
    return `<div class="grp-row">
      <span class="grp-row-date">${fmtDate(t.date)}</span>
      <span class="grp-row-desc">${esc(t.description)}</span>
      <span class="grp-row-amt${t.amount<0?' grp-inc':''}">${t.amount<0?'+':''}${fc(t.amount)}</span>
      <button class="grp-row-catbtn" onclick="toggleRowCat(${ri})" title="Override category" style="${catBtnStyle}">${catBtnContent}</button>
      <button class="grp-owner-pill" onclick="cycleRowOwner(${ri})" style="background:${oBg};border-color:${oColor};color:${oColor}">${oLabel}</button>
      <button class="grp-del-btn" onclick="deleteReviewRow(${ri})" title="Remove">✕</button>
    </div>${expandedCats}`;
  }).join('');

  const seenCount = filtered.slice(0, groupIdx + 1).reduce((s,g) => s + g.length, 0);
  const isLast = groupIdx >= totalGroups - 1;
  const progressLabel = reviewSearch
    ? `${totalGroups} match${totalGroups!==1?'es':''} · group ${groupIdx+1}/${totalGroups} · ${totalTxns} pending`
    : `Group ${groupIdx+1} of ${totalGroups} · ${totalTxns} pending`;

  showModal(`<div class="modal grp-modal">
    <div class="grp-search-wrap"><input class="grp-search" type="text" placeholder="🔍 Search merchants…" value="${esc(reviewSearch)}" oninput="setReviewSearch(this.value)"></div>
    <div class="card-progress">${progressLabel}</div>
    <div class="grp-header">
      <div class="grp-name">${esc(firstT.description)}</div>
      <div class="grp-count">${group.length} txn${group.length!==1?'s':''}</div>
    </div>
    <div class="grp-rows">${rows}</div>
    <div class="card-label" style="margin-top:12px">Category for all</div>
    <div class="card-cats">${catBtns}</div>
    <div class="card-label">Who pays (for all)</div>
    <div class="card-owners">
      <button class="card-owner-btn" onclick="setGroupOwner('p1')" ${ownerSty('p1')}>${esc(pn1)}</button>
      <button class="card-owner-btn" onclick="setGroupOwner('p2')" ${ownerSty('p2')}>${esc(pn2)}</button>
      <button class="card-owner-btn" onclick="setGroupOwner('shared')" ${ownerSty('shared')}>⇄ Shared</button>
    </div>
    <div class="modal-actions" style="flex-wrap:wrap;gap:7px">
      <button class="btn-sec" onclick="closeModal()" style="color:var(--text-3)">Close</button>
      ${groupIdx>0?`<button class="btn-sec" onclick="groupPrev()">← Back</button>`:''}
      <button class="btn-sec" onclick="deleteReviewGroup()" style="color:var(--red);border-color:var(--red)" title="Remove all ${group.length} transaction${group.length!==1?'s':''} in this group">🗑 Delete group</button>
      <div style="flex:1"></div>
      <button class="btn-sec" onclick="saveReviewedGroups()">Save ${seenCount} &amp; close</button>
      <button class="btn-sec" style="background:var(--primary);color:white;border-color:var(--primary)" onclick="${isLast?'confirmCardReview()':'groupNext()'}">
        ${isLast?'✓ Import all':'Next →'}
      </button>
    </div>
  </div>`);
}
function setGroupCat(cat) {
  const g = currentGroup(); if(!g) return;
  for (const t of g) { t.category=cat; learnRule(t.description, t.shared, cat, t.person); }
  rowCatExpandIdx = -1; renderGroupReview();
}
function setGroupOwner(val) {
  const g = currentGroup(); if(!g) return;
  for (const t of g) {
    if (val==='shared') { t.shared=true; } else { t.person=val; t.shared=false; }
    learnRule(t.description, t.shared, t.category, t.person);
  }
  renderGroupReview();
}
function cycleRowOwner(ri) {
  const t = currentGroup()[ri]; if(!t) return;
  if (!t.shared && t.person==='p1') { t.person='p2'; t.shared=false; }
  else if (!t.shared && t.person==='p2') { t.shared=true; }
  else { t.shared=false; t.person='p1'; }
  learnRule(t.description, t.shared, t.category, t.person);
  renderGroupReview();
}
function toggleRowCat(ri) { rowCatExpandIdx = rowCatExpandIdx===ri ? -1 : ri; renderGroupReview(); }
function setRowCat(ri, cat) {
  const t = currentGroup()[ri]; if(!t) return;
  t.category=cat; learnRule(t.description, t.shared, cat, t.person);
  rowCatExpandIdx=-1; renderGroupReview();
}
function deleteReviewRow(ri) {
  const t = currentGroup()[ri]; if(!t) return;
  pendingReview = pendingReview.filter(x=>x!==t);
  rowCatExpandIdx=-1; renderGroupReview();
}
function deleteReviewGroup() {
  const g = currentGroup(); if(!g) return;
  const groupSet = new Set(g);
  pendingReview = pendingReview.filter(t=>!groupSet.has(t));
  rowCatExpandIdx=-1;
  // stay at same index (next group slides in), but clamp if at end
  const newFiltered = getFilteredGroups();
  if (groupIdx >= newFiltered.length) groupIdx = Math.max(0, newFiltered.length-1);
  renderGroupReview();
}
function groupNext() {
  const f = getFilteredGroups();
  if (groupIdx < f.length-1) { groupIdx++; rowCatExpandIdx=-1; renderGroupReview(); }
  else confirmCardReview();
}
function groupPrev() { if(groupIdx>0){groupIdx--;rowCatExpandIdx=-1;renderGroupReview();} }
function saveReviewedGroups() {
  const filtered = getFilteredGroups();
  const toSaveSet = new Set();
  for (let g=0; g<=groupIdx && g<filtered.length; g++) for (const t of filtered[g]) toSaveSet.add(t);
  const toSave = pendingReview.filter(t=>toSaveSet.has(t));
  if (!toSave.length) { closeModal(); return; }
  const remaining = pendingReview.filter(t=>!toSaveSet.has(t));
  for (const t of toSave) learnRule(t.description, t.shared, t.category, t.person);
  S.transactions.push(...toSave);
  const months = [...new Set(toSave.map(t=>t.date.slice(0,7)))].sort();
  S.currentMonth = months[months.length-1];
  const n = toSave.length;
  pendingReview=remaining; groupIdx=0; rowCatExpandIdx=-1; reviewSearch='';
  schedSave(); closeModal(); updateReviewBadge(); render();
  toast(`✅ Imported ${n} transaction${n!==1?'s':''}${remaining.length?' · '+remaining.length+' still pending':''}`);
}
function confirmCardReview() {
  if (!pendingReview.length) return;
  for (const t of pendingReview) learnRule(t.description, t.shared, t.category, t.person);
  S.transactions.push(...pendingReview);
  const months = [...new Set(pendingReview.map(t=>t.date.slice(0,7)))].sort();
  S.currentMonth = months[months.length-1];
  const n = pendingReview.length;
  pendingReview=[]; groupIdx=0; rowCatExpandIdx=-1; reviewSearch='';
  schedSave(); closeModal(); updateReviewBadge(); render();
  toast(`✅ Imported ${n} transaction${n!==1?'s':''}`);
}

function showMapModal(headers,rows,det,person) {
  const pn = person==='p1'?S.settings.person1:S.settings.person2;
  const opts = headers.map(h=>`<option value="${esc(h)}">${esc(h)}</option>`).join('');
  const none = `<option value="">-- none --</option>`+opts;
  const sel = (col,base=opts) => col?base.replace(`value="${esc(col)}"`,`value="${esc(col)}" selected`):base;
  const preview = rows.slice(0,3).map(r=>Object.values(r).slice(0,5).join(' | ')).join('\n');
  showModal(`<div class="modal"><h2>📋 Map CSV Columns</h2><p>We couldn't auto-detect ${esc(pn)}'s CSV format. Match the columns below:</p><div class="col-grid"><div class="form-row"><label>Date column *</label><select id="mc-date" class="form-sel">${sel(det.dateCol)}</select></div><div class="form-row"><label>Description *</label><select id="mc-desc" class="form-sel">${sel(det.descCol)}</select></div><div class="form-row"><label>Amount (single col)</label><select id="mc-amt" class="form-sel">${sel(det.amtCol,none)}</select></div><div class="form-row"><label>Amount sign</label><select id="mc-inv" class="form-sel"><option value="auto">Auto-detect</option><option value="1">Negative = expense</option><option value="0">Positive = expense</option></select></div><div class="form-row"><label>Debit column</label><select id="mc-deb" class="form-sel">${sel(det.debitCol,none)}</select></div><div class="form-row"><label>Credit column</label><select id="mc-cred" class="form-sel">${sel(det.creditCol,none)}</select></div></div><div style="background:#f9fafb;border-radius:8px;padding:10px;margin-bottom:4px;font-size:.78rem;color:var(--text-2);font-family:monospace;white-space:pre">${esc(preview)}</div><div class="modal-actions"><button class="btn-sec" onclick="closeModal()">Cancel</button><button class="btn-sec" style="background:var(--primary);color:white;border-color:var(--primary)" onclick="applyMap()">Import →</button></div></div>`);
}
function applyMap() {
  if (!pendingUpload.length) return;
  const {rows,person} = pendingUpload[0];
  const dateCol=$('mc-date').value, descCol=$('mc-desc').value;
  if (!dateCol||!descCol) { toast('Select date and description columns'); return; }
  const amtCol=$('mc-amt').value||null, debitCol=$('mc-deb').value||null, creditCol=$('mc-cred').value||null;
  const invV=$('mc-inv').value;
  let invert; if(invV==='auto'&&amtCol){const samp=rows.slice(0,10).map(r=>parseAmt(r[amtCol])).filter(n=>n!==null);invert=samp.some(n=>n<0);}else invert=invV==='1';
  pendingUpload.shift(); closeModal();
  doImport(rows,{dateCol,descCol,amtCol,debitCol,creditCol,invert},person);
  if(pendingUpload.length){const n=pendingUpload[0];showMapModal(n.headers,n.rows,n.det,n.person);}
}

// ── Export: download all data as a local JSON file ──────────
function doExportJson() {
  const data = { _exportDate: new Date().toISOString(), transactions: S.transactions, budgets: S.budgets, settings: S.settings, rules: S.rules, customCategories: S.customCategories, catSplits: S.catSplits, excludedFromAvg: S.excludedFromAvg, recurringIncome: S.recurringIncome, gamblingData: S.gamblingData };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'budget-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Exported!');
}

// ── Import: restore data from a local JSON file ─────────────
function doImportJson(evt) {
  const file = evt.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      delete data._exportDate; delete data._backupDate;
      if (!Array.isArray(data.transactions)) { toast('Invalid backup file'); return; }
      if (!confirm(`Restore ${data.transactions.length} transactions from this backup? Current data will be overwritten.`)) return;
      if (USE_GAS()) {
        toast('Restoring…');
        google.script.run
          .withSuccessHandler(() => { toast('Restored! Reloading…'); setTimeout(() => location.reload(), 1200); })
          .withFailureHandler(ex => toast('Error: ' + (ex.message || String(ex))))
          .importDataJson(e.target.result);
      } else {
        Object.assign(S, { transactions: data.transactions || [], budgets: data.budgets || {}, settings: Object.assign(S.settings, data.settings || {}), rules: data.rules || {}, customCategories: data.customCategories || [], catSplits: data.catSplits || {}, excludedFromAvg: data.excludedFromAvg || [], recurringIncome: data.recurringIncome || [], gamblingData: data.gamblingData || {}, incomeData: data.incomeData || {}, incomeTypeRules: data.incomeTypeRules || {} });
        schedSave(); closeModal(); render(); toast('Restored!');
      }
    } catch(ex) { toast('Could not read file: ' + ex.message); }
  };
  reader.readAsText(file);
}

function finishSetup() {

function finishSetupWithSheet() {
  const url = ($('su-sheet-url').value || '').trim();

  const btn = document.querySelector('#su-sheet-url + button');
  if (btn) { btn.disabled = true; btn.textContent = 'Linking…'; }
  google.script.run
    .withSuccessHandler(() => { closeModal(); toast('Sheet linked! Reloading…'); setTimeout(() => location.reload(), 1200); })
    .withFailureHandler(e => { toast('Error: ' + (e.message || 'Could not link sheet. Check the URL and try again.')); if (btn) { btn.disabled = false; btn.textContent = 'Link & Load'; } })

function loadData() {

  // Demo mode: no Google connection available (preview / localhost without credentials)
  if (!USE_GAS() && !localStorage.getItem('bt_client_id')) {
    setTimeout(() => {
      const data = getDemoData();
      Object.assign(S.settings, data.settings);
      S.transactions = data.transactions; S.budgets = data.budgets; S.rules = data.rules;
      S.customCategories = data.customCategories; S.catSplits = data.catSplits;
      S.excludedFromAvg = data.excludedFromAvg; S.recurringIncome = data.recurringIncome;
      S.gamblingData = data.gamblingData; S.incomeData = data.incomeData; S.incomeTypeRules = data.incomeTypeRules;
      $('loading').style.display = 'none';
      $('app').style.display = 'flex';
      _initLongPress();
      render();
      updateReviewBadge();
    }, 600);
    return;
  }
  const loadTimeout = setTimeout(() => {
    $('loading').innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:3.5rem;margin-bottom:16px">⏱️</div>
        <h2 style="font-size:1.4rem;font-weight:800;margin-bottom:10px">Taking too long</h2>

        <button onclick="manualSignIn()" style="padding:14px 32px;background:white;color:#D4663A;border:1.5px solid #D4663A;border-radius:12px;font-size:1.05rem;font-weight:700;cursor:pointer">Re-sign in</button>
      </div>`;
  }, 15000);
  DB.load(
    data => {
      clearTimeout(loadTimeout);
      Object.assign(S.settings, data.settings);
      S.transactions = data.transactions;
      S.budgets = data.budgets;
      S.rules = data.rules || {};
      S.customCategories = data.customCategories || [];
      S.catSplits = data.catSplits || {};
      S.excludedFromAvg = data.excludedFromAvg || [];
      // Prefer localStorage — survives a quick refresh before the debounced Sheets save fires
      try { const ls = localStorage.getItem('bt_excl_months'); if (ls) S.excludedFromAvg = JSON.parse(ls); } catch(e) {}
      S.recurringIncome = data.recurringIncome || [];
      S.gamblingData     = data.gamblingData     || {};
      S.incomeData       = data.incomeData       || {};
      S.incomeTypeRules  = data.incomeTypeRules  || {};

      const curMoTxns = S.transactions.filter(t => t.date && t.date.startsWith(S.currentMonth));

}

// ── Init ───────────────────────────────────────────────────
function init() {
  $('nav').addEventListener('click', e => { const b=e.target.closest('button[data-tab]'); if(b){S.activeTab=b.dataset.tab; render();} });
  $('bottom-nav').addEventListener('click', e => { const b=e.target.closest('button[data-tab]'); if(b){S.activeTab=b.dataset.tab; window.scrollTo(0,0); render();} });
  $('prev-mo').addEventListener('click', () => {
    if (S.activeTab === 'overview' && S.overviewRange === 'ytd') { shiftOverviewYear(-1); return; }
    const[y,m]=S.currentMonth.split('-').map(Number); const d=new Date(y,m-2,1); S.currentMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; materializeRecurring(); render();
  });
  $('next-mo').addEventListener('click', () => {
    if (S.activeTab === 'overview' && S.overviewRange === 'ytd') { shiftOverviewYear(1); return; }
    const[y,m]=S.currentMonth.split('-').map(Number); const d=new Date(y,m,1); S.currentMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; materializeRecurring(); render();
  });
  $('settings-btn').addEventListener('click', showSettings);
  $('sheets-btn').addEventListener('click', () => {
    DB.sheetUrl(url => { if (url) window.open(url,'_blank'); else toast('No sheet connected'); });
  });

  // ── Offline/online detection ──────────────────────────────
  window.addEventListener('offline', () => {
    if (!document.getElementById('offline-banner')) {
      const b = document.createElement('div');
      b.id = 'offline-banner';
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#fef3c7;color:#92400e;text-align:center;font-size:.82rem;font-weight:600;padding:6px 12px;padding-top:calc(6px + env(safe-area-inset-top))';
      b.textContent = 'You\'re offline — showing cached data';
      document.body.prepend(b);
    }
  });
  window.addEventListener('online', () => {
    const b = document.getElementById('offline-banner');
    if (b) b.remove();
    if (!S.transactions.length) loadData();
  });

  // ── Swipe between tabs on mobile ─────────────────────────
  const TABS = ['overview','transactions','split','history'];
  let _swipeX = 0, _swipeY = 0, _swipeInCarousel = false;
  const mainEl = $('main');
  mainEl.addEventListener('touchstart', e => {
    _swipeX = e.touches[0].clientX;
    _swipeY = e.touches[0].clientY;
    _swipeInCarousel = !!e.target.closest('.ov-carousel');
  }, {passive: true});
  mainEl.addEventListener('touchend', e => {
    if (_swipeInCarousel) return;
    const dx = e.changedTouches[0].clientX - _swipeX;
    const dy = e.changedTouches[0].clientY - _swipeY;
    if (Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
    const idx = TABS.indexOf(S.activeTab);
    if (dx < 0 && idx < TABS.length - 1) {
      S.activeTab = TABS[idx + 1]; window.scrollTo(0, 0);
      navigator.vibrate && navigator.vibrate(6);
      render();
    } else if (dx > 0 && idx > 0) {
      S.activeTab = TABS[idx - 1]; window.scrollTo(0, 0);
      navigator.vibrate && navigator.vibrate(6);
      render();
    }
  }, {passive: true});

  if (USE_GAS()) {
    loadData();
  } else if (!CFG.clientId || !CFG.sheetId) {
    loadData(); // demo mode — getDemoData() fires since no credentials
  } else if (getToken()) {
    // Token already cached in sessionStorage — load with no popup
    loadData();
  } else {
    $('loading').innerHTML = `
      <div style="text-align:center">
        <div style="font-size:4rem;margin-bottom:14px">💕</div>
        <h2 style="font-size:1.6rem;font-weight:800;margin-bottom:10px;letter-spacing:-0.02em">Budget Together</h2>
        <p style="color:#6b7280;font-size:1.05rem;margin-bottom:24px">Sign in to load your budget</p>
        <button onclick="loadData()" style="padding:14px 32px;background:#D4663A;color:white;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer">Sign in with Google</button>
        <p style="margin-top:20px;font-size:.88rem;color:#9ca3af"><a href="#" onclick="localStorage.removeItem('bt_client_id');localStorage.removeItem('bt_sheet_id');location.reload();return false" style="color:#9ca3af">Reset config</a></p>
      </div>`;
  }
}

function waitForGIS(cb, attempts) {
  attempts = attempts || 0;
  if (typeof google !== 'undefined' && google.accounts) { cb(); return; }
  if (attempts > 160) { // ~8 seconds
    $('loading').innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:3.5rem;margin-bottom:16px">⚠️</div>
        <h2 style="font-size:1.4rem;font-weight:800;margin-bottom:10px">Couldn't connect to Google</h2>
        <p style="color:#6b7280;font-size:1rem;margin-bottom:24px;max-width:320px;margin-left:auto;margin-right:auto">Google's sign-in script failed to load. Check your internet connection and try again.</p>
        <button onclick="location.reload()" style="padding:14px 32px;background:#D4663A;color:white;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer">Retry</button>
      </div>`;
    return;
  }
  setTimeout(() => waitForGIS(cb, attempts + 1), 50);
}
// ── Service Worker (best-effort, inline blob) ────────────
try {
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'bt-v1';
      const PRECACHE = [
        'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap'
      ];
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(PRECACHE)).then(() => self.skipWaiting()));
      });
      self.addEventListener('activate', e => {
        e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k => k !== CACHE).map(k => caches.delete(k)))).then(() => self.clients.claim()));
      });
      self.addEventListener('fetch', e => {
        if (e.request.method !== 'GET') return;
        e.respondWith(
          caches.match(e.request).then(cached => {
            const fresh = fetch(e.request).then(r => {
              if (r.ok) caches.open(CACHE).then(c => c.put(e.request, r.clone()));
              return r;
            }).catch(() => cached);
            return cached || fresh;
          })
        );
      });
    `;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
  }
} catch(e) {}

document.addEventListener('DOMContentLoaded', () => {
  // Activate Lucide icons in loading screen

  if (USE_GAS()) { init(); return; }
  waitForGIS(init);
});
