  <script>
    (function(){
      // Force viewport meta inside GAS iframe
      if (window.self !== window.top) {
        var vp = document.querySelector('meta[name="viewport"]');
        if (vp) vp.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover';
        // Try to hide GAS "created by" banner in parent
        try { parent.document.querySelector('.apps-script-banner')?.remove(); } catch(e){}
      }
      // GAS iframe renders at a virtual ~980px viewport then scales the page down to fit
      // the real device screen (~390px). Detect and compensate with CSS zoom so all
      // our sizes render at the intended physical size.
      if (navigator.maxTouchPoints > 0 && window.screen.width > 0) {
        var _sw = window.screen.width;   // actual device CSS px width (e.g. 390)
        var _iw = window.innerWidth;     // layout viewport (e.g. 980 in GAS iframe)
        if (_iw > _sw * 1.5) {
          document.documentElement.style.zoom = _iw / _sw;
        }
      }
      var m = {name:"Budget Together",short_name:"Budget",display:"standalone",orientation:"portrait",
        background_color:"#F2F2F7",theme_color:"#F2F2F7",
        start_url: location.href.split('?')[0],
        icons:[{src:"data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Crect%20width='512'%20height='512'%20rx='115'%20fill='%23D4663A'/%3E%3Ctext%20x='256'%20y='340'%20font-size='280'%20text-anchor='middle'%3E%F0%9F%92%95%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
      var l = document.createElement('link'); l.rel='manifest';
      l.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(m));
      document.head.appendChild(l);
    })();
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* ═══════════════════════════════════════════════════════════
       BUDGET TOGETHER — "Cupertino Finance" Design System
       Premium Apple-grade interface with warm refinement
       ═══════════════════════════════════════════════════════════ */
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

    :root {
      /* ── Almond Design System Tokens ─────────────────── */
      /* Page & Surfaces */
      --bg: #F0EDE6;
      --surface: #F8F2EA;
      --surface-border: #e8ddd0;
      --hover-bg: #F8F2EA;
      --ring-track: #e8ddd0;

      /* Text Hierarchy */
      --text: #3A3020;
      --text-2: #9A8A78;
      --text-3: #b0a090;
      --text-sub: #7A6A58;
      --text-inverse: #fff;

      /* Borders & Separators */
      --border: #f0ede6;
      --border-strong: #e8ddd0;

      /* Brand & Accent */
      --primary: #D4663A;
      --primary-hover: #C05A30;
      --primary-light: rgba(212,102,58,0.08);

      /* Semantic Colors */
      --green: #3A6A3A;
      --red: #A84A2A;
      --yellow: #A08040;
      --purple: #685880;

      /* Person Colors */
      --p1: #4A6AAA;
      --p1-light: rgba(74,106,170,0.08);
      --p2: #9A3A6A;
      --p2-light: rgba(154,58,106,0.08);

      /* Navigation */
      --nav-active-bg: #D4663A;
      --nav-active-text: #fff;
      --nav-inactive: #999;
      --nav-track: rgba(0,0,0,0.05);

      /* Review / Warning */
      --warning: #A08040;
      --warning-light: rgba(160,128,64,0.1);

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.03);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      --shadow-hover: 0 12px 40px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.06);

      /* Radii */
      --radius: 16px;
      --radius-lg: 20px;
      --radius-pill: 12px;
      --radius-sm: 8px;

      /* Typography */
      --font-stack: 'DM Sans', -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      --font-mono: 'DM Mono', 'SF Mono', 'Menlo', monospace;

      /* Motion */
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);

      /* ── Legacy aliases (used throughout JS-generated HTML) ── */
      --ios-bg: var(--bg);
      --ios-card: var(--surface);
      --ios-separator: var(--border-strong);
      --ios-red: var(--red);
      --ios-green: var(--green);
      --ios-blue: var(--p1);
      --ios-orange: var(--warning);
      --ios-accent: var(--primary);
      --ios-secondary-label: var(--text-2);
      --ios-tertiary-label: var(--text-3);
      --ios-fill: var(--hover-bg);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-stack);background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.5;overscroll-behavior:none;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
    button,a,[role="button"]{touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;transition:transform 0.2s var(--ease-spring), opacity 0.15s, box-shadow 0.2s}
    button:active,[role="button"]:active{transform:scale(0.97);opacity:0.85}
    button:hover{opacity:0.9}
    #app{display:flex;flex-direction:column;min-height:100vh}

    /* Header — Almond Design System */
    header{background:#E8E4DA;border-bottom:1px solid #ddd8cc;padding:0 20px;padding-top:env(safe-area-inset-top);display:flex;align-items:center;gap:16px;height:calc(48px + env(safe-area-inset-top));position:sticky;top:0;z-index:100}
    .logo{font-size:13px;font-weight:800;color:var(--text-3);white-space:nowrap;letter-spacing:2px;text-transform:uppercase}
    nav{display:flex;gap:18px;flex:1}
    nav button{padding:6px 0;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#999;transition:color 0.2s;-webkit-tap-highlight-color:transparent;font-family:var(--font-stack);letter-spacing:-0.01em}
    nav button:active{transform:scale(0.97)}
    nav button.active{color:var(--primary);font-weight:800}
    nav button:hover{color:var(--text-2)}
    .month-nav{display:flex;align-items:center;gap:6px;font-weight:900;font-size:16px;color:var(--text);white-space:nowrap;letter-spacing:-0.03em}
    .month-nav button{border:none;background:none;cursor:pointer;color:var(--text-3);font-size:16px;padding:4px;display:flex;align-items:center;-webkit-tap-highlight-color:transparent;transition:color 0.15s}
    .month-nav button:hover{color:var(--text-2)}
    .month-nav button:active{transform:scale(0.9)}
    .icon-btn{width:32px;height:32px;border:none;background:var(--hover-bg);border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-2);-webkit-tap-highlight-color:transparent;transition:all 0.2s var(--ease-spring)}
    .icon-btn:hover{background:var(--surface-border);color:var(--text)}
    .icon-btn:active{transform:scale(0.9)}
    .lock-btn{padding:5px 14px;border:none;background:var(--hover-bg);border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:all 0.2s}
    .lock-btn:hover{background:var(--surface-border)}
    .lock-btn:active{transform:scale(0.96)}
    .save-status{font-size:11px;font-weight:700;color:var(--text-3);white-space:nowrap;letter-spacing:0.02em;text-transform:uppercase}
    .save-status.saving{color:var(--yellow)}
    .save-status.saved{color:var(--green)}
    .save-status.error{color:var(--red)}
    main{flex:1;padding:20px 24px;max-width:100%;margin:0 auto;width:100%}

    /* Loading overlay */
    #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:0}
    .load-title{font-size:38px;font-weight:900;letter-spacing:-1.5px}
    .load-dots{display:flex;gap:6px;margin-top:14px}
    .load-dots div{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:loadDot 1.4s ease-in-out infinite}
    .load-dots div:nth-child(2){animation-delay:0.2s}
    .load-dots div:nth-child(3){animation-delay:0.4s}
    @keyframes loadDot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

    /* Cards — Almond Design */
    .card{background:var(--surface);border-radius:var(--radius);box-shadow:none;border:2px solid var(--surface-border);padding:20px;margin:0 0 14px 0;transition:transform 0.2s var(--ease-spring)}
    .section-title{font-size:11px;font-weight:700;margin-bottom:14px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em}
    .text-muted{color:var(--ios-tertiary-label);font-size:13px}

    /* Stats grid */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
    @media(max-width:700px),(pointer:coarse){.stats-grid{grid-template-columns:1fr 1fr}}
    .stat-card{background:var(--surface);border-radius:var(--radius);box-shadow:none;border:2px solid var(--surface-border);padding:20px;position:relative;overflow:hidden;transition:transform 0.2s var(--ease-spring)}
    .stat-card:hover{transform:translateY(-1px)}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
    .stat-card.s-total::before{background:linear-gradient(90deg, var(--ios-accent), #FF8A6B)}
    .stat-card.s-p1::before{background:linear-gradient(90deg, var(--ios-blue), #5B9CF6)}
    .stat-card.s-p2::before{background:linear-gradient(90deg, var(--p2), #FF6B9A)}
    .stat-card.s-shared::before{background:linear-gradient(90deg, var(--ios-green), #4DD67F)}
    .stat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:8px}
    .stat-value{font-size:28px;font-weight:800;line-height:1;letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
    .stat-sub{font-size:12px;color:var(--text-3);margin-top:6px;font-weight:500}
    .stat-split{font-size:12px;margin-top:6px;color:var(--text-3);font-weight:500}
    .income-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
    .income-card{background:var(--surface);border-radius:var(--radius);box-shadow:none;border:2px solid var(--surface-border);padding:20px;position:relative;overflow:hidden;transition:transform 0.2s var(--ease-spring)}
    .income-card:hover{transform:translateY(-1px)}
    .income-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;background:var(--border)}
    .income-card.ic-p1::before{background:linear-gradient(90deg, var(--ios-blue), #5B9CF6)}
    .income-card.ic-p2::before{background:linear-gradient(90deg, var(--p2), #FF6B9A)}
    .income-card.ic-combined::before{background:linear-gradient(90deg, var(--ios-accent), #FF8A6B)}
    .income-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:12px}
    .income-line{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0}
    .income-line+.income-line{border-top:1px solid rgba(0,0,0,0.04)}
    .income-line.net-line{margin-top:6px;padding-top:8px;border-top:1px solid rgba(0,0,0,0.06) !important}
    .income-lbl{font-size:13px;color:var(--text-3);font-weight:500}
    .income-amt{font-size:15px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
    .income-sub{font-size:12px !important;opacity:.6;font-weight:500 !important}
    .income-amt.g{color:var(--ios-green)}
    .income-amt.r{color:var(--ios-red)}
    @media(max-width:700px),(pointer:coarse){.income-row{grid-template-columns:1fr}}

    /* ── Summary Card (Ring Center Stage) — "Almond" theme ── */
    .rcs-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
    .rcs-card{background:var(--surface);border-radius:var(--radius);padding:24px;border:2px solid var(--surface-border);transition:transform 0.2s var(--ease-spring)}
    .rcs-card:hover{transform:translateY(-2px)}
    .rcs-title{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:900;color:#222;letter-spacing:-0.3px;margin-bottom:16px}
    .rcs-body{display:flex;gap:20px;align-items:center;justify-content:center}
    .rcs-col{flex:1;min-width:0}
    .rcs-col-right{text-align:right}
    .rcs-label{font-family:'DM Sans',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
    .rcs-number{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:900;letter-spacing:-1.5px;line-height:1.15}
    .rcs-breakdown{margin-top:6px;display:flex;flex-direction:column;gap:0;font-family:'DM Sans',sans-serif}
    .rcs-ring-wrap{position:relative;width:120px;height:120px;flex-shrink:0}
    .rcs-ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
    .rcs-ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .rcs-ring-dollar{font-family:'DM Sans',sans-serif;font-size:19px;font-weight:900;letter-spacing:-0.5px}
    .rcs-ring-pct{font-family:'DM Sans',sans-serif;font-size:20px;font-weight:800;margin-top:5px}
    @media(max-width:900px){.rcs-row{grid-template-columns:1fr}}

    /* Charts row */
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:700px),(pointer:coarse){.charts-row{grid-template-columns:1fr}}

    /* Category bars */
    .cat-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:3px 0;transition:opacity 0.15s}
    .cat-row:hover{opacity:0.85}
    .cat-name{width:130px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;flex-shrink:0;color:var(--text);letter-spacing:-0.01em}
    .cat-track{flex:1;height:8px;background:rgba(0,0,0,0.04);border-radius:4px;overflow:hidden}
    .cat-fill{height:100%;border-radius:4px;transition:width .4s var(--ease-out)}
    .cat-amt{width:68px;text-align:right;font-size:14px;font-weight:700;color:var(--text-2);font-variant-numeric:tabular-nums;letter-spacing:-0.02em}

    /* Vertical comparison bars */
    .vert-chart{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
    .vbar-group{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
    .vbar-pair{display:flex;align-items:flex-end;gap:4px;height:120px}
    .vbar-cur,.vbar-avg{width:20px;border-radius:6px 6px 0 0;min-height:4px;transition:height 0.4s var(--ease-out)}
    .vbar-avg{background:rgba(0,0,0,0.08)}
    .vbar-lbl{font-size:12px;text-align:center;margin-top:6px;line-height:1;color:var(--text-3)}
    .vert-legend{display:flex;gap:14px;margin-bottom:12px;font-size:12px;font-weight:600;color:var(--text-3);align-items:center}
    .vert-legend span{display:flex;align-items:center;gap:5px}
    .vert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}

    /* Top merchants */
    .merchant-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}
    @media(max-width:700px),(pointer:coarse){.merchant-grid{grid-template-columns:1fr}}
    .merchant-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.04);transition:opacity 0.15s}
    .merchant-row:hover{opacity:0.8}
    .merchant-row:last-child{border-bottom:none}
    .merchant-rank{font-size:11px;font-weight:700;color:var(--text-3);width:20px;text-align:right;flex-shrink:0;letter-spacing:0.02em}
    .merchant-name{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-0.01em}
    .merchant-meta{font-size:11px;color:var(--text-3);white-space:nowrap;font-weight:600}
    .merchant-amt{font-size:14px;font-weight:700;white-space:nowrap;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}

    /* Upload */
    .upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
    @media(max-width:700px),(pointer:coarse){.upload-grid{grid-template-columns:1fr}}
    .upload-zone{border:2px dashed rgba(0,0,0,0.08);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;background:var(--ios-card);-webkit-tap-highlight-color:transparent;transition:all 0.25s var(--ease-spring)}
    .upload-zone:hover{border-color:rgba(0,0,0,0.15);background:rgba(0,0,0,0.01);transform:translateY(-1px)}
    .upload-zone:active,.upload-zone.drag-over{transform:scale(0.98);border-color:var(--primary)}
    .upload-zone.p1-zone:active,.upload-zone.p1-zone.drag-over{background:var(--p1-light);border-color:var(--p1)}
    .upload-zone.p2-zone:active,.upload-zone.p2-zone.drag-over{background:var(--p2-light);border-color:var(--p2)}
    .upload-icon{font-size:2rem;margin-bottom:8px}
    .upload-label{font-weight:700;font-size:16px;margin-bottom:4px;letter-spacing:-0.02em}
    .upload-hint{font-size:13px;color:var(--text-3);font-weight:500}
    input[type="file"]{display:none}

    /* Filters */
    .filters-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
    .search-input{flex:1;min-width:160px;padding:10px 16px;border:none;border-radius:var(--radius-pill);font-size:15px;font-weight:500;outline:none;background:rgba(0,0,0,0.04);transition:all 0.2s;letter-spacing:-0.01em;font-family:var(--font-stack)}
    .search-input:focus{outline:none;background:rgba(0,0,0,0.06);box-shadow:0 0 0 3px rgba(45,107,228,0.12)}
    select.filter-sel{padding:10px 14px;border:none;border-radius:var(--radius-pill);font-size:14px;font-weight:600;outline:none;background:rgba(0,0,0,0.04);cursor:pointer;color:var(--text-2);font-family:var(--font-stack);transition:all 0.2s}
    select.filter-sel:focus{outline:none;box-shadow:0 0 0 3px rgba(45,107,228,0.12)}

    /* Table */
    .table-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:none;border:2px solid var(--surface-border);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:12px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);background:rgba(0,0,0,0.02);border-bottom:1px solid rgba(0,0,0,0.05)}
    th.sortable{cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:color 0.15s}
    th.sortable:hover{color:var(--text-2)}
    th.sortable:active{opacity:0.7}
    th.sort-active{color:var(--text)}
    th.sort-active .sort-arrow{opacity:1}
    .sort-arrow{opacity:.25;font-style:normal;margin-left:4px;font-size:.6rem}
    td{padding:13px 16px;border-bottom:1px solid rgba(0,0,0,0.03);font-size:14px;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr{transition:background 0.15s}
    tr:hover{background:rgba(0,0,0,0.01)}
    .badge{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.02em}
    .b-p1{background:var(--p1-light);color:var(--p1)}
    .b-p2{background:var(--p2-light);color:var(--p2)}
    .amt-exp{font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
    .amt-inc{font-weight:700;color:var(--ios-green);font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
    select.cat-sel{border:none;background:transparent;font-size:14px;font-weight:500;cursor:pointer;color:var(--text-2);padding:4px 6px;border-radius:8px;max-width:140px;-webkit-tap-highlight-color:transparent;font-family:var(--font-stack);transition:background 0.15s}
    select.cat-sel:focus{outline:none;background:rgba(0,0,0,0.04)}
    .toggle{width:51px;height:31px;background:rgba(0,0,0,0.1);border-radius:16px;border:none;cursor:pointer;position:relative;transition:background .25s var(--ease-out);flex-shrink:0;-webkit-tap-highlight-color:transparent}
    .toggle::after{content:'';position:absolute;width:27px;height:27px;background:white;border-radius:50%;top:2px;left:2px;transition:transform .25s var(--ease-spring);box-shadow:0 2px 6px rgba(0,0,0,.12)}
    .toggle.on{background:var(--ios-green)}
    .toggle.on::after{transform:translateX(20px)}
    .del-btn{border:none;background:none;cursor:pointer;color:var(--text-3);font-size:.85rem;padding:4px;border-radius:6px;opacity:0;transition:all .2s;-webkit-tap-highlight-color:transparent}
    tr:hover .del-btn{opacity:1}
    .del-btn:hover{color:var(--ios-red);background:rgba(220,53,69,0.06)}
    .del-btn:active{color:var(--ios-red)}
    .excl-btn{border:none;background:none;cursor:pointer;color:var(--text-3);font-size:.8rem;padding:4px;border-radius:6px;opacity:0;transition:all .2s;-webkit-tap-highlight-color:transparent}
    tr:hover .excl-btn{opacity:1}
    .excl-btn:hover{color:var(--ios-orange);background:rgba(232,155,32,0.06)}
    .excl-btn:active{color:var(--ios-orange)}
    .excl-btn.on{opacity:1;color:var(--ios-orange)}
    tr.excluded td{opacity:.35}
    tr.excluded td:last-child{opacity:1}
    .empty-state{text-align:center;padding:60px 24px;color:var(--text-3)}
    .empty-icon{font-size:2.8rem;margin-bottom:12px}

    /* Review modal */
    .modal-wide{max-width:820px}
    .rev-wrap{max-height:52vh;overflow-y:auto;border:1px solid rgba(0,0,0,0.06);border-radius:var(--radius);margin-bottom:18px;-webkit-overflow-scrolling:touch}
    .rev-table{width:100%;border-collapse:collapse}
    .rev-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:10px 14px;background:rgba(0,0,0,0.02);border-bottom:1px solid rgba(0,0,0,0.05);text-align:left;position:sticky;top:0;z-index:1}
    .rev-table td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.03);font-size:14px;vertical-align:middle}
    .rev-table tr:last-child td{border-bottom:none}
    .rev-sel{padding:6px 10px;border:none;border-radius:10px;font-size:14px;font-weight:500;background:rgba(0,0,0,0.04);cursor:pointer;outline:none;max-width:160px;font-family:var(--font-stack)}
    .rev-sel:focus{outline:none;box-shadow:0 0 0 3px rgba(45,107,228,0.12)}

    /* Owner select (transactions table) */
    select.owner-sel{border:none;background:transparent;font-size:12px;cursor:pointer;padding:4px 10px;border-radius:20px;font-weight:700;appearance:none;-webkit-appearance:none;text-align:center;-webkit-tap-highlight-color:transparent;letter-spacing:0.02em}
    select.owner-sel.b-p1{background:var(--p1-light);color:var(--p1)}
    select.owner-sel.b-p2{background:var(--p2-light);color:var(--p2)}
    select.owner-sel.b-shared{background:rgba(28,165,86,0.08);color:var(--ios-green)}
    select.owner-sel:active{transform:scale(0.96)}
    select.owner-sel:focus{outline:none}

    /* Budget */
    .budget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .bud-card{background:var(--surface);border-radius:var(--radius);box-shadow:none;border:2px solid var(--surface-border);padding:20px;transition:transform 0.2s var(--ease-spring)}
    .bud-card:hover{transform:translateY(-1px)}
    .bud-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
    .bud-cat{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;letter-spacing:-0.02em}
    .bud-amts{text-align:right;font-size:14px;color:var(--text-3);font-weight:500}
    .bud-spent{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
    .prog-track{height:8px;background:rgba(0,0,0,0.04);border-radius:4px;overflow:hidden;margin-bottom:10px}
    .prog-fill{height:100%;border-radius:4px;transition:width .4s var(--ease-out)}
    .prog-ok{background:linear-gradient(90deg, var(--ios-green), #4DD67F)}
    .prog-warn{background:linear-gradient(90deg, var(--ios-orange), #F5B84D)}
    .prog-over{background:linear-gradient(90deg, var(--ios-red), #FF6B6B)}
    .bud-input-row{display:flex;align-items:center;gap:8px;margin-top:12px}
    .bud-input{width:80px;padding:6px 10px;border:none;border-radius:10px;font-size:14px;font-weight:600;text-align:right;background:rgba(0,0,0,0.04);font-family:var(--font-stack);transition:all 0.2s}
    .bud-input:focus{outline:none;box-shadow:0 0 0 3px rgba(45,107,228,0.12)}

    /* Split */
    .split-hero{text-align:center;padding:28px;background:var(--surface);border-radius:var(--radius);box-shadow:none;border:2px solid var(--surface-border);margin-bottom:18px}
    .split-big{font-size:36px;font-weight:800;margin:14px 0;letter-spacing:-0.04em;font-variant-numeric:tabular-nums}
    .split-lbl{font-size:16px;color:var(--text-3);font-weight:500}
    .scc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:18px}
    .scc{background:var(--surface);border-radius:var(--radius);box-shadow:none;border:2px solid var(--surface-border);padding:20px;transition:transform 0.2s var(--ease-spring)}
    .scc:hover{transform:translateY(-1px)}
    .scc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
    .scc-total{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
    .scc-modes{display:flex;gap:0;margin-bottom:12px;background:rgba(0,0,0,0.05);border-radius:12px;padding:3px}
    .scc-mode{flex:1;padding:7px 0;font-size:13px;font-weight:700;border:none;border-radius:10px;background:transparent;color:var(--text-3);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.2s var(--ease-out);letter-spacing:-0.01em}
    .scc-mode.active{background:white;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
    .scc-custom{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;margin-bottom:10px;flex-wrap:wrap}
    .scc-input{width:64px;padding:6px 8px;border:none;border-radius:10px;font-size:14px;font-weight:600;text-align:center;background:rgba(0,0,0,0.04);font-family:var(--font-stack)}
    .split-track{display:flex;border-radius:20px;overflow:hidden;height:32px;width:100%}
    .split-track-seg{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:rgba(255,255,255,.95);transition:width .4s var(--ease-out);overflow:hidden;white-space:nowrap;padding:0 10px;letter-spacing:0.02em}
    .scc-amts{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-top:14px;font-size:14px;font-weight:600}
    .scc-sub{font-size:12px;color:var(--text-3);margin-top:4px;font-weight:500}
    .split-p2{color:var(--p2)}
    .split-p1{color:var(--ios-blue)}
    .split-ok{color:var(--ios-green)}
    .settle-btn{margin-top:20px;padding:14px 34px;background:linear-gradient(135deg, var(--ios-green), #2EC46A);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 16px rgba(28,165,86,0.25);transition:all 0.25s var(--ease-spring);letter-spacing:-0.01em}
    .settle-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(28,165,86,0.3)}
    .settle-btn:active{transform:scale(0.97)}
    .btn-sm{padding:5px 14px;font-size:12px;font-weight:700;background:rgba(0,0,0,0.04);border:none;border-radius:10px;cursor:pointer;color:var(--text-2);-webkit-tap-highlight-color:transparent;transition:all 0.2s}
    .btn-sm:hover{background:rgba(0,0,0,0.07)}
    .btn-sm:active{transform:scale(0.96)}
    .hv-toggle{display:flex;gap:0;background:rgba(0,0,0,0.05);border:none;border-radius:12px;padding:3px}
    .hv-btn{padding:5px 14px;font-size:13px;font-weight:700;border:none;border-radius:10px;cursor:pointer;background:transparent;color:var(--text-3);-webkit-tap-highlight-color:transparent;transition:all 0.2s var(--ease-out)}
    .hv-btn:active{transform:scale(0.96)}
    .hv-btn.hv-active{background:white;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
    .hv-btn.hv-active.hv-p1{color:var(--ios-blue)}
    .hv-btn.hv-active.hv-p2{color:var(--p2)}
    select.split-sel{padding:5px 10px;border:none;border-radius:10px;font-size:13px;font-weight:600;background:rgba(0,0,0,0.04);font-family:var(--font-stack)}

    /* Modals — Sheet on mobile, centered on desktop */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-end;justify-content:center;z-index:1000;-webkit-backdrop-filter:blur(16px) saturate(200%);backdrop-filter:blur(16px) saturate(200%);animation:overlayIn .25s var(--ease-out)}
    @keyframes overlayIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--ios-card);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:28px 24px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:560px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:sheetUp .3s var(--ease-out)}
    .modal::before{content:'';display:block;width:40px;height:5px;background:rgba(0,0,0,0.1);border-radius:3px;margin:0 auto 20px;flex-shrink:0}
    @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @media(min-width:700px){
      .overlay{align-items:center}
      .modal{border-radius:var(--radius-lg);padding:32px;width:90%;animation:modalIn .25s var(--ease-out);box-shadow:var(--shadow-lg)}
      .modal::before{display:none}
      @keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
    }
    .modal h2{font-size:22px;font-weight:800;margin-bottom:8px;letter-spacing:-0.03em}
    .modal p{color:var(--text-3);font-size:14px;font-weight:500;margin-bottom:22px}
    .form-row{margin-bottom:16px}
    .form-row label{display:block;font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em}
    .form-input{width:100%;padding:12px 14px;border:none;border-radius:var(--radius-pill);font-size:16px;font-weight:500;outline:none;background:rgba(0,0,0,0.04);font-family:var(--font-stack);transition:all 0.2s}
    .form-input:focus{outline:none;box-shadow:0 0 0 3px rgba(45,107,228,0.12);background:rgba(0,0,0,0.02)}
    .form-sel{width:100%;padding:12px 14px;border:none;border-radius:var(--radius-pill);font-size:16px;font-weight:500;outline:none;background:rgba(0,0,0,0.04);font-family:var(--font-stack);transition:all 0.2s}
    .form-sel:focus{outline:none;box-shadow:0 0 0 3px rgba(45,107,228,0.12)}
    .btn-pri{width:100%;padding:15px;background:linear-gradient(135deg, var(--ios-blue), #4A85F0);color:white;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 16px rgba(45,107,228,0.25);transition:all 0.25s var(--ease-spring);letter-spacing:-0.01em}
    .btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(45,107,228,0.3)}
    .btn-pri:active{transform:scale(0.98)}
    .btn-sec{padding:10px 18px;background:rgba(0,0,0,0.04);color:var(--ios-blue);border:none;border-radius:var(--radius-pill);font-size:14px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.2s}
    .btn-sec:hover{background:rgba(0,0,0,0.06)}
    .btn-sec:active{transform:scale(0.97)}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
    .col-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(24px) scale(0.94);background:rgba(26,26,30,0.92);-webkit-backdrop-filter:blur(24px) saturate(200%);backdrop-filter:blur(24px) saturate(200%);color:white;padding:13px 22px;border-radius:var(--radius);font-size:14px;font-weight:600;opacity:0;transition:all .3s var(--ease-spring);pointer-events:none;z-index:2000;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.2);letter-spacing:-0.01em}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.2)}

    /* History tab */
    .hist-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
    @media(max-width:720px){.hist-hero{grid-template-columns:1fr 1fr}}
    .hist-hero-card{background:var(--surface);border-radius:var(--radius);border:2px solid var(--surface-border);box-shadow:none;padding:20px;position:relative;overflow:hidden;transition:transform 0.2s var(--ease-spring)}
    .hist-hero-card:hover{transform:translateY(-1px)}
    .hist-hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
    .hist-hero-card.hh-spent::before{background:linear-gradient(90deg, var(--ios-accent), #FF8A6B)}
    .hist-hero-card.hh-avg::before{background:linear-gradient(90deg, var(--ios-blue), #5B9CF6)}
    .hist-hero-card.hh-income::before{background:linear-gradient(90deg, var(--ios-green), #4DD67F)}
    .hist-hero-card.hh-best::before{background:linear-gradient(90deg, var(--ios-orange), #F5B84D)}
    .hist-hero-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:8px}
    .hist-hero-val{font-size:28px;font-weight:800;line-height:1;margin-bottom:6px;letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
    .hist-hero-sub{font-size:12px;color:var(--text-3);font-weight:500}
    .hist-chart-scroll{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
    .hist-chart{display:flex;align-items:flex-end;gap:8px;height:240px;padding:12px 6px 0;padding-left:36px}
    .hist-bar-col{display:flex;flex-direction:column;align-items:center;cursor:pointer;flex:1;min-width:46px;max-width:80px;-webkit-tap-highlight-color:transparent;transition:opacity 0.15s}
    .hist-bar-col:hover{opacity:0.8}
    .hist-bar-col:active{transform:scale(0.97)}
    .hist-bar-outer{flex:1;display:flex;align-items:flex-end;width:100%;position:relative}
    .hist-bar-inner{width:100%;border-radius:8px 8px 0 0;transition:height .4s var(--ease-out);min-height:4px;position:relative}
    .hist-bar-inner.hb-cur{box-shadow:0 0 0 2px white,0 0 0 3px var(--ios-accent)}
    .hist-inc-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--ios-green);border:2px solid white;left:50%;transform:translateX(-50%);z-index:3}
    .hist-bar-lbl{font-size:11px;font-weight:600;color:var(--text-3);text-align:center;margin-top:8px;line-height:1.3;white-space:nowrap;letter-spacing:0.01em}
    .hm-tbl{width:100%;border-collapse:separate;border-spacing:0}
    .hm-tbl th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:10px 8px;border-bottom:1px solid rgba(0,0,0,0.05);text-align:right;white-space:nowrap}
    .hm-tbl th:first-child,.hm-tbl th:nth-child(2){text-align:left}
    .hm-tbl td{padding:7px 8px;border-bottom:1px solid rgba(0,0,0,0.03);vertical-align:middle}
    .hm-tbl tr:last-child td{border-bottom:none}
    .hm-cell{border-radius:10px;padding:6px 10px;text-align:right;font-weight:700;font-size:12px;white-space:nowrap;display:block;letter-spacing:-0.01em;font-variant-numeric:tabular-nums}
    .hm-cell:active{transform:scale(0.97)}
    .chip-up{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;color:var(--ios-red);background:rgba(220,53,69,0.08);border-radius:20px;padding:4px 12px;letter-spacing:0.01em}
    .chip-down{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;color:var(--ios-green);background:rgba(28,165,86,0.08);border-radius:20px;padding:4px 12px;letter-spacing:0.01em}
    .chip-flat{display:inline-flex;align-items:center;font-size:12px;font-weight:600;color:var(--text-3);background:rgba(0,0,0,0.04);border-radius:20px;padding:4px 12px}

    /* Review badge */
    #review-badge{display:none;align-items:center;gap:6px;padding:4px 10px;border:none;background:var(--warning-light);border-radius:var(--radius-sm);cursor:pointer;font-size:11px;font-weight:800;color:#7A6030;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:all 0.2s;letter-spacing:0.02em}
    #review-badge:hover{background:rgba(160,128,64,0.15)}
    #review-badge:active{transform:scale(0.96)}
    #review-badge-count{background:var(--warning);color:white;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:800;line-height:1.5}

    /* Card review */
    .card-modal{max-width:460px}
    .card-progress{text-align:center;font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:18px;letter-spacing:.08em;text-transform:uppercase}
    .card-txn{background:var(--bg);border-radius:var(--radius);padding:20px;margin-bottom:22px;text-align:center}
    .card-date{font-size:12px;color:var(--text-3);margin-bottom:6px;font-weight:600}
    .card-desc{font-size:17px;font-weight:700;color:var(--text);margin-bottom:10px;word-break:break-word;letter-spacing:-0.02em}
    .card-amt{font-size:24px;font-weight:800;color:var(--text);letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
    .card-amt.card-inc{color:var(--ios-green)}
    .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:12px}
    .card-cats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:22px}
    .card-cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 4px;border:1.5px solid rgba(0,0,0,0.06);border-radius:var(--radius-pill);background:var(--ios-card);cursor:pointer;font-size:1.1rem;-webkit-tap-highlight-color:transparent;transition:all 0.2s var(--ease-spring)}
    .card-cat-btn span{font-size:10px;font-weight:700;color:var(--text-3);text-align:center;line-height:1.2;letter-spacing:0.02em}
    .card-cat-btn:hover{border-color:rgba(0,0,0,0.12);background:rgba(0,0,0,0.01)}
    .card-cat-btn:active{transform:scale(0.95)}
    .card-cat-btn.sel{border-color:var(--ios-blue);background:rgba(45,107,228,0.06);box-shadow:0 0 0 1px rgba(45,107,228,0.15)}
    .card-cat-btn.sel span{font-weight:800;color:var(--ios-blue)}
    .card-owners{display:flex;gap:10px;margin-bottom:6px}
    .card-owner-btn{flex:1;padding:12px;border:1.5px solid rgba(0,0,0,0.06);border-radius:var(--radius-pill);background:var(--ios-card);cursor:pointer;font-size:14px;font-weight:700;color:var(--text-2);-webkit-tap-highlight-color:transparent;transition:all 0.2s var(--ease-spring);letter-spacing:-0.01em}
    .card-owner-btn:hover{border-color:rgba(0,0,0,0.12)}
    .card-owner-btn:active{transform:scale(0.97)}
    .card-hint{font-size:11px;color:var(--text-3);text-align:center;margin-top:10px;margin-bottom:-4px;font-weight:500}

    /* Group review modal */
    .grp-modal{max-width:560px}
    .grp-search-wrap{margin-bottom:12px}
    .grp-search{width:100%;box-sizing:border-box;padding:10px 14px;border:none;border-radius:var(--radius-pill);font-size:15px;font-weight:500;outline:none;background:rgba(0,0,0,0.04);font-family:var(--font-stack);transition:all 0.2s}
    .grp-search:focus{outline:none;box-shadow:0 0 0 3px rgba(45,107,228,0.12)}
    .grp-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;gap:14px}
    .grp-name{font-size:14px;font-weight:700;color:var(--text);word-break:break-word;letter-spacing:-0.01em}
    .grp-count{font-size:11px;font-weight:700;color:var(--text-3);white-space:nowrap;letter-spacing:0.02em}
    .grp-rows{border:1px solid rgba(0,0,0,0.05);border-radius:var(--radius);overflow:hidden;margin-bottom:6px;max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .grp-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,0.03);background:var(--ios-card)}
    .grp-row:last-child{border-bottom:none}
    .grp-row-date{font-size:11px;font-weight:600;color:var(--text-3);white-space:nowrap;flex-shrink:0}
    .grp-row-desc{font-size:12px;font-weight:500;color:var(--text-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .grp-row-amt{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums}
    .grp-inc{color:var(--ios-green)}
    .grp-row-catbtn{flex-shrink:0;width:26px;height:26px;border:1px solid transparent;border-radius:8px;background:transparent;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:all 0.15s}
    .grp-row-catbtn:hover{background:rgba(0,0,0,0.03)}
    .grp-row-catbtn:active{transform:scale(0.9)}
    .grp-owner-pill{flex-shrink:0;padding:3px 8px;border:1.5px solid;border-radius:20px;background:transparent;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:all 0.15s}
    .grp-owner-pill:active{transform:scale(0.95)}
    .grp-del-btn{flex-shrink:0;width:22px;height:22px;border:none;background:none;cursor:pointer;font-size:0.7rem;color:var(--text-3);border-radius:6px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:all 0.15s}
    .grp-del-btn:hover{background:rgba(220,53,69,0.06);color:var(--ios-red)}
    .grp-del-btn:active{background:rgba(220,53,69,0.12);color:var(--ios-red)}
    .grp-row-cats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:10px 12px;background:var(--bg);border-bottom:1px solid rgba(0,0,0,0.03)}
    .card-cats{grid-template-columns:repeat(5,1fr)}

    /* ── Global tap feedback ─────────────────────────────────── */
    @media(hover:none){
      button:active,a:active,[role="button"]:active{transform:scale(0.97);opacity:.85}
    }

    /* ── Mobile optimizations ────────────────────────────────── */
    #bottom-nav{display:none}
    @media(max-width:700px),(pointer:coarse){
      /* Mobile overrides — Almond tokens */
      :root{
        --radius:16px;--radius-lg:20px;
        --ios-amber:var(--warning);
        --ios-label:var(--text);
        --ios-secondary:var(--text-2);
        --ios-tertiary:var(--text-3);
        --m3-surface-container:var(--bg);
        --m3-primary-container:var(--primary-light);
        --m3-state-layer:var(--primary-light);
        --color-earned:var(--green);
        --color-earned-bg:rgba(58,106,58,0.06);
        --color-spent:var(--red);
        --color-spent-bg:rgba(168,74,42,0.05);
        --color-saved-pos:var(--green);
        --color-deficit:var(--red);
        --color-amber:var(--warning);
        --color-fixed:var(--p1);
      }
      html{font-size:16px;-webkit-text-size-adjust:100%;height:100%;overflow:hidden}
      body{background:var(--bg);overscroll-behavior:none;font-size:16px;line-height:1.5;height:100%;overflow:hidden}
      #app{height:100vh;overflow:hidden;display:flex;flex-direction:column}
      main{flex:1;overflow:hidden;padding:6px 12px 0 !important;display:flex;flex-direction:column}

      /* Safe area */
      body{padding-top:env(safe-area-inset-top)}
      #app{padding-bottom:calc(calc(52px + env(safe-area-inset-bottom)) + 0px)}

      /* Header — Mobile nav bar */
      header{
        padding:8px 14px 8px;gap:0 10px;height:auto;
        flex-wrap:nowrap;align-items:center;
        background:rgba(245,243,240,0.78);
        -webkit-backdrop-filter:saturate(200%) blur(24px);
        backdrop-filter:saturate(200%) blur(24px);
        border-bottom:1px solid rgba(0,0,0,0.04);
      }
      .logo{font-size:17px;font-weight:800;letter-spacing:-0.03em;width:auto;margin-bottom:0;line-height:1;flex-shrink:0;color:var(--primary)}
      #nav{display:none}
      .month-nav{flex:1;justify-content:center;gap:6px}
      .month-nav button{width:30px;height:30px;border-radius:10px;border:none;background:transparent;font-size:17px;min-width:44px;min-height:44px;color:var(--ios-blue)}
      .month-nav span{font-size:20px;font-weight:800;letter-spacing:-0.03em;color:var(--text)}
      .save-status{display:none}
      .icon-btn{width:32px;height:32px;border:none;background:transparent;border-radius:10px;font-size:20px;min-width:44px;min-height:44px;color:var(--text-2)}
      #review-badge{padding:4px 10px;font-size:0;border:none;background:rgba(232,155,32,0.1);border-radius:10px}
      #review-badge-count{font-size:11px;font-weight:800}
      #lock-btns{display:none}

      /* Bottom tab bar */
      #bottom-nav{
        display:flex;position:fixed;
        bottom:0;left:0;right:0;
        height:calc(52px + env(safe-area-inset-bottom));
        padding-bottom:env(safe-area-inset-bottom);
        background:rgba(245,243,240,0.78);
        -webkit-backdrop-filter:saturate(200%) blur(24px);
        backdrop-filter:saturate(200%) blur(24px);
        border-top:1px solid rgba(0,0,0,0.04);
        z-index:200;
      }
      #bottom-nav button{
        flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:3px;border:none;background:none;cursor:pointer;
        padding:4px 4px;color:var(--text-3);
        -webkit-tap-highlight-color:transparent;
        min-height:44px;transition:color 0.2s;
      }
      #bottom-nav button{position:relative}
      #bottom-nav button.active{color:var(--ios-accent)}
      #bottom-nav button.active .bnav-icon{transform:none}
      #bottom-nav button.active .bnav-icon::before{display:none}
      #bottom-nav button:not(.active) .bnav-icon::before{display:none}
      #bottom-nav button:active{transform:scale(0.95)}
      #bottom-nav button.active .bnav-label{font-weight:700;color:var(--ios-accent)}
      .bnav-icon{line-height:1;position:relative;z-index:0}
      .bnav-icon svg{width:22px;height:22px;stroke-width:2.5}
      .bnav-label{font-size:10px;font-weight:600;letter-spacing:.03em;margin-top:2px}

      /* Main layout */
      main{padding:8px 16px}

      /* Cards — Refined mobile */
      .card,.stat-card,.income-card,.bud-card,.scc,.table-wrap,.hist-hero-card{
        border:2px solid var(--surface-border) !important;
        box-shadow:none !important;
        border-radius:var(--radius) !important;
        background:var(--surface) !important;
      }

      /* Inputs */
      .form-input,.form-sel,.search-input{
        background:rgba(0,0,0,0.04);
        border:none !important;
        border-radius:var(--radius-pill);
      }
      input,select,textarea{font-size:16px !important;font-family:var(--font-stack) !important}
      .form-input,.form-sel,.search-input,.bud-input,.scc-input,.rev-sel{font-size:16px !important}

      /* Section titles */
      .section-title{
        font-size:11px;font-weight:700;
        text-transform:uppercase;letter-spacing:.08em;
        color:var(--text-3);
        margin-bottom:8px;margin-top:10px;
      }

      /* Stats — 2 column */
      .stats-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
      .stat-card{padding:18px}
      .stat-card:hover{transform:none;box-shadow:0 2px 8px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.02) !important}
      .stat-label{font-size:11px;letter-spacing:.08em}
      .stat-value{font-size:28px;font-weight:800}

      /* Income cards — horizontal scroll strip */
      .income-row{
        grid-template-columns:1fr;
        display:flex;overflow-x:auto;gap:10px;
        -webkit-overflow-scrolling:touch;
        scroll-snap-type:x mandatory;
        padding-bottom:4px;
        margin-bottom:14px;
      }
      .income-card{min-width:72vw;scroll-snap-align:start;flex-shrink:0}
      .income-card:hover{transform:none;box-shadow:0 2px 8px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.02) !important}

      /* Table rows */
      td{padding:13px 16px;font-size:14px}
      th{padding:11px 16px;font-size:11px}

      /* Budget cards */
      .budget-grid{grid-template-columns:1fr;gap:10px}
      .bud-card:hover{transform:none;box-shadow:0 2px 8px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.02) !important}

      /* Prevent horizontal scroll on page */
      main{touch-action:pan-y}
      .rev-wrap,.vert-chart,.hist-chart-scroll,.table-wrap{-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

      /* Toggles */
      .toggle{width:51px;height:31px}
      .toggle::after{width:27px;height:27px;top:2px;left:2px}
      .toggle.on::after{transform:translateX(20px)}

      /* Toast above bottom nav */
      .toast{bottom:calc(60px + env(safe-area-inset-bottom))}

      /* No selection on chrome */
      header,#bottom-nav,.stat-card,.income-card,.bud-card,.scc,.card-txn{user-select:none;-webkit-user-select:none}

      /* Transaction card list */
      .txn-card-list{display:flex;flex-direction:column;gap:0;background:white;border-radius:var(--radius);overflow:visible;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
      @keyframes txnCardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
      .txn-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:white;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.15s var(--ease-spring);animation:txnCardIn .25s var(--ease-out) calc(var(--i,0) * 25ms) both}
      .txn-card:active{transform:scale(0.98)}
      .txn-card+.txn-card{border-top:1px solid rgba(0,0,0,0.04)}
      .txn-card:first-child{border-radius:var(--radius) var(--radius) 0 0}
      .txn-card:last-child{border-radius:0 0 var(--radius) var(--radius)}
      .txn-card:only-child{border-radius:var(--radius)}
      .txn-card.excluded{opacity:.35}
      .txn-card.txn-p1{border-left:3px solid var(--ios-blue);padding-left:15px}
      .txn-card.txn-p2{border-left:3px solid var(--p2);padding-left:15px}
      .txn-card.txn-shared{border-left:3px solid var(--ios-green);padding-left:15px}
      .txn-card-emoji{font-size:1.4rem;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.03);border-radius:14px;flex-shrink:0}
      .txn-card-body{flex:1;min-width:0}
      .txn-card-desc{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.02em}
      .txn-card-meta{font-size:12px;color:var(--text-3);margin-top:3px;display:flex;align-items:center;gap:6px;font-weight:500}
      .txn-card-meta .owner-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
      .txn-card-amt{font-size:16px;font-weight:700;text-align:right;flex-shrink:0;white-space:nowrap;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
      .txn-card-amt.inc{color:var(--ios-green)}
      .txn-card-chevron{color:var(--text-3);font-size:.7rem;margin-left:2px;flex-shrink:0;opacity:.2}
      .txn-date-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:22px 4px 8px;background:transparent;flex-shrink:0}
      .txn-date-header:first-child{padding-top:6px}

      /* Filters mobile — scrollable pills */
      .filters-bar-mobile{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;flex-shrink:0}
      .filter-pill{padding:8px 18px;border-radius:var(--radius-pill);font-size:14px;font-weight:600;border:none;background:rgba(0,0,0,0.05);color:var(--text-2);white-space:nowrap;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:all 0.2s var(--ease-out);letter-spacing:-0.01em}
      .filter-pill:active{transform:scale(0.96)}
      .filter-pill.active{background:var(--ios-accent);color:white;font-weight:700;box-shadow:0 4px 12px rgba(232,89,58,0.2)}

      /* History month cards */
      .month-card-list{display:flex;flex-direction:column;gap:0;background:white;border-radius:var(--radius);overflow:visible;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
      .month-card{padding:14px 18px;background:white;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.15s var(--ease-spring)}
      .month-card:active{transform:scale(0.99)}
      .month-card+.month-card{border-top:1px solid rgba(0,0,0,0.04)}
      .month-card-top{display:flex;justify-content:space-between;align-items:baseline}
      .month-card-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
      .month-card-title .cur-badge{font-size:11px;background:rgba(45,107,228,0.08);color:var(--ios-blue);padding:3px 8px;border-radius:10px;font-weight:700;margin-left:6px;vertical-align:middle;letter-spacing:0.02em}
      .month-card-amt{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
      .month-card-row2{display:flex;align-items:center;gap:10px;margin-top:5px;font-size:12px;color:var(--text-3);font-weight:500}
      .month-card-detail{padding:12px 18px 18px;border-top:1px solid rgba(0,0,0,0.04);background:rgba(0,0,0,0.01)}
      .month-card-detail-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:12px;font-weight:500}
      .month-card-expand{font-size:12px;color:var(--ios-blue);font-weight:700;margin-top:8px;display:flex;align-items:center;gap:3px}

      /* Heatmap mobile (vertical category list) */
      .hm-mobile-list{display:flex;flex-direction:column;gap:0;background:white;border-radius:var(--radius);overflow:visible;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
      .hm-mobile-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:white}
      .hm-mobile-row+.hm-mobile-row{border-top:1px solid rgba(0,0,0,0.04)}
      .hm-mobile-cat{font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px;flex:1;min-width:0;letter-spacing:-0.02em}
      .hm-mobile-vals{display:flex;align-items:center;gap:12px;flex-shrink:0}
      .hm-mobile-amt{font-size:16px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
      .hm-mobile-trend{font-size:14px;font-weight:700}

      /* Section styling */
      .ios-section-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:22px 18px 8px}
      .ios-grouped{background:white;border-radius:var(--radius);overflow:hidden}

      /* Overview carousel */
      .ov-carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;gap:0;padding:0;margin:0 -12px;flex:1}
      .ov-carousel::-webkit-scrollbar{display:none}
      .ov-slide{flex:0 0 94%;width:94%;scroll-snap-align:start;padding:0 6px 0 8px;box-sizing:border-box;display:flex}
      .ov-slide:last-child{flex:0 0 100%;width:100%;padding:0 8px}
      .ov-slide-inner{background:#ffffff;border-radius:var(--radius);padding:0;display:flex;flex-direction:column;overflow:hidden;position:relative;flex:1;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
      .ic-combined .ov-slide-inner{background:#ffffff}
      .ic-p1 .ov-slide-inner{background:#ffffff;border-top:3px solid var(--ios-blue)}
      .ic-p2 .ov-slide-inner{background:#ffffff;border-top:3px solid var(--p2)}
      .ic-combined .ov-slide-inner{border-top:3px solid var(--ios-accent)}
      .ov-slide-inner.income-card{padding:0}
      /* Slide tabs — segmented pill style */
      .ov-tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 10px;scrollbar-width:none;background:transparent;flex-shrink:0}
      .ov-tabs::-webkit-scrollbar{display:none}
      .ov-tab{flex-shrink:0;padding:8px 18px;font-size:12px;font-weight:700;color:var(--text-3);border-radius:var(--radius-pill);background:rgba(0,0,0,0.05);transition:all 0.2s var(--ease-out);cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap;min-height:34px;display:flex;align-items:center;margin-right:8px;letter-spacing:0.01em}
      .ov-tab:active{transform:scale(0.96)}
      .ov-tab.active{color:white;background:var(--ios-accent);box-shadow:0 4px 12px rgba(232,89,58,0.2)}

      /* 2x2 income card */
      .ov-person-card{display:flex;flex-direction:column;flex:1;padding:0}
      .ov-person-card .income-title{padding:16px 18px 8px;font-size:20px;font-weight:800;margin-bottom:0;letter-spacing:-.03em;text-transform:none;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .ov-card-grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;flex:1}
      .ov-card-cell{display:flex;flex-direction:column;justify-content:flex-start;padding:14px 16px;position:relative;overflow:hidden}
      .ov-card-cell:nth-child(1){border-right:1px solid rgba(0,0,0,0.04);border-bottom:1px solid rgba(0,0,0,0.04)}
      .ov-card-cell:nth-child(2){border-bottom:1px solid rgba(0,0,0,0.04)}
      .ov-card-cell:nth-child(3){border-right:1px solid rgba(0,0,0,0.04)}

      /* Typography for cells */
      .ov-cell-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:5px}
      .ov-cell-value{font-size:26px;font-weight:800;line-height:1;letter-spacing:-0.03em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-variant-numeric:tabular-nums}
      .ov-cell-sub{font-size:12px;color:var(--text-3);margin-top:5px;font-weight:500}

      /* Earned vs spent bar */
      .ov-ep-bar-wrap{margin:6px 14px 0;display:flex;flex-direction:column;gap:5px}
      .ov-ep-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:rgba(0,0,0,0.04)}
      .ov-ep-bar-earn{background:linear-gradient(90deg, var(--ios-green), #4DD67F);transition:width .4s var(--ease-out)}
      .ov-ep-bar-spend{display:none}
      .ov-ep-bar-labels{display:flex;justify-content:space-between;font-size:12px;font-weight:700;padding:0 2px;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}

      /* Ring chart */
      .ov-ring{position:relative;width:calc(100% - 10px);aspect-ratio:1;margin:auto}
      .ov-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
      .ov-ring-bg{fill:none;stroke:rgba(0,0,0,0.04);stroke-width:8}
      .ov-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .4s var(--ease-out)}
      .ov-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
      .ov-ring-pct{font-size:28px;font-weight:800;line-height:1;letter-spacing:-0.03em;font-variant-numeric:tabular-nums}
      .ov-ring-lbl{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-top:5px}

      /* Cash flow chip */
      .ov-cashflow-chip{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:6px 14px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;letter-spacing:-0.01em}

      /* Breakdown rows */
      .ov-breakdown{margin-top:6px}
      .ov-breakdown-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;position:relative}
      .ov-breakdown-row+.ov-breakdown-row{border-top:1px solid rgba(0,0,0,.04)}
      .ov-breakdown-label{color:var(--text-3);font-weight:700;display:flex;align-items:center;gap:8px;font-size:14px;letter-spacing:-0.01em}
      .ov-breakdown-label .ov-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
      .ov-breakdown-value{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}

      /* Slide scrollable content */
      .ov-slide-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);padding:14px 18px 10px;border-bottom:1px solid rgba(0,0,0,0.04);flex-shrink:0}
      .ov-slide-inner.ov-scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch}
      .ov-slide-inner.ov-scrollable .cat-row,.ov-slide-inner.ov-scrollable .merchant-row{padding-left:16px;padding-right:16px}

      /* Settled history mobile */
      .settled-card-list{display:flex;flex-direction:column;gap:0;background:white;border-radius:var(--radius);overflow:visible;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
      .settled-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:white}
      .settled-card+.settled-card{border-top:1px solid rgba(0,0,0,0.04)}

      /* Income cards mobile */
      .income-row-mobile{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
      .income-row-mobile .income-card{min-width:unset;flex-shrink:unset;scroll-snap-align:unset}
      .income-card-collapse .income-detail{display:none}
      .income-card-collapse.expanded .income-detail{display:block}

<script>
// ── Constants ──────────────────────────────────────────────

const PRESET_COLORS = ['#10b981','#f43f5e','#3b82f6','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#84cc16','#6366f1','#ec4899','#14b8a6','#f97316'];
// Icon helper — renders Bootstrap Icon via CSS class
function catIcon(cat, size) {
  size = size || 16;

  return `<i class="bi ${cls}" style="font-size:${size}px;color:${cat.color};flex-shrink:0;line-height:1;"></i>`;

// Backward compat: anywhere that used c.emoji now gets the icon
BASE_CATS.forEach(c => { if (!c.emoji) Object.defineProperty(c, 'emoji', { get() { return catIcon(this, 16); }, configurable: true }); });
// Fixed vs Variable expense categorization
const FIXED_CATS = new Set(['housing','utilities','subs','insurance']);
function isFixedCat(catId) { return FIXED_CATS.has(catId); }
function getCats() {
  const all = [...BASE_CATS, ...S.customCategories];
  return S.pinUnlocked ? all : all.filter(c => !c.hidden);
}
function getAllCats() { return [...BASE_CATS, ...S.customCategories]; } // always full list (for lookups)
function getCat(id) { return getAllCats().find(c=>c.id===id) || BASE_CATS.find(c=>c.id==='other'); }

const KW = {

  shopping:['amazon','ebay','etsy','zara','h&m','gap ','old navy','nordstrom','macy','best buy','apple store','ikea','home depot','lowe\'s','wayfair','chewy','overstock','target','walmart'],

  housing:['rent','mortgage','landlord','hoa','lease','property management'],

  travel:['hotel','airbnb','vrbo','hilton','marriott','hyatt','westin','expedia','booking.com','kayak','hertz','enterprise car','avis','airport'],
  income:['payroll','direct deposit','salary','paycheck','venmo','zelle','cashapp','cash app','mobile deposit','refund','reimbursement','interest payment'],

  gambling:['draftkings','fanduel','coincasino','coin casino','kalshi'],
  cash:['atm withdrawal','cash withdrawal','atm fee','atm ','cash advance'],
};

// ── State ──────────────────────────────────────────────────
const S = {
  settings: {person1:'Person 1', person2:'Person 2'},
  transactions: [],
  budgets: {},
  currentMonth: new Date().toISOString().slice(0,7),
  activeTab: 'overview',
  filters: {search:'', person:'all', category:'all'},
  txnSort: {col:'date', dir:'desc'},
  rules: {},
  customCategories: [],
  catSplits: {}, // { [catId]: { mode:'even'|'pct'|'dollar', p1Pct:50, p1Amt:0 } }
  gamblingData: {}, // { [txnId]: typeId }
  incomeData: {},        // { [txnId]: 'normal'|'retirement'|'family' }  explicit overrides
  incomeTypeRules: {},   // { [normalizedDesc]: 'normal'|'retirement'|'family' }  learned from user
  excludedFromAvg: [], // months (YYYY-MM) excluded from average calculations
  historyView: 'combined', // 'combined' | 'p1' | 'p2'
  overviewRange: '1mo',        // '1mo' | 'ytd' | 'all' | 'custom'
  overviewCustomMonths: [],   // ['YYYY-MM', ...] individually selected months for custom range
  overviewView: 'total',      // 'total' | 'avg' — only relevant in multi-month mode
  overviewYear: null,         // YYYY string for YTD year; null = current year
  recurringIncome: [], // [{ id, description, amount, person, category, frequency, startDate }]
  hmCatFilter: null,  // null = auto top-8; Set of catIds when user has customised
  pinUnlocked: false, // session only — not persisted
};

// Session-only: Google email of the currently signed-in user (never persisted)
let currentUserEmail = null;

// ── Google Sheets config (persisted in localStorage) ───────
const CFG = {
  get clientId() { return localStorage.getItem('bt_client_id') || ''; },
  set clientId(v) { localStorage.setItem('bt_client_id', v); },
  get sheetId()  { return localStorage.getItem('bt_sheet_id') || ''; },
  set sheetId(v) { localStorage.setItem('bt_sheet_id', v); },
};

// ── OAuth token (cached in sessionStorage so refreshes don't re-popup) ──
let _tokenClient = null, _pendingTokenCbs = [];

function getToken() {
  const t = sessionStorage.getItem('bt_token');
  const exp = parseInt(sessionStorage.getItem('bt_token_exp') || '0');
  return (t && Date.now() < exp) ? t : null;
}
function storeToken(token, expiresIn) {
  sessionStorage.setItem('bt_token', token);
  sessionStorage.setItem('bt_token_exp', String(Date.now() + (expiresIn - 60) * 1000));
  localStorage.setItem('bt_authed', '1');
}

async function fetchCurrentEmail() {
  const token = getToken();
  if (!token) return;
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v1/userinfo', {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!r.ok) {
      if (r.status === 401) { // token expired — clear it so next load re-authenticates cleanly
        localStorage.removeItem('bt_token');
        localStorage.removeItem('bt_token_exp');
        localStorage.removeItem('bt_authed');
      }
      return;
    }
    const d = await r.json();
    currentUserEmail = (d.email || '').toLowerCase();
    renderIdentityBadge();
    render();
  } catch(e) { /* non-fatal — privacy just won't activate */ }
}

function withToken(cb) {
  const cached = getToken();
  if (cached) { cb(cached); return; }
  _pendingTokenCbs.push(cb);
  if (_pendingTokenCbs.length > 1) return;
  if (!_tokenClient) {
    _tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CFG.clientId,
      scope: 'https://www.googleapis.com/auth/spreadsheets',
      callback: resp => {
        if (resp.error) {
          console.error('OAuth error', resp);
          _pendingTokenCbs = [];
          $('loading').innerHTML = `
            <div style="text-align:center;padding:20px">
              <div style="font-size:3.5rem;margin-bottom:16px">🔐</div>
              <h2 style="font-size:1.4rem;font-weight:800;margin-bottom:10px">Sign in required</h2>
              <p style="color:#6b7280;font-size:1rem;margin-bottom:24px;max-width:320px;margin-left:auto;margin-right:auto">Tap the button below to sign in with Google.</p>
              <button onclick="manualSignIn()" style="padding:14px 32px;background:#D4663A;color:white;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer">Sign in with Google</button>
            </div>`;
          return;
        }
        storeToken(resp.access_token, resp.expires_in);
        const cbs = _pendingTokenCbs.splice(0);
        cbs.forEach(fn => fn(resp.access_token));
      }
    });
  }
  _tokenClient.requestAccessToken({ prompt: '' });
}

function manualSignIn() {
  if (!_tokenClient) {
    _tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CFG.clientId,
      scope: 'https://www.googleapis.com/auth/spreadsheets',
      callback: resp => {
        if (resp.error) { alert('Sign-in failed: ' + resp.error); return; }
        storeToken(resp.access_token, resp.expires_in);
        loadData();
      }
    });
  }
  _tokenClient.requestAccessToken({ prompt: 'select_account' });
}

// ── Sheets REST helper ──────────────────────────────────────
function sheetsReq(method, path, body) {
  return new Promise((resolve, reject) => {
    withToken(async token => {
      try {
        const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CFG.sheetId}${path}`, {
          method,
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        });
        const d = await r.json();
        if (d.error) reject(new Error(d.error.message)); else resolve(d);
      } catch(e) { reject(e); }
    });
  });
}

async function ensureSheets() {
  const meta = await sheetsReq('GET', '?fields=sheets.properties.title');
  const have = (meta.sheets || []).map(s => s.properties.title);
  const need = ['Transactions','Budgets','Settings'].filter(n => !have.includes(n));
  if (need.length) {
    await sheetsReq('POST', ':batchUpdate', { requests: need.map(title => ({ addSheet: { properties: { title } } })) });
  }
  // Write headers if sheet was just created (row 1 empty)
  const hRes = await sheetsReq('GET', '/values:batchGet?ranges=Transactions!A1&ranges=Budgets!A1&ranges=Settings!A1');
  const vals = (hRes.valueRanges || []).map(v => v.values?.[0]?.[0] || '');
  const hUpdates = [];
  if (!vals[0]) hUpdates.push({ range:'Transactions!A1', values:[['id','date','amount','description','category','person','note','shared','settled','splitRatio','excluded']] });
  if (!vals[1]) hUpdates.push({ range:'Budgets!A1',      values:[['key','amount']] });
  if (!vals[2]) hUpdates.push({ range:'Settings!A1',     values:[['key','value']] });
  if (hUpdates.length) await sheetsReq('POST', '/values:batchUpdate', { valueInputOption:'RAW', data:hUpdates });
}

// ── DB adapter ─────────────────────────────────────────────
// Use google.script.run when deployed on Apps Script (no OAuth needed),
// fall back to Sheets REST API on localhost.
function USE_GAS() {
  try { return typeof google !== 'undefined' && typeof google.script !== 'undefined' && typeof google.script.run !== 'undefined'; }
  catch(e) { return false; }
}

const DB = {
  async load(cb, errCb) {
    if (USE_GAS()) {
      google.script.run.withSuccessHandler(cb).withFailureHandler(e => errCb(new Error(e.message||String(e)))).loadAll();
      return;
    }
    try {
      await ensureSheets();
      const res = await sheetsReq('GET', '/values:batchGet?ranges=Transactions!A1:K&ranges=Budgets!A1:B&ranges=Settings!A1:B');
      const [tSheet, bSheet, sSheet] = res.valueRanges || [];
      const transactions = (tSheet?.values||[]).slice(1).filter(r=>r[0]).map(r=>({
        id:r[0]||'', date:parseDt(r[1])||r[1]||'', amount:parseFloat(r[2])||0, description:r[3]||'',
        category:r[4]||'other', person:r[5]||'p1', note:r[6]||'',
        shared:r[7]==='true', settled:r[8]==='true', splitRatio:parseFloat(r[9])||0.5, excluded:r[10]==='true',
      }));
      const budgets = {};
      (bSheet?.values||[]).slice(1).forEach(r => { if(r[0]) budgets[r[0]]=parseFloat(r[1])||0; });
      const settings = { person1:'Person 1', person2:'Person 2' };
      (sSheet?.values||[]).slice(1).forEach(r => { if(r[0]) settings[r[0]]=r[1]; });
      let rules = {};
      try { if (settings.rules) { rules = JSON.parse(settings.rules); delete settings.rules; } } catch(e) {}
      let customCategories = [];
      try { if (settings.customCategories) { customCategories = JSON.parse(settings.customCategories); delete settings.customCategories; } } catch(e) {}
      let catSplits = {};
      try { if (settings.catSplits) { catSplits = JSON.parse(settings.catSplits); delete settings.catSplits; } } catch(e) {}
      let excludedFromAvg = [];
      try { if (settings.excludedFromAvg) { excludedFromAvg = JSON.parse(settings.excludedFromAvg); delete settings.excludedFromAvg; } } catch(e) {}
      let recurringIncome = [];
      try { if (settings.recurringIncome) { recurringIncome = JSON.parse(settings.recurringIncome); delete settings.recurringIncome; } } catch(e) {}
      let gamblingData = {};
      try { if (settings.gamblingData) { gamblingData = JSON.parse(settings.gamblingData); delete settings.gamblingData; } } catch(e) {}
      let incomeData = {};
      try { if (settings.incomeData) { incomeData = JSON.parse(settings.incomeData); delete settings.incomeData; } } catch(e) {}
      cb({ transactions, budgets, settings, rules, customCategories, catSplits, excludedFromAvg, recurringIncome, gamblingData, incomeData });
    } catch(e) { errCb(e); }
  },

  async save(data, onOk, onErr) {
    if (USE_GAS()) {
      google.script.run.withSuccessHandler(onOk).withFailureHandler(e => onErr(new Error(e.message||String(e)))).saveAll(data);
      return;
    }
    try {
      const tRows = data.transactions.map(t=>[t.id,t.date,t.amount,t.description||'',t.category,t.person,t.note||'',t.shared?'true':'false',t.settled?'true':'false',t.splitRatio||0.5,t.excluded?'true':'false']);
      const bRows = Object.entries(data.budgets).map(([k,v])=>[k,v]);
      const sRows = [...Object.entries(data.settings), ['rules', JSON.stringify(data.rules||{})], ['customCategories', JSON.stringify(data.customCategories||[])], ['catSplits', JSON.stringify(data.catSplits||{})], ['excludedFromAvg', JSON.stringify(data.excludedFromAvg||[])], ['recurringIncome', JSON.stringify(data.recurringIncome||[])], ['gamblingData', JSON.stringify(data.gamblingData||{})], ['incomeData', JSON.stringify(data.incomeData||{})], ['incomeTypeRules', JSON.stringify(data.incomeTypeRules||{})]].map(([k,v])=>[k,v]);
      await sheetsReq('POST', '/values:batchClear', { ranges:['Transactions!A2:J','Budgets!A2:B','Settings!A2:B'] });
      const updates = [
        { range:'Transactions!A2', values:tRows },
        { range:'Budgets!A2',      values:bRows },
        { range:'Settings!A2',     values:sRows },
      ].filter(u => u.values.length);
      if (updates.length) await sheetsReq('POST', '/values:batchUpdate', { valueInputOption:'RAW', data:updates });
      onOk();
    } catch(e) { onErr(e); }
  },

  sheetUrl(cb) {
    if (USE_GAS()) { google.script.run.withSuccessHandler(cb).getSheetUrl(); return; }
    cb(CFG.sheetId ? `https://docs.google.com/spreadsheets/d/${CFG.sheetId}` : null);
  },
};

// ── Save (debounced) ───────────────────────────────────────
let saveTimer = null;
function schedSave() {
  setSaveStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    DB.save(
      { transactions: S.transactions, budgets: S.budgets, settings: S.settings, rules: S.rules, customCategories: S.customCategories, catSplits: S.catSplits, excludedFromAvg: S.excludedFromAvg, recurringIncome: S.recurringIncome, gamblingData: S.gamblingData, incomeData: S.incomeData },
      () => setSaveStatus('saved'),
      () => setSaveStatus('error')
    );
  }, 1500);
}
function setSaveStatus(s) {
  const el = $('save-status');
  el.className = 'save-status ' + s;
  el.textContent = s === 'saving' ? '↑ Saving…' : s === 'saved' ? '✓ Saved' : s === 'error' ? '⚠ Save failed' : '';
  if (s === 'saved') setTimeout(() => { if (el.textContent === '✓ Saved') el.textContent = ''; }, 3000);
}

// ── Utils ──────────────────────────────────────────────────
let _uid = 0;
const uid = () => Date.now().toString(36) + (++_uid).toString(36) + Math.random().toString(36).slice(2);
const $ = id => document.getElementById(id);
const isMobile = () => matchMedia('(max-width:700px),(pointer:coarse)').matches || (navigator.maxTouchPoints > 0 && window.innerWidth <= 1024);
const fc  = n => { const a = Math.abs(n); return '$' + a.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); };
const fc0 = n => '$' + Math.round(Math.abs(n)).toLocaleString();
function fmtDate(d) { if (!d) return ''; const [y,m,day] = d.split('-'); return `${m}/${day}/${y.slice(2)}`; }
function parseAmt(s) { if (s === '' || s == null) return null; const v = String(s).replace(/[$,\s]/g,'').replace(/\(([^)]+)\)/,'-$1').replace(/cr$/i,''); const n = parseFloat(v); return isNaN(n) ? null : n; }
function parseDt(s) {
  if (!s) return null; s = String(s).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m) { let [,mo,d,y] = m; if (y.length===2) y='20'+y; return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  // Handle long date strings like "Mon Dec 15 2025 03:00:00 GMT-0500..."
  const d = new Date(s);
  if (!isNaN(d.getTime())) { const yy=d.getFullYear(), mm=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return `${yy}-${mm}-${dd}`; }
  return null;
}
function moLabel(ym) { const [y,m] = ym.split('-'); return new Date(+y,+m-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }
function categorize(desc) { if (!desc) return 'other'; const d = desc.toLowerCase(); for (const [cat,kws] of Object.entries(KW)) for (const kw of kws) if (d.includes(kw)) return cat; return 'other'; }
function normalizeDesc(desc) {
  if (!desc) return '';

    .replace(/\d+/g, '')           // strip store numbers, zip codes, etc.
    .replace(/[#*@\/\\,\.&!]/g, '') // strip junk punctuation
    .replace(/\s+/g, ' ')

    .split(' ').filter(w => w.length > 0).slice(0, 3).join(' '); // first 3 words = merchant name

function applyRules(desc) { const key = normalizeDesc(desc); return key ? (S.rules[key]||null) : null; }
function learnRule(desc, shared, category, person) { const key = normalizeDesc(desc); if (key) { S.rules[key] = {category, shared, person}; } }
