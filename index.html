// ── CSV Parsing ────────────────────────────────────────────
function splitCSVLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if ((c === ',' || c === '\t') && !inQ) { res.push(cur.trim()); cur = ''; }
    else cur += c;
  }
  res.push(cur.trim());
  return res;
}
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return {headers:[], rows:[]};
  const headers = splitCSVLine(lines[0]).map(h => h.replace(/^["']|["']$/g,''));
  const rows = lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = splitCSVLine(l);
    return Object.fromEntries(headers.map((h,i) => [h, (vals[i]||'').replace(/^["']|["']$/g,'')]));
  });
  return {headers, rows};
}

// ── Venmo CSV Parser ────────────────────────────────────────
function isVenmoCSV(text) {
  return text.includes('Account Statement') && text.includes('Amount (total)') && text.includes('Datetime');
}
function parseVenmoToTxns(text, person) {
  const lines = text.split(/\r?\n/);
  // Find the real header row (contains Datetime and Amount (total))
  const headerIdx = lines.findIndex(l => l.includes('Datetime') && l.includes('Amount (total)'));
  if (headerIdx < 0) return [];
  const headers = splitCSVLine(lines[headerIdx]).map(h => h.replace(/^["']|["']$/g,''));
  const col = name => headers.indexOf(name);
  const iDatetime = col('Datetime'), iType = col('Type'), iStatus = col('Status');
  const iNote = col('Note'), iFrom = col('From'), iTo = col('To'), iAmt = col('Amount (total)');
  if (iDatetime < 0 || iAmt < 0) return [];

  const txns = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]).map(c => c.replace(/^["']|["']$/g,''));
    const status = cols[iStatus] || '';
    const type   = cols[iType]   || '';
    // skip balance rows, footer rows, pending
    if (status !== 'Complete' && status !== 'Issued') continue;
    const datetime = cols[iDatetime] || '';
    const date = parseDt(datetime);
    if (!date) continue;
    const amtStr = cols[iAmt] || '';
    const amtMatch = amtStr.replace(/,/g,'').match(/([+\-])\s*\$?([\d.]+)/);
    if (!amtMatch) continue;
    // Venmo sign convention: + means money received, - means money sent
    // App convention: positive = expense, negative = income
    const venmoSign = amtMatch[1] === '+' ? 1 : -1;
    const absVal = parseFloat(amtMatch[2]);
    if (isNaN(absVal)) continue;
    const amount = -(venmoSign * absVal); // flip: received → negative (income), sent → positive (expense)

    const note  = (cols[iNote] || '').trim();
    const from  = (cols[iFrom] || '').trim();
    const to    = (cols[iTo]   || '').trim();

    let description, category;
    if (type === 'Standard Transfer') {
      description = 'Venmo Transfer';
      category = 'transfer'; // ignored
    } else {
      const counterparty = venmoSign > 0 ? from : to; // received from / sent to
      const direction    = venmoSign > 0 ? 'from' : 'to';
      const base = note || counterparty || 'Venmo Payment';
      // Append counterparty so you can see who it was with at a glance
      description = counterparty ? `${base} (${direction} ${counterparty})` : base;
      category = categorize(base); // categorize on the note, not the full string
    }

    txns.push({id:uid(), date, description, amount, category, person, shared:false, settled:false, splitRatio:0.5, note:'', excluded:false});
  }
  return txns;
}
// ── Coinbase CSV Parser ──────────────────────────────────────
function isCoinbaseCSV(text) {
  return text.includes('Transaction Type') && text.includes('Quantity Transacted') && text.includes('Timestamp');
}
function parseCoinbaseToTxns(text, person) {
  const lines = text.split(/\r?\n/);
  const headerIdx = lines.findIndex(l => l.includes('Transaction Type') && l.includes('Timestamp'));
  if (headerIdx < 0) return [];
  const headers = splitCSVLine(lines[headerIdx]).map(h => h.replace(/^["']|["']$/g,''));
  const col = name => headers.findIndex(h => h === name);
  const iTimestamp = col('Timestamp');
  const iType      = col('Transaction Type');
  const iAsset     = col('Asset');
  const iTotal     = headers.findIndex(h => h.startsWith('Total'));
  const iNotes     = col('Notes');
  if (iTimestamp < 0 || iType < 0 || iTotal < 0) return [];

  const txns = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = splitCSVLine(line).map(c => c.replace(/^["']|["']$/g,''));
    const date = parseDt(cols[iTimestamp] || '');
    if (!date) continue;
    const txnType = (cols[iType]  || '').trim();
    const asset   = (cols[iAsset] || '').trim();
    const notes   = iNotes >= 0 ? (cols[iNotes] || '').trim() : '';
    const totalAmt = parseFloat((cols[iTotal] || '').replace(/[$,]/g, ''));
    if (isNaN(totalAmt) || totalAmt === 0) continue;

    // Description: prefer Notes field, else "Type Asset"
    const description = notes || `${txnType} ${asset}`;

    // Amount sign: our app uses positive=expense, negative=income
    // Coinbase: Send=negative total, Receive/Staking=positive total, Buy=positive total (USD spent)
    // Buy is an expense (positive); everything else: negate the Coinbase sign
    const amount = txnType === 'Buy' ? Math.abs(totalAmt) : -totalAmt;

    let category;
    if (txnType === 'Staking Income' || txnType === 'Receive' || txnType === 'Sell') category = 'income';
    else category = categorize(description) || 'other';

    txns.push({ id:uid(), date, description, amount, category, person,
      shared:false, settled:false, splitRatio:0.5, note:'coinbase', excluded:false });
  }
  return txns;
}

function detectCols(headers) {
  const lo = headers.map(h => h.toLowerCase().trim());
  const find = (...pats) => { for (const p of pats) { const i = lo.findIndex(h => h.includes(p)); if (i >= 0) return headers[i]; } return null; };
  return {
    dateCol:  find('transaction date','trans. date','trans date','date'),
    descCol:  find('description','merchant','payee','name','memo','details'),
    amtCol:   find('amount'),
    debitCol: find('debit'),
    creditCol:find('credit'),
  };
}
function rowsToTxns(rows, {dateCol,descCol,amtCol,debitCol,creditCol,invert}, person) {
  return rows.reduce((acc, row) => {
    const date = parseDt(row[dateCol]);
    const description = (row[descCol]||'').trim();
    if (!date || !description) return acc;
    let amount;
    if (amtCol && row[amtCol] !== undefined) {
      const v = parseAmt(row[amtCol]); if (v === null) return acc;
      amount = invert ? -v : v;
    } else if (debitCol || creditCol) {
      const deb = debitCol ? parseAmt(row[debitCol]) : null;
      const cred = creditCol ? parseAmt(row[creditCol]) : null;
      if (deb && Math.abs(deb) > 0) amount = Math.abs(deb);
      else if (cred && Math.abs(cred) > 0) amount = -Math.abs(cred);
      else return acc;
    } else return acc;
    if (amount === null || isNaN(amount)) return acc;
    acc.push({id:uid(), date, description, amount, category:categorize(description), person, shared:false, settled:false, splitRatio:0.5, note:'', excluded:false});
    return acc;
  }, []);
}

function canSeePrivate(person) {
  const linked = (S.settings[person === 'p1' ? 'person1Email' : 'person2Email'] || '').trim().toLowerCase();

function isVisible(t) {
  if (!t.shared && !canSeePrivate(t.person)) return false;

// ── Overview ───────────────────────────────────────────────
// Returns sorted list of YYYY-MM strings that fall within the current overview range.
// S.currentMonth is always the range END (< > nav shifts it).
function getOverviewMonths() {
  const all = [...new Set(S.transactions.map(t => t.date.slice(0,7)))].filter(Boolean).sort();
  if (!all.length) return [S.currentMonth];
  // Ensure currentMonth is included even if there are no txns yet this month
  if (!all.includes(S.currentMonth)) all.push(S.currentMonth);
  all.sort();
  const endIdx = all.indexOf(S.currentMonth);
  const curYear = S.currentMonth.slice(0,4);
  switch (S.overviewRange) {
    case 'ytd': {
      const yr  = S.overviewYear || curYear;
      const cap = yr === curYear ? S.currentMonth : yr + '-12';
      return all.filter(m => m.startsWith(yr) && m <= cap);
    }
    case 'all':    return [...all];
    case 'custom': {
      const sel = S.overviewCustomMonths;
      if (sel && sel.length) return all.filter(m => sel.includes(m));
      return [S.currentMonth]; // fallback if nothing selected yet
    }
    default: return [S.currentMonth]; // '1mo'
  }
}

function renderOverview() {
  const rangeMonths = getOverviewMonths();
  const isMulti     = rangeMonths.length > 1;
  const txns = S.transactions.filter(t => t.date && rangeMonths.includes(t.date.slice(0,7)));
  const exp = txns.filter(t => t.amount > 0 && !getCat(t.category).ignored && !t.excluded && isVisible(t));
  // visExp: transactions the current viewer is allowed to see (already filtered by isVisible)
  const visExp = exp;
  const total = visExp.reduce((s,t) => s+t.amount, 0);
  // per-person solo spending
  const p1sp  = exp.filter(t => t.person==='p1' && !t.shared).reduce((s,t) => s+t.amount, 0);
  const p2sp  = exp.filter(t => t.person==='p2' && !t.shared).reduce((s,t) => s+t.amount, 0);
  const sharedTxns = exp.filter(t => t.shared);
  const shared = sharedTxns.reduce((s,t) => s+t.amount, 0);
  const sharedByCat = {};
  for (const t of sharedTxns) sharedByCat[t.category] = (sharedByCat[t.category]||0) + t.amount;
  let sharedP1 = 0, sharedP2 = 0;
  for (const [catId, amt] of Object.entries(sharedByCat)) { const {p1Share, p2Share} = getCatSplitAmts(catId, amt); sharedP1 += p1Share; sharedP2 += p2Share; }
  // income: visible-only so viewer can't back-calculate hidden spending via net savings
  const visInc = txns.filter(t => t.amount < 0 && !getCat(t.category).ignored && !t.excluded && isVisible(t));
  const totalInc = visInc.reduce((s,t) => s + Math.abs(t.amount), 0);
  const p1inc = visInc.filter(t => t.person==='p1').reduce((s,t) => s + Math.abs(t.amount), 0);
  const p2inc = visInc.filter(t => t.person==='p2').reduce((s,t) => s + Math.abs(t.amount), 0);
  // Retirement breakdown (income category only)
  const incTxns = visInc.filter(t => t.category === 'income');
  const retTot  = incTxns.filter(t => getIncomeType(t.id,t.description)==='retirement').reduce((s,t)=>s+Math.abs(t.amount),0);
  const famTot  = incTxns.filter(t => getIncomeType(t.id,t.description)==='family').reduce((s,t)=>s+Math.abs(t.amount),0);
  const nrmTot  = incTxns.filter(t => getIncomeType(t.id,t.description)==='normal').reduce((s,t)=>s+Math.abs(t.amount),0);
  const p1ret   = incTxns.filter(t => t.person==='p1' && getIncomeType(t.id,t.description)==='retirement').reduce((s,t)=>s+Math.abs(t.amount),0);
  const p1fam   = incTxns.filter(t => t.person==='p1' && getIncomeType(t.id,t.description)==='family').reduce((s,t)=>s+Math.abs(t.amount),0);
  const p2ret   = incTxns.filter(t => t.person==='p2' && getIncomeType(t.id,t.description)==='retirement').reduce((s,t)=>s+Math.abs(t.amount),0);
  const p2fam   = incTxns.filter(t => t.person==='p2' && getIncomeType(t.id,t.description)==='family').reduce((s,t)=>s+Math.abs(t.amount),0);
  const p1Locked = !canSeePrivate('p1');
  const p2Locked = !canSeePrivate('p2');
  // Scale factor for avg-per-month view (1 = totals, nMo = divide for avg)
  const nMo      = Math.max(rangeMonths.length, 1);
  const div      = (isMulti && S.overviewView === 'avg') ? nMo : 1;
  const scaleNum = n => n / div;
  // ── Income card renderer ───────────────────────────────────────────────────
  // Outcome-first layout: hero = what you saved (or lost), inputs = earned/spent chips below.
  // showSplit=false on combined card (no per-person solo/shared noise at that level).
  function personSummaryHtml(inc, solo, sharedAmt, locked, ret, showSplit, fam) {
    if (locked) return `<div style="padding:18px 0;text-align:center;color:var(--text-3);font-size:.85rem">🔒 Private</div>`;
    fam = fam || 0;
    const spend     = solo + sharedAmt;
    const normalInc = inc - ret - fam;   // post-tax take-home (excludes retirement + family)
    const tSaved    = inc - spend;       // total income minus total expenses
    const sRate     = normalInc > 0 ? Math.round(tSaved / normalInc * 100) : 0;
    const isDeficit = tSaved < 0;
    const useRet = ret > 0, useFam = fam > 0;

    // Savings rate fill bar — single color, shows how "full" your savings glass is.
    // Red when deficit, yellow when low, green when healthy (≥20% is the gold standard).
    const barColor = isDeficit ? '#ef4444' : sRate >= 20 ? '#22c55e' : sRate >= 10 ? '#f59e0b' : '#f59e0b';
    const barFill  = Math.max(0, Math.min(sRate, 100));
    const bar = inc > 0 ? `
      <div style="margin:8px 0 14px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
          <span style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3)">Savings rate</span>
          <span style="font-size:.85rem;font-weight:700;color:${barColor}">${sRate}% of income</span>
        </div>
        <div style="background:#f3f4f6;border-radius:5px;height:7px;overflow:hidden">
          <div style="width:${barFill}%;height:100%;background:${barColor};border-radius:4px"></div>
        </div>
      </div>` : '<div style="height:14px"></div>';

    // Hero: the outcome. Lead with what actually happened to your money.
    const heroColor  = isDeficit ? '#dc2626' : sRate >= 20 ? '#16a34a' : sRate >= 10 ? '#ca8a04' : '#6b7280';
    const heroLabel  = isDeficit ? 'Deficit' : 'Saved';
    const heroAmt    = isDeficit ? `−${fc(Math.abs(tSaved))}` : `+${fc(tSaved)}`;
    const rateBadge  = '';

    // Cash flow = normal (take-home) income minus expenses — what you actually live on.
    const cashFlow    = normalInc - spend;
    const cfColor     = cashFlow >= 0 ? '#0369a1' : '#dc2626';
    const cashFlowLine = useRet ? `
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:5px">
        <span style="font-size:.82rem;color:var(--text-3)">Take-home cash flow</span>
        <span style="font-size:.88rem;font-weight:700;color:${cfColor}">${cashFlow>=0?'+':'−'}${fc(Math.abs(cashFlow))}</span>
      </div>` : '';

    // Sub-detail lines inside each chip — detail belongs to its parent number.
    // Earned chip shows 401k + cash saved breakdown. Spent chip shows solo + shared.
    const sub = (label, val, color) =>
      `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:5px;padding-top:5px;border-top:1px solid rgba(0,0,0,.06)">
        <span style="font-size:.78rem;color:var(--text-3)">${label}</span>
        <span style="font-size:.82rem;font-weight:700;color:${color}">${fc(val)}</span>
      </div>`;

    const earnedSubs = (useRet || useFam)
      ? (useRet ? sub('Retirement', ret, '#D4663A') : '')
        + (useFam ? sub('Family', fam, '#7c3aed') : '')
        + sub('Normal', inc - ret - fam, '#15803d')
      : '';
    const spentSubs = showSplit !== false && (solo > 0 || sharedAmt > 0)
      ? sub('solo', solo, '#9f1239') + sub('shared', sharedAmt, '#9f1239')
      : '';

    const chips = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="background:#f0fdf4;border-radius:8px;padding:8px 10px">
          <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#16a34a;margin-bottom:3px">Earned</div>
          <div style="font-size:1.1rem;font-weight:800;color:#15803d">+${fc(inc)}</div>
          ${earnedSubs}
        </div>
        <div style="background:#fef2f2;border-radius:8px;padding:8px 10px">
          <div style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#dc2626;margin-bottom:3px">Spent</div>
          <div style="font-size:1.1rem;font-weight:800;color:#b91c1c">${fc(spend)}</div>
          ${spentSubs}
        </div>
      </div>`;

    const detail = '';

    return `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
        <div>
          <div style="font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:3px">${heroLabel}</div>
          <div style="font-size:1.6rem;font-weight:800;color:${heroColor};line-height:1.1">${heroAmt}</div>
        </div>
        <div style="margin-top:4px">${rateBadge}</div>
      </div>
      ${cashFlowLine}
      ${bar}
      ${chips}
      ${detail}`;
  }
  // Net per category: use visible transactions only so categories don't leak private amounts
  const byCat = {};
  for (const t of txns.filter(t => !getCat(t.category).ignored && !t.excluded && isVisible(t))) byCat[t.category] = (byCat[t.category]||0)+t.amount;
  const catArr = Object.entries(byCat).filter(([,v])=>v>0).sort((a,b) => b[1]-a[1]);
  const mx = catArr[0]?.[1]||1;
  const noExpMsg = isMulti ? 'No expenses in this range' : 'No expenses this month';
  // Per-person per-category for split bars
  const p1ByCat = {}, p2ByCat = {};
  for (const t of exp) {
    if (t.person==='p1'||t.shared) p1ByCat[t.category] = (p1ByCat[t.category]||0) + t.amount;
    if (t.person==='p2'||t.shared) p2ByCat[t.category] = (p2ByCat[t.category]||0) + t.amount;
  }
  const catTotal = catArr.reduce((s,[,v])=>s+v, 0);
  const catBars = catArr.map(([cid,amt]) => {
    const c = getCat(cid);
    const displayAmt = scaleNum(amt);
    const pct = catTotal > 0 ? Math.round(amt/catTotal*100) : 0;
    const barW = (amt/mx*100).toFixed(1);
    const p1a = p1ByCat[cid]||0, p2a = p2ByCat[cid]||0, ptot = p1a+p2a;
    const p1pct = ptot>0 ? (p1a/ptot*100).toFixed(0) : 50;
    return `<div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--bg);">
      <div style="width:32px;height:32px;border-radius:8px;background:${c.color}10;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="bi ${c.icon}" style="font-size:14px;color:${c.color};"></i></div>
      <div style="width:80px;font-size:12px;font-weight:700;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.label}</div>
      <div style="flex:1;height:10px;background:rgba(0,0,0,0.04);border-radius:5px;overflow:hidden;display:flex;"><div style="width:${barW*p1pct/100}%;background:var(--p1);"></div><div style="width:${barW*(100-p1pct)/100}%;background:var(--p2);"></div></div>
      <div style="font-size:15px;font-weight:900;">${fc0(displayAmt)}</div>
      <div style="font-size:10px;font-weight:700;color:var(--text-3);">${pct}%</div>
      <i class="bi bi-chevron-right" style="font-size:10px;color:#ddd;"></i>
    </div>`;
  }).join('') || `<p class="text-muted" style="text-align:center;padding:18px">${noExpMsg}</p>`;
  // Category donut SVG
  const donutCirc = 2 * Math.PI * 42;
  let donutOff = 0;
  const donutArcs = catArr.map(([cid,amt]) => {
    const c = getCat(cid);
    const pct = catTotal > 0 ? amt/catTotal : 0;
    const len = pct * donutCirc;
    const o = donutOff;
    donutOff += len + 4;
    return `<circle cx="50" cy="50" r="42" fill="none" stroke="${c.color}" stroke-width="10" stroke-dasharray="${len} ${donutCirc-len}" stroke-dashoffset="${-o}" stroke-linecap="round"/>`;
  }).join('');
  const catDonut = catArr.length ? `<div style="position:relative;width:140px;height:140px;flex-shrink:0;">
    <svg viewBox="0 0 100 100" style="transform:rotate(-90deg);width:100%;height:100%;">
      <circle cx="50" cy="50" r="42" fill="none" stroke="var(--bg)" stroke-width="10"/>
      ${donutArcs}
    </svg>
    <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div style="font-size:20px;font-weight:900;">${fc0(scaleNum(catTotal))}</div>
      <div style="font-size:7px;font-weight:700;color:var(--text-3);letter-spacing:1px;">TOTAL</div>
    </div>
  </div>` : '';
  // Historical per-category averages — exclude the months in the current range so we compare apples to apples
  const pastMonths = [...new Set(S.transactions.map(t => t.date.slice(0,7)))].filter(m => !rangeMonths.includes(m) && !S.excludedFromAvg.includes(m));
  const avgByCat = {};
  if (pastMonths.length) {
    for (const mo of pastMonths) {
      const moExp = S.transactions.filter(t => t.date.startsWith(mo) && !getCat(t.category).ignored && !t.excluded && isVisible(t));
      for (const t of moExp) avgByCat[t.category] = (avgByCat[t.category]||0) + t.amount;
    }
    for (const k of Object.keys(avgByCat)) avgByCat[k] /= pastMonths.length;
  }
  for (const k of Object.keys(avgByCat)) if (avgByCat[k] <= 0) delete avgByCat[k]; // drop net-negative avg categories
  const vCats = [...new Set([...Object.keys(byCat), ...Object.keys(avgByCat)])].sort((a,b) => (byCat[b]||0)-(byCat[a]||0));
  const vMax = Math.max(...vCats.map(cid => Math.max(byCat[cid]||0, avgByCat[cid]||0)), 1);
  const vBars = vCats.map(cid => {
    const c = getCat(cid);
    const cur = byCat[cid]||0; const avg = avgByCat[cid]||0;
    const curH = Math.max(Math.round(cur/vMax*120), cur>0?3:0);
    const avgH = Math.max(Math.round(avg/vMax*120), avg>0?3:0);
    const curTip = `${esc(c.label)} ${isMulti ? 'this range' : 'this month'}: ${fc(cur)}`;
    return `<div class="vbar-group"><div class="vbar-pair"><div class="vbar-cur" style="height:${curH}px;background:${c.color}" title="${curTip}"></div><div class="vbar-avg" style="height:${avgH}px" title="${esc(c.label)} avg/mo: ${fc(avg)}"></div></div><div class="vbar-lbl">${c.emoji}</div></div>`;
  }).join('');
  // Top merchants — only include transactions the current viewer can see
  const merchantMap = {};
  for (const t of exp) { const key = t.description.trim().toLowerCase(); if (!merchantMap[key]) merchantMap[key]={label:t.description,amount:0,count:0}; merchantMap[key].amount+=t.amount; merchantMap[key].count++; }
  const topMerchants = Object.values(merchantMap).sort((a,b) => b.amount-a.amount).slice(0,10);
  const merchantRows = topMerchants.map((m,i) => `<div class="merchant-row"><div class="merchant-rank">#${i+1}</div><div class="merchant-name" title="${esc(m.label)}">${esc(m.label.length>36?m.label.slice(0,36)+'…':m.label)}</div><div class="merchant-meta">${m.count} txn${m.count!==1?'s':''}</div><div class="merchant-amt">${fc(m.amount)}</div></div>`).join('');
  // Recurring income management section
  const recRules = S.recurringIncome || [];
  const recSectionHtml = recRules.length ? `
<div class="card" style="margin-bottom:14px">
  <div class="section-title" style="margin-bottom:10px">🔄 Recurring Income</div>
  ${recRules.map(r => {
    const pName = esc(r.person==='p1' ? S.settings.person1 : S.settings.person2);
    const pColor = r.person==='p1' ? 'var(--p1)' : 'var(--p2)';
    const freqLabel = r.frequency==='biweekly' ? 'Bi-weekly' : 'Monthly';
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.description)}</div><div style="font-size:.76rem;color:var(--text-3);margin-top:1px">${freqLabel} · <span style="color:${pColor};font-weight:600">${pName}</span></div></div>
      <div style="font-weight:700;color:var(--green);flex-shrink:0">+${fc(r.amount)}</div>
      <button onclick="deleteRecurringIncome('${r.id}')" style="border:none;background:none;cursor:pointer;color:var(--text-3);padding:4px 6px;border-radius:6px;font-size:.9rem;flex-shrink:0" title="Delete">🗑️</button>
    </div>`;
  }).join('')}
</div>` : '';

  // ── Range toggle row ────────────────────────────────────────────────────────
  const shortMo = new Date(S.currentMonth + '-02').toLocaleDateString('en-US', {month:'short'});
  const rangeTab = (label, active, fn) =>
    `<span onclick="${fn}" style="font-size:13px;font-weight:${active?'800':'600'};color:${active?'var(--primary)':'#999'};cursor:pointer;${active?'border-bottom:2px solid var(--primary);padding-bottom:6px;margin-bottom:-9px;':''};-webkit-tap-highlight-color:transparent">${label}</span>`;
  const avgTab = (label, active, fn) =>
    `<span onclick="${fn}" style="font-size:12px;font-weight:${active?'800':'600'};color:${active?'var(--primary)':'#999'};cursor:pointer;-webkit-tap-highlight-color:transparent">${label}</span>`;
  const r = S.overviewRange;

  const activeYear = S.overviewYear || S.currentMonth.slice(0,4);
  const allYears   = [...new Set(S.transactions.map(t => t.date.slice(0,4)))].filter(Boolean).sort();
  const navArrow   = (fn, dis, ch) =>
    `<button onclick="${fn}" ${dis?'disabled':''} style="border:none;background:none;font-size:1.15rem;cursor:pointer;color:${dis?'var(--border-strong)':'var(--text-2)'};padding:1px 6px;line-height:1">${ch}</button>`;
  let multiNav = '';
  if (r === 'custom') {
    multiNav = navArrow('shiftCustomRange(-1)', false, '‹') +
               navArrow('shiftCustomRange(1)',  false, '›');
  }
  const navRight = isMulti && multiNav
    ? `<div style="display:flex;align-items:center;gap:2px">${multiNav}</div>`
    : '';

  const viewToggleInline = isMulti
    ? `<div style="display:flex;gap:14px;margin-left:auto">${avgTab('Total', S.overviewView==='total', 'setOverviewView(&quot;total&quot;)')}${avgTab('Avg/mo', S.overviewView==='avg', 'setOverviewView(&quot;avg&quot;)')}</div>`
    : '';

  const rangeToggle = `<div style="display:flex;align-items:center;gap:18px;margin-bottom:14px;border-bottom:1px solid var(--border-strong);padding-bottom:8px">
    ${rangeTab(shortMo, r==='1mo', 'setOverviewRange(&quot;1mo&quot;)')}
    ${rangeTab(activeYear, r==='ytd', 'setOverviewRange(&quot;ytd&quot;)')}
    ${rangeTab('All', r==='all', 'setOverviewRange(&quot;all&quot;)')}
    ${rangeTab('Custom', r==='custom', 'showOverviewCustomPicker()')}
    ${navRight}
    ${viewToggleInline}
  </div>`;

  const viewToggle = '';

  // Update header label: YTD shows the year, custom/all shows range span, 1M shows month
  requestAnimationFrame(() => {
    const lbl = document.getElementById('mo-label');
    if (!lbl) return;
    if (r === 'ytd')         lbl.textContent = activeYear;
    else if (isMulti)        lbl.textContent = `${moLabel(rangeMonths[0])} – ${moLabel(rangeMonths[rangeMonths.length-1])}`;
    else                     lbl.textContent = moLabel(S.currentMonth);
  });

  // ── Mobile: iOS grouped overview ─────────────────────────
  if (isMobile()) {
    // ── Compute fixed vs variable spending ──
    const fixedTotal = scaleNum(exp.filter(t => isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));
    const varTotal = scaleNum(exp.reduce((s,t)=>s+t.amount,0)) - fixedTotal;
    const p1Fixed = scaleNum(exp.filter(t => (t.person==='p1'||t.shared) && isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));
    const p1Var = scaleNum(exp.filter(t => (t.person==='p1'||t.shared) && !isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));
    const p2Fixed = scaleNum(exp.filter(t => (t.person==='p2'||t.shared) && isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));
    const p2Var = scaleNum(exp.filter(t => (t.person==='p2'||t.shared) && !isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));

    // ── 2x2 person card builder ──
    // Stocks-style currency: sign+$ as superscript, number weight 300 (zero) / 700 (non-zero)
    function moneyEl(sign, amount, color) {
      const isZero = Math.abs(amount) < 0.005;
      const num = fc(Math.abs(amount)).slice(1); // strip leading $
      return `<span style="color:${color}"><sup style="font-size:0.6em;font-weight:700;vertical-align:super;line-height:0">${sign}$</sup><span style="font-weight:${isZero?300:800}">${num}</span></span>`;
    }

    function mobilePersonSlide(title, titleColor, cls, inc, spend, locked, ret, fam, fixed, variable) {
      if (locked) return `<div class="ov-slide"><div class="ov-slide-inner income-card ${cls}"><div class="ov-person-card"><div class="income-title" style="${titleColor?'color:'+titleColor:''}">${title}</div><div class="ov-card-grid"><div class="ov-card-cell" style="grid-column:1/-1;align-items:center"><div style="font-size:2rem;margin-bottom:8px">🔒</div><div style="font-size:1rem;color:var(--text-3)">Private</div></div></div></div></div></div>`;
      fam = fam || 0;
      const normalInc = inc - (ret||0) - fam;
      const tSaved = inc - spend;
      const sRate = normalInc > 0 ? Math.round(tSaved / normalInc * 100) : 0;
      const isDeficit = tSaved < 0;
      // Token-based colors (accessible contrast on white)
      const ringColor = isDeficit ? 'var(--color-deficit)' : sRate >= 20 ? 'var(--color-saved-pos)' : 'var(--color-amber)';
      const heroColor = isDeficit ? 'var(--color-deficit)' : sRate >= 20 ? 'var(--color-saved-pos)' : sRate >= 10 ? 'var(--color-amber)' : 'var(--ios-secondary)';
      const heroLabel = isDeficit ? 'Deficit' : 'Saved';

      // SVG ring chart
      const circ = 2 * Math.PI * 36;
      const fillPct = Math.max(0, Math.min(sRate, 100));
      const dashOffset = circ - (fillPct / 100) * circ;

      // Proportional earned-vs-spent bar
      const total = inc + spend;
      const earnPct = total > 0 ? Math.round(inc / total * 100) : 50;

      // Earned breakdown — no decimals, accessible token colors
      const earnedRows = [];
      if ((ret||0) > 0) earnedRows.push({l:'Normal', v:fc0(normalInc), c:'var(--color-earned)'});
      if ((ret||0) > 0) earnedRows.push({l:'Retirement', v:fc0(ret), c:'var(--primary)'});
      if (fam > 0) earnedRows.push({l:'Family', v:fc0(fam), c:'#6D28D9'});

      const cashFlowColor = (normalInc-spend)>=0?'var(--color-earned)':'var(--color-spent)';
      const cashFlowAmt = fc0(Math.abs(normalInc-spend));
      // Only show the take-home chip when retirement/family income is present —
      // otherwise tSaved === cashFlow and the chip would be redundant.
      const hasSpecialInc = (ret||0) > 0 || fam > 0;
      const cashFlowChip = hasSpecialInc
        ? `<div class="ov-cashflow-chip" style="background:${(normalInc-spend)>=0?'rgba(48,209,88,0.12)':'rgba(255,59,48,0.1)'};color:${cashFlowColor}">${(normalInc-spend)>=0?'+':'−'}${cashFlowAmt} take-home</div>`
        : '';

      return `<div class="ov-slide"><div class="ov-slide-inner income-card ${cls}"><div class="ov-person-card">
        <div class="income-title" style="${titleColor?'color:'+titleColor:''}">${title}</div>
        <div class="ov-ep-bar-wrap">
          <div class="ov-ep-bar"><div class="ov-ep-bar-earn" style="width:${earnPct}%"></div><div class="ov-ep-bar-spend"></div></div>
          <div class="ov-ep-bar-labels"><span style="color:var(--color-earned)">▲ Earned ${fc0(inc)}</span><span style="color:var(--color-spent)">▼ Spent ${fc0(spend)}</span></div>
        </div>
        <div class="ov-card-grid">
          <div class="ov-card-cell" style="justify-content:space-between">
            <div>
              <div class="ov-cell-label">${heroLabel}</div>
              <div class="ov-cell-value" style="color:${heroColor}">${(isDeficit?'−':'+')}${fc0(Math.abs(tSaved))}</div>
            </div>
            ${cashFlowChip}
          </div>
          <div class="ov-card-cell" style="align-items:center;justify-content:flex-start;padding:10px 6px 6px">
            <div class="ov-cell-label" style="text-align:center;width:100%">Savings Rate</div>
            <div class="ov-ring">
              <svg viewBox="0 0 100 100">
                <circle class="ov-ring-bg" cx="50" cy="50" r="36"/>
                <circle class="ov-ring-fill" id="ring-${cls}" cx="50" cy="50" r="36" stroke="${ringColor}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}" data-to="${dashOffset}"/>
              </svg>
              <div class="ov-ring-center">
                <div class="ov-ring-pct" style="color:${ringColor}">${sRate}%</div>
                <div class="ov-ring-lbl">saved</div>
              </div>
            </div>
          </div>
          <div class="ov-card-cell" style="background:var(--color-earned-bg);border-radius:0 0 0 12px;justify-content:space-between">
            <div>
              <div class="ov-cell-label" style="color:var(--color-earned)">Earned</div>
              <div class="ov-cell-value" style="color:var(--color-earned)">+${fc0(inc)}</div>
            </div>
            <div class="ov-breakdown">
              ${earnedRows.length ? earnedRows.map(r => `<div class="ov-breakdown-row"><span class="ov-breakdown-label"><span class="ov-dot" style="background:${r.c}"></span>${r.l}</span><span class="ov-breakdown-value" style="color:${r.c}">${r.v}</span></div>`).join('') : ''}
            </div>
          </div>
          <div class="ov-card-cell" style="background:rgba(255,59,48,0.07);border-radius:0 0 12px 0;justify-content:space-between">
            <div>
              <div class="ov-cell-label" style="color:var(--color-spent)">Spent</div>
              <div class="ov-cell-value" style="color:var(--color-spent)">${fc0(spend)}</div>
            </div>
            <div class="ov-breakdown">
              <div class="ov-breakdown-row"><span class="ov-breakdown-label"><span class="ov-dot" style="background:var(--color-fixed)"></span>Fixed</span><span class="ov-breakdown-value" style="color:var(--color-fixed)">${fc0(fixed)}</span></div>
              <div class="ov-breakdown-row"><span class="ov-breakdown-label"><span class="ov-dot" style="background:var(--color-amber)"></span>Variable</span><span class="ov-breakdown-value" style="color:var(--color-amber)">${fc0(variable)}</span></div>
            </div>
          </div>
        </div>
      </div></div></div>`;
    }

    const totalSpend = scaleNum(total);
    const slide1 = mobilePersonSlide('Combined', 'var(--primary)', 'ic-combined', scaleNum(totalInc), totalSpend, false, scaleNum(retTot), scaleNum(famTot), fixedTotal, varTotal);
    const slide2 = mobilePersonSlide(esc(S.settings.person1), 'var(--p1)', 'ic-p1', scaleNum(p1inc), scaleNum(p1sp+sharedP1), p1Locked, scaleNum(p1ret), scaleNum(p1fam), p1Fixed, p1Var);
    const slide3 = mobilePersonSlide(esc(S.settings.person2), 'var(--p2)', 'ic-p2', scaleNum(p2inc), scaleNum(p2sp+sharedP2), p2Locked, scaleNum(p2ret), scaleNum(p2fam), p2Fixed, p2Var);

    // ── Slide 4: Categories ──
    const slide4 = `<div class="ov-slide"><div class="ov-slide-inner ov-scrollable" style="display:flex;flex-direction:column">
      <div class="ov-slide-title">Spending by Category</div>
      <div style="padding:8px 0;flex:1">
        ${catBars}
        ${vCats.length?`<div style="margin:14px 14px 0;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:.78rem;font-weight:700;margin-bottom:8px;color:var(--text-2)">vs. Average</div><div class="vert-legend"><span><span class="vert-dot" style="background:var(--primary)"></span>${isMulti?'Range':'Month'}</span><span><span class="vert-dot" style="background:#d1d5db"></span>Avg</span></div><div class="vert-chart">${vBars}</div></div>`:''}
      </div>
    </div></div>`;

    // ── Slide 5: Top Merchants ──
    const slide5 = `<div class="ov-slide"><div class="ov-slide-inner ov-scrollable" style="display:flex;flex-direction:column">
      <div class="ov-slide-title">Top Merchants</div>
      <div style="padding:4px 0;flex:1">
        ${topMerchants.length?topMerchants.map((m,i) => `<div class="merchant-row"><div class="merchant-rank">#${i+1}</div><div class="merchant-name" title="${esc(m.label)}">${esc(m.label.length>30?m.label.slice(0,30)+'…':m.label)}</div><div class="merchant-meta">${m.count} txn${m.count!==1?'s':''}</div><div class="merchant-amt">${fc0(m.amount)}</div></div>`).join(''):'<p class="text-muted" style="text-align:center;padding:18px">No transactions yet</p>'}
      </div>
    </div></div>`;

    const slideNames = ['Combined', esc(S.settings.person1||'Person 1'), esc(S.settings.person2||'Person 2'), 'Categories', 'Merchants'];
    const dots = `<div class="ov-tabs" id="ov-dots">
      ${slideNames.map((n,i) => `<div class="ov-tab${i===0?' active':''}" data-idx="${i}">${n}</div>`).join('')}
    </div>`;

    // Wire up tab tracking after render
    requestAnimationFrame(() => {
      const carousel = document.getElementById('ov-carousel');
      const dotsEl = document.getElementById('ov-dots');
      if (!carousel || !dotsEl) return;
      // Animate ring fills from 0 → target (entrance animation)
      requestAnimationFrame(() => {
        document.querySelectorAll('.ov-ring-fill[data-to]').forEach(el => {
          el.style.strokeDashoffset = el.dataset.to;
        });
      });
      carousel.addEventListener('scroll', () => {
        const idx = Math.round(carousel.scrollLeft / carousel.offsetWidth * (5/4.75));
        const clampedIdx = Math.max(0, Math.min(4, idx));
        dotsEl.querySelectorAll('.ov-tab').forEach((d, i) => {
          d.classList.toggle('active', i === clampedIdx);
          if (i === clampedIdx) d.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
        });
      }, {passive: true});
      // Tap tabs to navigate and re-animate ring for person slides
      dotsEl.addEventListener('click', e => {
        const dot = e.target.closest('.ov-tab');
        if (!dot) return;
        const idx = +dot.dataset.idx;
        carousel.scrollTo({left: idx * carousel.offsetWidth, behavior: 'smooth'});
        // Re-animate ring fill when navigating to a person slide (0-2)
        if (idx <= 2) {
          const rings = ['ic-combined','ic-p1','ic-p2'];
          const ring = document.getElementById('ring-' + rings[idx]);
          if (ring) {
            ring.style.transition = 'none';
            ring.style.strokeDashoffset = ring.getAttribute('stroke-dasharray');
            requestAnimationFrame(() => {
              ring.style.transition = '';
              ring.style.strokeDashoffset = ring.dataset.to;
            });
          }
        }
      });
    });

    // On mobile: hide viewToggle entirely when single-month (visibility:hidden still takes layout space)
    const viewToggleMobile = isMulti ? `<div style="display:flex;gap:5px;margin-bottom:8px">${pill('Total',S.overviewView==='total','setOverviewView(&quot;total&quot;)')}${pill('Avg / mo',S.overviewView==='avg','setOverviewView(&quot;avg&quot;)')}</div>` : '';
    // Compact range toggle margin on mobile — desktop uses 14px, mobile 8px
    const rangeToggleMobile = rangeToggle.replace('margin-bottom:14px', 'margin-bottom:8px');

    return `
${rangeToggleMobile}
${viewToggleMobile}
${recSectionHtml}
<div class="ov-carousel" id="ov-carousel">
  ${slide1}${slide2}${slide3}${slide4}${slide5}
</div>
${dots}`;
  }

  // ── Desktop: standard overview ──────────────────────────
  // Compute fixed vs variable for desktop
  const dFixedTotal = scaleNum(exp.filter(t => isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));
  const dVarTotal = scaleNum(total) - dFixedTotal;
  const dP1Fixed = scaleNum(exp.filter(t => (t.person==='p1'||t.shared) && isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));
  const dP1Var = scaleNum(exp.filter(t => (t.person==='p1'||t.shared) && !isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));
  const dP2Fixed = scaleNum(exp.filter(t => (t.person==='p2'||t.shared) && isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));
  const dP2Var = scaleNum(exp.filter(t => (t.person==='p2'||t.shared) && !isFixedCat(t.category)).reduce((s,t)=>s+t.amount,0));

  // Ring Center Stage card builder
  function ringCard(title, titleColor, inc, spend, locked, ret, fam, fixed, variable) {
    if (locked) return `<div class="rcs-card"><div class="rcs-title" style="color:${titleColor}">${title}</div><div style="padding:40px 0;text-align:center;color:#b0a090;font-size:1.2rem">🔒 Private</div></div>`;
    fam = fam || 0; ret = ret || 0;
    const normalInc = inc - ret - fam;
    const saved = inc - spend;
    const sRate = normalInc > 0 ? Math.round(saved / normalInc * 100) : 0;
    const isLoss = saved < 0;
    const ringColor = isLoss ? 'var(--red)' : 'var(--green)';
    const ringColorRaw = isLoss ? '#A84A2A' : '#3A6A3A'; // SVG needs raw hex
    const circ = 2 * Math.PI * 42;
    const fillPct = isLoss ? 100 : Math.max(0, Math.min(sRate, 100));
    const dashOffset = circ - (fillPct / 100) * circ;
    const savedStr = isLoss ? `−${fc0(Math.abs(saved))}` : `${fc0(saved)}`;
    const pctStr = isLoss ? `−${Math.abs(sRate)}%` : `${sRate}%`;
    // Income breakdown
    const incLines = [];
    incLines.push(`<div style="display:flex;justify-content:space-between;font-size:10px;"><span style="color:var(--text-3);">Regular</span><span style="font-weight:700;color:var(--text-sub);">${fc0(inc - ret - fam)}</span></div>`);
    if (ret > 0) incLines.push(`<div style="display:flex;justify-content:space-between;font-size:10px;"><span style="color:var(--text-3);">Retirement</span><span style="font-weight:700;color:var(--yellow);">${fc0(ret)}</span></div>`);
    if (fam > 0) incLines.push(`<div style="display:flex;justify-content:space-between;font-size:10px;"><span style="color:var(--text-3);">Family</span><span style="font-weight:700;color:var(--purple);">${fc0(fam)}</span></div>`);

    return `<div class="rcs-card">
      <div class="rcs-title" style="color:${titleColor}">${title}</div>
      <div class="rcs-body">
        <div class="rcs-col rcs-col-right">
          <div class="rcs-label" style="color:var(--green);">INCOME</div>
          <div class="rcs-number" style="color:var(--green);">${fc0(inc)}</div>
          <div class="rcs-breakdown">${incLines.join('')}</div>
        </div>
        <div class="rcs-ring-wrap">
          <svg viewBox="0 0 100 100" class="rcs-ring-svg">
            <circle cx="50" cy="50" r="42" fill="none" stroke="var(--ring-track)" stroke-width="8"/>
            <circle cx="50" cy="50" r="42" fill="none" stroke="${ringColorRaw}" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${dashOffset}"/>
          </svg>
          <div class="rcs-ring-inner">
            <div class="rcs-ring-dollar" style="color:${ringColor}">${savedStr}</div>
            <div class="rcs-ring-pct" style="color:${ringColor}">${pctStr}</div>
          </div>
        </div>
        <div class="rcs-col">
          <div class="rcs-label" style="color:var(--red);">SPENDING</div>
          <div class="rcs-number" style="color:var(--red);">${fc0(spend)}</div>
          <div class="rcs-breakdown">
            <div style="display:flex;justify-content:space-between;font-size:10px;"><span style="color:var(--text-3);">Fixed</span><span style="font-weight:700;color:var(--text-sub);">${fc0(fixed)}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:10px;"><span style="color:var(--text-3);">Variable</span><span style="font-weight:700;color:var(--text-sub);">${fc0(variable)}</span></div>
          </div>
        </div>
      </div>
    </div>`;
  }

  const rc1 = ringCard('Combined', 'var(--primary)', scaleNum(totalInc), scaleNum(p1sp+p2sp+shared), false, scaleNum(retTot), scaleNum(famTot), dFixedTotal, dVarTotal);
  const rc2 = ringCard(esc(S.settings.person1), 'var(--p1)', scaleNum(p1inc), scaleNum(p1sp+sharedP1), p1Locked, scaleNum(p1ret), scaleNum(p1fam), dP1Fixed, dP1Var);
  const rc3 = ringCard(esc(S.settings.person2), 'var(--p2)', scaleNum(p2inc), scaleNum(p2sp+sharedP2), p2Locked, scaleNum(p2ret), scaleNum(p2fam), dP2Fixed, dP2Var);

  return `
${rangeToggle}
${viewToggle}
${recSectionHtml}
<div class="rcs-row">${rc1}${rc2}${rc3}</div>
<div style="display:flex;gap:16px;align-items:stretch;">
  <div class="card" style="flex:1;min-width:0;margin-bottom:0;">
    <div class="section-title">Spending by Category</div>
    ${catBars}
    <div style="text-align:center;margin-top:10px;font-size:11px;font-weight:700;color:var(--primary);cursor:pointer;" onclick="document.querySelectorAll('.cat-hidden').forEach(e=>e.style.display='flex');this.style.display='none';">Show all categories →</div>
  </div>
  ${catDonut ? `<div class="card" style="display:flex;align-items:center;justify-content:center;padding:24px;margin-bottom:0;aspect-ratio:1;flex-shrink:0;"><div style="width:100%;height:100%;position:relative;">${catDonut.replace(/width:140px;height:140px/,'width:100%;height:100%')}</div></div>` : ''}
</div>
<div class="card" style="margin-top:14px"><div class="section-title">Top Merchants</div>${topMerchants.length?`<div class="merchant-grid">${merchantRows}</div>`:'<p class="text-muted" style="text-align:center;padding:18px">No transactions this month</p>'}</div>`;
}

// ── Transactions ───────────────────────────────────────────
function renderTxns() {
  let txns = moTxns(S.currentMonth);
  const {search, person, category} = S.filters;
  if (search) txns = txns.filter(t => t.description.toLowerCase().includes(search.toLowerCase())||t.note.toLowerCase().includes(search.toLowerCase()));
  if (person === 'shared') txns = txns.filter(t => t.shared);
  else if (person !== 'all') txns = txns.filter(t => t.person === person && !t.shared);
  if (category !== 'all') txns = txns.filter(t => t.category === category);
  else txns = txns.filter(t => !getCat(t.category).ignored);
  // Privacy: hide private transactions for locked persons, and hidden categories when PIN not entered
  txns = txns.filter(t => isVisible(t));
  const {col:sCol, dir:sDir} = S.txnSort;
  txns.sort((a,b) => {
    let v = 0;
    if (sCol==='date') v = a.date.localeCompare(b.date);
    else if (sCol==='description') v = a.description.localeCompare(b.description);
    else if (sCol==='category') v = (getCat(a.category).label||'').localeCompare(getCat(b.category).label||'');
    else if (sCol==='amount') v = a.amount - b.amount;
    return sDir==='asc' ? v : -v;
  });
  const lockedBanner = ['p1','p2'].filter(p => (S.settings[p==='p1'?'person1Pin':'person2Pin']||'').trim() && !canSeePrivate(p))
    .map(p => `🔒 ${esc(p==='p1'?S.settings.person1:S.settings.person2)}'s private transactions are hidden`);
  const privacyBanner = lockedBanner.length ? `<div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:10px;padding:9px 16px;margin-bottom:12px;font-size:.82rem;color:#92400e">${lockedBanner.join(' &nbsp;·&nbsp; ')}</div>` : '';
  // ── Desktop: table rows ──────────────────────────────────
  const rows = txns.map(t => {
    const ownerCls = t.shared ? 'b-shared' : (t.person==='p1' ? 'b-p1' : 'b-p2');
    const ownerVal = t.shared ? 'shared' : t.person;
    const isIncome = t.amount < 0 && t.category === 'income';
    const itype = isIncome ? getIncomeType(t.id, t.description) : null;
    const incPills = isIncome ? (() => {
      const nAct = itype === 'normal', rAct = itype === 'retirement', fAct = itype === 'family';
      const nSty = `padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid ${nAct?'#0369a1':'var(--border)'};background:${nAct?'#e0f2fe':'white'};color:${nAct?'#0369a1':'var(--text-3)'}`;
      const rSty = `padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid ${rAct?'#D4663A':'var(--border)'};background:${rAct?'#ede9fe':'white'};color:${rAct?'#D4663A':'var(--text-3)'}`;
      const fSty = `padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid ${fAct?'#7c3aed':'var(--border)'};background:${fAct?'#f5f3ff':'white'};color:${fAct?'#7c3aed':'var(--text-3)'}`;
      return `<td style="white-space:nowrap"><button id="itn-${t.id}" style="${nSty}" onclick="setIncomeType('${t.id}','normal')">Normal</button> <button id="itr-${t.id}" style="${rSty}" onclick="setIncomeType('${t.id}','retirement')">Retirement</button> <button id="itf-${t.id}" style="${fSty}" onclick="setIncomeType('${t.id}','family')">Family</button></td>`;
    })() : '<td></td>';
    return `<tr class="${t.excluded?'excluded':''}"><td style="white-space:nowrap"><input type="date" value="${t.date}" style="font-size:.78rem;color:var(--text-3);border:1px solid transparent;border-radius:6px;padding:2px 4px;background:transparent;cursor:pointer;width:118px" onchange="setDate('${t.id}',this.value)" onfocus="this.style.borderColor='var(--border)'" onblur="this.style.borderColor='transparent'"></td><td title="${esc(t.description)}" style="max-width:220px">${esc(t.description.slice(0,44))}${t.description.length>44?'…':''}</td><td><select class="cat-sel" onchange="setCat('${t.id}',this.value)">${getCats().map(c=>`<option value="${c.id}"${c.id===t.category?' selected':''}>${c.emoji} ${c.label}</option>`).join('')}</select></td><td><select class="owner-sel ${ownerCls}" onchange="setOwner('${t.id}',this.value)"><option value="p1"${ownerVal==='p1'?' selected':''}>${esc(S.settings.person1)}</option><option value="p2"${ownerVal==='p2'?' selected':''}>${esc(S.settings.person2)}</option><option value="shared"${ownerVal==='shared'?' selected':''}>⇄ Shared</option></select></td><td style="text-align:right"><span class="${t.amount<0?'amt-inc':'amt-exp'}">${t.amount<0?'+':''}${fc(t.amount)}</span></td>${incPills}<td style="white-space:nowrap"><button class="excl-btn${t.excluded?' on':''}" onclick="toggleExclude('${t.id}')" title="${t.excluded?'Include in summaries':'Exclude from summaries'}">⊘</button><button class="del-btn" onclick="delTxn('${t.id}')" title="Delete">🗑</button></td></tr>`;
  }).join('');

  // ── Mobile: card list ──────────────────────────────────
  if (isMobile()) {
    // Group transactions by date for section headers
    const grouped = {};
    for (const t of txns) {
      const dk = t.date || 'Unknown';
      if (!grouped[dk]) grouped[dk] = [];
      grouped[dk].push(t);
    }
    const dateKeys = Object.keys(grouped).sort((a,b) => sDir==='desc' ? b.localeCompare(a) : a.localeCompare(b));

    let _cardIdx = 0; // global stagger counter across all date groups
    const cardHtml = dateKeys.map(dk => {
      const dayTxns = grouped[dk];
      const [y,m,d] = dk.split('-');
      let dateLabel = 'Unknown Date';
      if (dk !== 'Unknown' && y && m && d) {
        const dt = new Date(+y,+m-1,+d);
        dateLabel = isNaN(dt.getTime()) ? dk : dt.toLocaleDateString('en-US',{weekday:'long', month:'short', day:'numeric'});
      }
      const cards = dayTxns.map(t => {
        const cat = getCat(t.category);
        const ownerColor = t.shared ? 'var(--green)' : (t.person==='p1' ? 'var(--p1)' : 'var(--p2)');
        const ownerLabel = t.shared ? 'Shared' : (t.person==='p1' ? esc(S.settings.person1) : esc(S.settings.person2));
        const isInc = t.amount < 0;
        const _ownerCls = t.shared ? 'txn-shared' : (t.person==='p1' ? 'txn-p1' : 'txn-p2');
        const _staggerIdx = _cardIdx++;
        // Category-colored emoji background: subtle 10% tint of the category color
        const emojiBg = cat.color ? cat.color + '1a' : 'rgba(120,120,128,0.08)';
        return `<div class="txn-card ${_ownerCls}${t.excluded?' excluded':''}" style="--i:${_staggerIdx}" onclick="showTxnEditModal('${t.id}')">
          <div class="txn-card-emoji" style="background:${emojiBg}">${cat.emoji}</div>
          <div class="txn-card-body">
            <div class="txn-card-desc">${esc(t.description)}</div>
            <div class="txn-card-meta">
              <span class="owner-dot" style="background:${ownerColor}"></span>
              <span>${ownerLabel}</span>
              ${t.shared?'<span>· ⇄</span>':''}
              <span>· ${esc(cat.label)}</span>
            </div>
          </div>
          <div class="txn-card-amt${isInc?' inc':''}">${isInc?'+':''}${fc0(t.amount)}</div>
          <div class="txn-card-chevron">›</div>
        </div>`;
      }).join('');
      return `<div class="txn-date-header">${dateLabel}</div><div class="txn-card-list">${cards}</div>`;
    }).join('');

    const uploadMobile = ``; // upload hidden on mobile — use desktop to import CSVs

    const filterPills = `<div class="filters-bar-mobile">
      <input class="search-input" type="text" placeholder="🔍 Search…" value="${esc(search)}" oninput="setFilter('search',this.value)" style="flex:1;min-width:120px">
      <select class="filter-sel" onchange="setFilter('person',this.value)" style="border-radius:20px;padding:6px 12px;font-size:.8rem">
        <option value="all">All people</option>
        <option value="p1"${person==='p1'?' selected':''}>${esc(S.settings.person1)}</option>
        <option value="p2"${person==='p2'?' selected':''}>${esc(S.settings.person2)}</option>
        <option value="shared"${person==='shared'?' selected':''}>⇄ Shared</option>
      </select>
      <select class="filter-sel" onchange="setFilter('category',this.value)" style="border-radius:20px;padding:6px 12px;font-size:.8rem">
        <option value="all">All cats</option>
        ${getCats().map(c=>`<option value="${c.id}"${category===c.id?' selected':''}>${c.emoji} ${c.label}</option>`).join('')}
      </select>
    </div>`;

    const countLabel = `<div style="font-size:.75rem;color:var(--text-3);text-align:center;margin-bottom:8px">${txns.length} transaction${txns.length!==1?'s':''}</div>`;

    const emptyMobile = `<div style="text-align:center;padding:40px 20px;color:var(--text-3)"><div style="font-size:2.5rem;margin-bottom:10px">📂</div><p>No transactions for ${moLabel(S.currentMonth)}</p><p style="margin-top:5px;font-size:.85rem">Upload a CSV above!</p></div>`;

    return `${uploadMobile}${privacyBanner}${filterPills}${countLabel}${txns.length ? cardHtml : emptyMobile}`;
  }

  // ── Desktop: table layout ──────────────────────────────
  return `
<div class="upload-grid">
  <div class="upload-zone p1-zone" onclick="$('fp1').click()" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="onDrop(event,'p1')">
    <div class="upload-icon">⬆️</div>
    <div class="upload-label" style="color:var(--p1)">${esc(S.settings.person1)}'s CSV or Paystub</div>
    <div class="upload-hint">Bank CSV/PDF · Paystub PDF (ADP, Gusto…)</div>
    <input type="file" id="fp1" accept=".csv,.pdf" multiple onchange="onFile(event,'p1')">
  </div>
